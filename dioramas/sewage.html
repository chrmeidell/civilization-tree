<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sewage Treatment of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#003322;
  z-index:45; pointer-events:none; line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Sewage Treatment of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  WATER BRANCH · NODE 03<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI/2; floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity, wireframe:false }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
}

// ─── SEWAGE PIPE ─────────────────────────────
const pipeGroup = new THREE.Group();
pipeGroup.position.set(0, 0.4, -3);
scene.add(pipeGroup);

const pipeGeo = new THREE.CylinderGeometry(0.4, 0.4, 8, 10);
const pipeFill = glowMesh(pipeGeo, 0x112200, 0.3);
const pipeEdge = glowEdge(pipeGeo, 0x336633, 0.7);
// lie on side (rotation around Z)
pipeFill.rotation.z = Math.PI/2;
pipeEdge.rotation.z = Math.PI/2;
pipeGroup.add(pipeFill); pipeGroup.add(pipeEdge);

// ─── DISINTEGRATOR ───────────────────────────
const disintGroup = new THREE.Group();
disintGroup.position.set(0, 0, 0);
disintGroup.visible = false;
scene.add(disintGroup);

const disintGeo = new THREE.CylinderGeometry(0.9, 0.9, 2.5, 12);
const disintFill = glowMesh(disintGeo, 0x002233, 0.2); disintFill.position.y = 1.25;
const disintEdge = glowEdge(disintGeo, 0x00ffcc, 0); disintEdge.position.y = 1.25;
disintGroup.add(disintFill); disintGroup.add(disintEdge);

const disintLight = new THREE.PointLight(0x00ffcc, 0, 8);
disintLight.position.set(0, 2, 0);
scene.add(disintLight);

// ─── SEPARATION CHAMBER ──────────────────────
const chamberGroup = new THREE.Group();
chamberGroup.position.set(0, 4.5, 0);
chamberGroup.visible = false;
scene.add(chamberGroup);

const chamberGeo = new THREE.IcosahedronGeometry(1.5, 1);
const chamberFill = glowMesh(chamberGeo, 0x001122, 0.12);
const chamberEdge = glowEdge(chamberGeo, 0x00ffcc, 0.75);
chamberGroup.add(chamberFill); chamberGroup.add(chamberEdge);

const chamberLight = new THREE.PointLight(0x00ffcc, 0, 6);
chamberLight.position.set(0, 4.5, 0);
scene.add(chamberLight);

// ─── NPK CRYSTALS ────────────────────────────
function makeNPK(color, x, y, z) {
  const g = new THREE.Group();
  g.position.set(x, y, z);
  g.visible = false;
  const geo = new THREE.OctahedronGeometry(0.4);
  const fill = glowMesh(geo, color, 0.25);
  const edge = glowEdge(geo, color, 0.9);
  g.add(fill); g.add(edge);
  scene.add(g);
  return g;
}
const npkP = makeNPK(0xffff44, -2, 2, 0);
const npkN = makeNPK(0x4488ff,  0, 2.5, 0);
const npkK = makeNPK(0xff4444,  2, 2, 0);
const npkLight = new THREE.PointLight(0xffee88, 0, 5);
npkLight.position.set(0, 2.5, 0);
scene.add(npkLight);

// ─── SEWAGE PARTICLES ────────────────────────
const SPN = 120;
const sewArr = new Float32Array(SPN * 3);
for (let i = 0; i < SPN; i++) {
  sewArr[i*3]   = -4 + Math.random()*8;
  sewArr[i*3+1] = 0.2 + Math.random()*0.5;
  sewArr[i*3+2] = -3 + (Math.random()-0.5)*0.6;
}
const sewGeo = new THREE.BufferGeometry();
sewGeo.setAttribute('position', new THREE.BufferAttribute(sewArr, 3));
const sewParticles = new THREE.Points(sewGeo,
  new THREE.PointsMaterial({ color: 0x336633, size: 0.1, transparent:true, opacity:0 }));
scene.add(sewParticles);

// ─── CLEAN WATER PARTICLES ───────────────────
const WPN = 120;
const waterArr = new Float32Array(WPN * 3);
for (let i = 0; i < WPN; i++) {
  waterArr[i*3]   = (Math.random()-0.5)*3;
  waterArr[i*3+1] = 4 + Math.random()*2;
  waterArr[i*3+2] = (Math.random()-0.5)*3;
}
const waterGeo = new THREE.BufferGeometry();
waterGeo.setAttribute('position', new THREE.BufferAttribute(waterArr, 3));
const waterParticles = new THREE.Points(waterGeo,
  new THREE.PointsMaterial({ color: 0x4488ff, size: 0.09, transparent:true, opacity:0 }));
scene.add(waterParticles);

// ─── HYDROGEN ────────────────────────────────
const hydroGroup = new THREE.Group();
hydroGroup.position.set(3, 1.5, 0);
hydroGroup.visible = false;
scene.add(hydroGroup);

const h1 = glowMesh(new THREE.SphereGeometry(0.28, 8, 8), 0xffffff, 0.4);
h1.position.set(-0.35, 0, 0);
const h2 = glowMesh(new THREE.SphereGeometry(0.28, 8, 8), 0xffffff, 0.4);
h2.position.set(0.35, 0, 0);
const bondPts = [new THREE.Vector3(-0.35,0,0), new THREE.Vector3(0.35,0,0)];
const bond = new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(bondPts),
  new THREE.LineBasicMaterial({ color: 0xffffff, transparent:true, opacity:0.6 })
);
hydroGroup.add(h1); hydroGroup.add(h2); hydroGroup.add(bond);

// ─── ENERGY GLOW ─────────────────────────────
const energyLight = new THREE.PointLight(0xffffcc, 0, 8);
energyLight.position.set(4, 2, 0);
scene.add(energyLight);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'dot'+(i<n?' done':i===n?' on':'');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct+'%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('SCENARIO LOADING'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — pipe visible, dark particles flow through (7s)
  { dur:7, enter() {
    setDot(1); setHUD('SEWAGE STREAM'); setProgress(8);
    for (let i = 0; i < SPN; i++) {
      sewArr[i*3]   = -4 + Math.random()*8;
      sewArr[i*3+1] = 0.2 + Math.random()*0.5;
      sewArr[i*3+2] = -3 + (Math.random()-0.5)*0.6;
    }
    sewGeo.attributes.position.needsUpdate = true;
    sewParticles.material.opacity = 0.65;
    setCaption('Every city. Every day. Billions of litres. Sewage treated, diluted, discharged. Value destroyed.');
    speak('Every city. Every day. Billions of litres. Sewage treated, diluted, discharged. Value destroyed.');
  }, tick(e) {
    for (let i = 0; i < SPN; i++) {
      sewArr[i*3] += 0.03;
      if (sewArr[i*3] > 4.5) sewArr[i*3] = -4;
    }
    sewGeo.attributes.position.needsUpdate = true;
    setProgress(8 + (e/7)*10);
  }},

  // 2 — current system text, particles scatter (6s)
  { dur:6, enter() {
    setDot(2); setHUD('CURRENT LOSS'); setProgress(18);
    setCaption('The phosphorus that fed the crops leaves on a truck. Goes to a plant. Gets discharged into a river. Gone.');
    speak('The phosphorus that fed the crops leaves on a truck. Goes to a plant. Gets discharged into a river. Gone.');
  }, tick(e) {
    for (let i = 0; i < SPN; i++) {
      const a = Math.random()*Math.PI*2;
      sewArr[i*3]   += Math.cos(a)*0.04;
      sewArr[i*3+1] += 0.015;
      sewArr[i*3+2] += Math.sin(a)*0.04;
    }
    sewGeo.attributes.position.needsUpdate = true;
    sewParticles.material.opacity = Math.max(0, 0.65 - e*0.11);
    setProgress(18 + (e/6)*10);
  }},

  // 3 — disintegrator rises (7s)
  { dur:7, enter() {
    setDot(3); setHUD('DISINTEGRATOR RISING'); setProgress(28);
    disintGroup.visible = true;
    disintGroup.position.y = -2;
    sewParticles.material.opacity = 0.5;
    // reset sewage particles near pipe
    for (let i = 0; i < SPN; i++) {
      sewArr[i*3]   = -4 + Math.random()*8;
      sewArr[i*3+1] = 0.2 + Math.random()*0.5;
      sewArr[i*3+2] = -3 + (Math.random()-0.5)*0.6;
    }
    sewGeo.attributes.position.needsUpdate = true;
    setCaption('A disintegrator sees it differently. Not waste to treat. A resource stream to harvest.');
    speak('A disintegrator sees it differently. Not waste to treat. A resource stream to harvest.');
  }, tick(e) {
    disintGroup.position.y += (0 - disintGroup.position.y) * 0.06;
    const t = Math.min(1, e*0.35);
    disintEdge.material.opacity = t*0.9;
    disintFill.material.opacity = t*0.2;
    disintLight.intensity = t*1.2;
    // particles flow to disintegrator
    for (let i = 0; i < SPN; i++) {
      sewArr[i*3]   += (0 - sewArr[i*3])   * 0.02;
      sewArr[i*3+1] += (1 - sewArr[i*3+1]) * 0.02;
      sewArr[i*3+2] += (0 - sewArr[i*3+2]) * 0.02;
    }
    sewGeo.attributes.position.needsUpdate = true;
    setProgress(28 + (e/7)*12);
  }},

  // 4 — chamber appears, particles rise and orbit (8s)
  { dur:8, enter() {
    setDot(4); setHUD('ELEMENTAL EXTRACTION'); setProgress(40);
    chamberGroup.visible = true;
    sewParticles.material.opacity = 0;
    // scatter particles upward toward chamber
    for (let i = 0; i < SPN; i++) {
      sewArr[i*3]   = (Math.random()-0.5)*1;
      sewArr[i*3+1] = 1 + Math.random()*2;
      sewArr[i*3+2] = (Math.random()-0.5)*1;
    }
    sewGeo.attributes.position.needsUpdate = true;
    sewParticles.material.color.set(0x00ffcc);
    sewParticles.material.opacity = 0.7;
    disintLight.intensity = 2;
    setCaption('Plasma gasification. Everything breaks to atoms. Then separated. Element by element.');
    speak('Plasma gasification. Everything breaks to atoms. Then separated. Element by element.');
  }, tick(e) {
    const t = Math.min(1, e*0.3);
    chamberEdge.material.opacity = t*0.75;
    chamberFill.material.opacity = t*0.12;
    chamberLight.intensity = t*1.5 + Math.sin(e*4)*0.4;
    // particles orbit chamber
    for (let i = 0; i < SPN; i++) {
      const dx = sewArr[i*3] - 0, dz = sewArr[i*3+2] - 0;
      const a = Math.atan2(dz, dx) + 0.025;
      const r = Math.sqrt(dx*dx+dz*dz);
      const nr = r + (1.2 - r)*0.03;
      sewArr[i*3]   = Math.cos(a)*nr;
      sewArr[i*3+2] = Math.sin(a)*nr;
      sewArr[i*3+1] += (4.5 + Math.sin(e+i*0.2)*0.5 - sewArr[i*3+1])*0.04;
    }
    sewGeo.attributes.position.needsUpdate = true;
    setProgress(40 + (e/8)*10);
  }},

  // 5 — NPK crystals appear (8s)
  { dur:8, enter() {
    setDot(5); setHUD('NPK RECOVERED'); setProgress(50);
    npkP.visible = true; npkN.visible = true; npkK.visible = true;
    npkLight.intensity = 1.5;
    setCaption('Phosphorus. Nitrogen. Potassium. Recovered complete. Morocco\'s leverage over global food: gone.');
    speak('Phosphorus. Nitrogen. Potassium. Recovered complete. Morocco\'s leverage over global food: gone.');
  }, tick(e) {
    const pulse = 1 + Math.sin(e*3)*0.25;
    npkP.scale.setScalar(pulse);
    npkN.scale.setScalar(1 + Math.sin(e*3+1)*0.25);
    npkK.scale.setScalar(1 + Math.sin(e*3+2)*0.25);
    npkLight.intensity = 1.5 + Math.sin(e*5)*0.5;
    // particles slowly fade
    sewParticles.material.opacity = Math.max(0, 0.7 - e*0.09);
    setProgress(50 + (e/8)*10);
  }},

  // 6 — clean water out, hydrogen appears (7s)
  { dur:7, enter() {
    setDot(6); setHUD('CLEAN OUTPUT'); setProgress(60);
    hydroGroup.visible = true;
    sewParticles.material.opacity = 0;
    for (let i = 0; i < WPN; i++) {
      waterArr[i*3]   = (Math.random()-0.5)*1.5;
      waterArr[i*3+1] = 4 + Math.random()*2;
      waterArr[i*3+2] = (Math.random()-0.5)*1.5;
    }
    waterGeo.attributes.position.needsUpdate = true;
    waterParticles.material.opacity = 0.75;
    setCaption('Clean water out. Hydrogen fuel as byproduct. The plant now generates what it used to consume.');
    speak('Clean water out. Hydrogen fuel as byproduct. The plant now generates what it used to consume.');
  }, tick(e) {
    for (let i = 0; i < WPN; i++) {
      waterArr[i*3]   += (3 + (i%4)*0.5 - waterArr[i*3]) * 0.03;
      waterArr[i*3+1] -= 0.03;
      if (waterArr[i*3+1] < 0) waterArr[i*3+1] = 4 + Math.random()*2;
    }
    waterGeo.attributes.position.needsUpdate = true;
    hydroGroup.rotation.y += 0.02;
    setProgress(60 + (e/7)*10);
  }},

  // 7 — energy glow brightens (7s)
  { dur:7, enter() {
    setDot(7); setHUD('ENERGY POSITIVE'); setProgress(70);
    energyLight.intensity = 0;
    setCaption('One ton of sewage: net energy surplus. The treatment plant pays for itself and powers the city.');
    speak('One ton of sewage: net energy surplus. The treatment plant pays for itself and powers the city.');
  }, tick(e) {
    energyLight.intensity = Math.min(3, e*0.4) + Math.sin(e*4)*0.3;
    waterParticles.material.opacity = 0.75;
    for (let i = 0; i < WPN; i++) {
      waterArr[i*3]   += (3 + (i%4)*0.5 - waterArr[i*3]) * 0.025;
      waterArr[i*3+1] -= 0.03;
      if (waterArr[i*3+1] < 0) waterArr[i*3+1] = 4 + Math.random()*2;
    }
    waterGeo.attributes.position.needsUpdate = true;
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera back, statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('ENERGY POSITIVE', 'The sewage plant of the future powers the city.', true);
    speak('Energy positive. The sewage plant of the future powers the city.');
  }, tick(e) {
    camera.position.z = 10 + e*0.28;
    camera.position.y = 4  + e*0.16;
    camera.lookAt(0, 1.5, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'sewage' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step+1);
  }

  // Spin NPK crystals
  if (npkP.visible) {
    npkP.rotation.y = t*0.8;
    npkN.rotation.y = t*1.1;
    npkK.rotation.y = t*0.9;
  }
  // Hydrogen spin
  if (hydroGroup.visible) hydroGroup.rotation.y += 0.015;
  // Chamber spin
  if (chamberGroup.visible) chamberGroup.rotation.y += 0.006;

  floor.material.opacity = 0.3 + Math.sin(t*0.4)*0.07;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
