<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Economy of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#3aa888;
  z-index:45; pointer-events:none; line-height:1.8;
}

/* Industry labels */
.ind-label {
  position:fixed; font-size:8px; letter-spacing:3px;
  pointer-events:none; z-index:30;
  transform:translateX(-50%);
  display:none;
  text-shadow: 0 0 8px currentColor;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>The Economy of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  ECONOMICS BRANCH · NODE 06<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1320);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.9));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI/2; floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity, wireframe:false }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
}

// ─── INDUSTRY BOXES ──────────────────────────
const industryData = [
  { name:'PHARMA',    color:0xff4444, x:-4, y:1, z:-1   },
  { name:'MINING',    color:0xff8844, x:-2, y:1, z:-2   },
  { name:'LOGISTICS', color:0xffcc44, x: 0, y:1, z:-2.5 },
  { name:'CONSUMER',  color:0x88ff44, x: 2, y:1, z:-2   },
  { name:'FINANCE',   color:0x4488ff, x: 4, y:1, z:-1   },
];

const industryBoxes = industryData.map(d => {
  const g = new THREE.Group();
  g.position.set(d.x, 0, d.z);
  g.visible = false;
  const geo = new THREE.BoxGeometry(1.2, 2, 1.2);
  const fill = glowMesh(geo, d.color, 0.12);
  fill.position.y = 1;
  const edge = glowEdge(geo, d.color, 0.85);
  edge.position.y = 1;
  g.add(fill); g.add(edge);
  scene.add(g);

  // DOM label
  const lbl = document.createElement('div');
  lbl.className = 'ind-label';
  lbl.textContent = d.name;
  lbl.style.color = '#' + d.color.toString(16).padStart(6,'0');
  document.body.appendChild(lbl);

  return { g, fill, edge, color: d.color, label: lbl, origX: d.x, origZ: d.z, origY: 0 };
});

const indLight = new THREE.PointLight(0xffffff, 0, 10);
indLight.position.set(0, 4, 0); scene.add(indLight);

// ─── DISINTEGRATOR ───────────────────────────
const disintGroup = new THREE.Group();
disintGroup.position.set(0, 0, 0);
disintGroup.visible = false;
scene.add(disintGroup);

const disintGeo = new THREE.CylinderGeometry(0.85, 0.85, 2.5, 12);
const disintFill = glowMesh(disintGeo, 0x002233, 0.2); disintFill.position.y = 1.25;
const disintEdge = glowEdge(disintGeo, 0x00ffcc, 0); disintEdge.position.y = 1.25;
disintGroup.add(disintFill); disintGroup.add(disintEdge);
const disintLight = new THREE.PointLight(0x00ffcc, 0, 8);
disintLight.position.set(0, 2, 0); scene.add(disintLight);

// ─── HUMAN FIGURES ───────────────────────────
const humanPositions = [[-2,0,2],[0,0,2.5],[2,0,2]];
const humanFigures = humanPositions.map(([x,y,z]) => {
  const g = new THREE.Group();
  g.position.set(x, y, z);
  g.scale.setScalar(0.6);
  g.visible = false;
  scene.add(g);

  const bGeo = new THREE.CylinderGeometry(0.28, 0.28, 1.1, 8);
  const bm = glowMesh(bGeo, 0x00ffcc, 0.15); bm.position.y = 0.9;
  const be = glowEdge(bGeo, 0x00ffcc, 0.9); be.position.y = 0.9;
  g.add(bm); g.add(be);

  const hGeo = new THREE.IcosahedronGeometry(0.24, 1);
  const hm = glowMesh(hGeo, 0x00ffcc, 0.15); hm.position.y = 1.72;
  const he = glowEdge(hGeo, 0x00ffcc, 0.9); he.position.y = 1.72;
  g.add(hm); g.add(he);

  [-0.16, 0.16].forEach(lx => {
    const lGeo = new THREE.CylinderGeometry(0.1, 0.09, 0.72, 6);
    const lm = glowMesh(lGeo, 0x00ffcc, 0.1); lm.position.set(lx, 0.36, 0);
    const le = glowEdge(lGeo, 0x00ffcc, 0.7); le.position.set(lx, 0.36, 0);
    g.add(lm); g.add(le);
  });

  return g;
});
const humanLight = new THREE.PointLight(0x00ffcc, 0, 6);
humanLight.position.set(0, 1.5, 2); scene.add(humanLight);

// ─── CONNECTION LINES ────────────────────────
const connLines = [];
const connPairs = [[0,1],[1,2],[0,2]];
connPairs.forEach(([a, b]) => {
  const pA = new THREE.Vector3(...humanPositions[a]);
  const pA2 = pA.clone(); pA2.y += 1.0;
  const pB = new THREE.Vector3(...humanPositions[b]);
  const pB2 = pB.clone(); pB2.y += 1.0;
  const ln = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([pA2, pB2]),
    new THREE.LineBasicMaterial({ color: 0xffcc44, transparent:true, opacity:0 })
  );
  scene.add(ln);
  connLines.push(ln);
});

// ─── CREATIVE PARTICLES ──────────────────────
const CPN = 120;
const cpArr = new Float32Array(CPN * 3);
for (let i = 0; i < CPN; i++) {
  const hi = i % 3;
  cpArr[i*3]   = humanPositions[hi][0];
  cpArr[i*3+1] = humanPositions[hi][1] + 1;
  cpArr[i*3+2] = humanPositions[hi][2];
}
const cpGeo = new THREE.BufferGeometry();
cpGeo.setAttribute('position', new THREE.BufferAttribute(cpArr, 3));
const cpPts = new THREE.Points(cpGeo,
  new THREE.PointsMaterial({ color: 0xffcc44, size: 0.09, transparent:true, opacity:0 }));
scene.add(cpPts);

// ─── GOODS = COLORED BLOCKS (physical objects as bricks) ──
// The visual language of the tree: any solid material thing is colored blocks.
const GOOD_COLORS = [0xff4455, 0x4488ff, 0xffcc33, 0x66cc55, 0xff8833, 0xcc66ff];
function legoBrick(color, w, h, d) {
  w = w || 0.5; h = h || 0.3; d = d || 0.5;
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.9 }));
  const edge = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)),
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.35 }));
  g.add(body); g.add(edge);
  [-w/4, w/4].forEach(sx => [-d/4, d/4].forEach(sz => {
    const stud = new THREE.Mesh(new THREE.CylinderGeometry(w/6.5, w/6.5, h*0.42, 10),
      new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.95 }));
    stud.position.set(sx, h/2 + h*0.21, sz);
    g.add(stud);
  }));
  g.userData.body = body; g.userData.edge = edge;
  return g;
}
function setBrickOpacity(brick, o) {
  brick.traverse(m => { if (m.material) m.material.opacity = (m.type === 'LineSegments') ? o*0.35 : o*0.9; });
}

const goodsGroup = new THREE.Group();
goodsGroup.visible = false;
scene.add(goodsGroup);
const goodsBlocks = [];
const GN = 40;
for (let i = 0; i < GN; i++) {
  const b = legoBrick(GOOD_COLORS[i % GOOD_COLORS.length]);
  // SCARCE: a tight, hoarded, elevated cluster (precious goods, guarded)
  const sa = Math.random() * Math.PI * 2, sr = Math.random() * 0.6;
  b.userData.stack = new THREE.Vector3(Math.cos(sa)*sr, 1.4 + Math.random()*1.6, Math.sin(sa)*sr);
  // FREE: scattered wide across the floor (abundant, structurally free)
  const fa = Math.random() * Math.PI * 2, fr = 1.6 + Math.random() * 5.5;
  b.userData.free = new THREE.Vector3(Math.cos(fa)*fr, 0.18 + Math.random()*0.1, Math.sin(fa)*fr);
  b.userData.spin = (Math.random()-0.5) * 2;
  b.position.copy(b.userData.stack);
  b.rotation.set(Math.random(), Math.random(), Math.random());
  setBrickOpacity(b, 0);
  goodsGroup.add(b);
  goodsBlocks.push(b);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'dot'+(i<n?' done':i===n?' on':'');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct+'%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

function updateLabels() {
  industryBoxes.forEach(({ g, label }) => {
    if (!g.visible) { label.style.display = 'none'; return; }
    const wp = new THREE.Vector3();
    g.getWorldPosition(wp);
    wp.y += 2.5;
    wp.project(camera);
    const x = (wp.x + 1)/2 * innerWidth;
    const y = (-wp.y + 1)/2 * innerHeight;
    label.style.left = x + 'px';
    label.style.top  = y + 'px';
    label.style.display = 'block';
  });
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('SCARCITY ECONOMY'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — industry boxes appear (7s)
  { dur:7, enter() {
    setDot(1); setHUD('SCARCITY ECONOMY'); setProgress(8);
    industryBoxes.forEach(b => { b.g.visible = true; });
    indLight.intensity = 1.5;
    setCaption('We assume the economy must run on scarcity.  That value comes from rarity.  Every great fortune was built on controlling something scarce — the spice, the oil, the patent, the route.');
    speak('We assume the economy must run on scarcity. That value comes from rarity. Every great fortune was built on controlling something scarce — the spice, the oil, the patent, the route.');
  }, tick(e) {
    indLight.intensity = 1.5 + Math.sin(e*2)*0.3;
    setProgress(8 + (e/7)*10);
  }},

  // 2 — boxes pulse and grow (8s)
  { dur:8, enter() {
    setDot(2); setHUD('INCUMBENT POWER'); setProgress(18);
    setCaption('What you might not know:  scarcity is often not nature.  It is architecture.  Pharmaceutical companies.  Mining corporations.  Logistics giants.  All built to defend and monetize it.');
    speak('What you might not know: scarcity is often not nature. It is architecture. Pharmaceutical companies. Mining corporations. Logistics giants. All built to defend and monetize it.');
  }, tick(e) {
    const pulse = 1 + Math.sin(e*3)*0.05;
    industryBoxes.forEach(b => { b.g.scale.setScalar(pulse + Math.sin(e*2)*0.03); });
    indLight.intensity = 2 + Math.sin(e*4)*0.5;
    setProgress(18 + (e/8)*10);
  }},

  // 3 — disintegrator rises (8s)
  { dur:8, enter() {
    setDot(3); setHUD('SCARCITY COLLAPSES'); setProgress(28);
    disintGroup.visible = true;
    disintGroup.position.y = -2;
    goodsGroup.visible = true;
    goodsBlocks.forEach(b => { b.position.copy(b.userData.stack); });
    setCaption('But what if the cost floor of physical things collapsed?  Every physical good — a brick, an assembly of atoms.  Today they are hoarded, scarce, guarded.  The disintegrator makes them nearly free.  Not cheaper — structurally free.');
    speak('But what if the cost floor of physical things collapsed? Every physical good — a brick, an assembly of atoms. Today they are hoarded, scarce, guarded. The disintegrator makes them nearly free. Not cheaper — structurally free.');
  }, tick(e) {
    disintGroup.position.y += (0 - disintGroup.position.y)*0.06;
    const t = Math.min(1, e*0.35);
    disintEdge.material.opacity = t*0.9;
    disintFill.material.opacity = t*0.2;
    disintLight.intensity = t*2 + Math.sin(e*5)*0.5;
    // goods: a scarce, hoarded cluster slowly turning above the disintegrator
    goodsGroup.rotation.y = e * 0.5;
    goodsBlocks.forEach((b, i) => {
      setBrickOpacity(b, Math.min(1, e*0.5));
      b.position.y = b.userData.stack.y + Math.sin(e*2 + i)*0.04;
    });
    setProgress(28 + (e/8)*12);
  }},

  // 4 — boxes shrink and dim (8s)
  { dur:8, enter() {
    setDot(4); setHUD('MOATS DISSOLVING'); setProgress(40);
    goodsGroup.rotation.y = 0;
    setCaption('Watch the hoarded stack collapse.  The blocks tumble outward — abundant, everywhere, nearly free.  Three people own more than the bottom 3.5 billion, their wealth stored in scarce physical assets.  When the blocks are free, the moat disappears.  Not by redistribution.  By the cost floor collapsing.');
    speak('Watch the hoarded stack collapse. The blocks tumble outward — abundant, everywhere, nearly free. Three people own more than the bottom 3.5 billion, their wealth stored in scarce physical assets. When the blocks are free, the moat disappears. Not by redistribution. By the cost floor collapsing.');
  }, tick(e) {
    const decay = Math.max(0.2, 1 - e*0.1);
    industryBoxes.forEach(b => {
      b.g.scale.setScalar(decay);
      b.edge.material.opacity = Math.max(0.1, 0.85 - e*0.09);
      b.fill.material.opacity = Math.max(0.02, 0.12 - e*0.012);
    });
    // goods cascade from the scarce stack out into free abundance across the floor
    const t = Math.min(1, e * 0.2);
    goodsBlocks.forEach((b, i) => {
      const s = b.userData.stack, f = b.userData.free;
      const tt = Math.min(1, Math.max(0, e*0.18 - i*0.015));
      b.position.x = s.x + (f.x - s.x) * tt;
      b.position.y = s.y + (f.y - s.y) * tt + Math.sin(tt*Math.PI)*1.2;  // arc as they fall out
      b.position.z = s.z + (f.z - s.z) * tt;
      b.rotation.y += b.userData.spin * 0.04;
      b.rotation.x += b.userData.spin * 0.02;
    });
    setProgress(40 + (e/8)*10);
  }},

  // 5 — human figures appear (7s)
  { dur:7, enter() {
    setDot(5); setHUD('HUMAN VALUE RISES'); setProgress(50);
    humanFigures.forEach(f => { f.visible = true; });
    humanLight.intensity = 0;
    setCaption('What remains scarce: human creativity. Attention. Trust. Biological time. These cannot be replicated.');
    speak('What remains scarce: human creativity. Attention. Trust. Biological time. These cannot be replicated.');
  }, tick(e) {
    humanLight.intensity = Math.min(2, e*0.35) + Math.sin(e*2)*0.2;
    humanFigures.forEach((f, i) => {
      f.position.y = Math.sin(e*1.2 + i)*0.03;
    });
    setProgress(50 + (e/7)*10);
  }},

  // 6 — golden connection lines (7s)
  { dur:7, enter() {
    setDot(6); setHUD('TRUST ECONOMY'); setProgress(60);
    connLines.forEach(l => { l.material.opacity = 0; });
    setCaption('The corporation of the future does not defend a scarce resource.  It earns trust.  It solves a hard problem nobody else can solve.  Its competitive advantage is judgment, taste, relationships — things that cannot be plasma-gasified and remanufactured.  Purpose is the moat.');
    speak('The corporation of the future does not defend a scarce resource. It earns trust. It solves a hard problem nobody else can solve. Its competitive advantage is judgment, taste, relationships — things that cannot be plasma-gasified and remanufactured. Purpose is the moat.');
  }, tick(e) {
    const op = Math.min(0.8, e*0.2);
    connLines.forEach((l, i) => {
      l.material.opacity = op + Math.sin(e*3 + i)*0.15;
    });
    setProgress(60 + (e/7)*10);
  }},

  // 7 — gold particles orbit figures (7s)
  { dur:7, enter() {
    setDot(7); setHUD('NEW CAPITAL'); setProgress(70);
    cpPts.material.opacity = 0.85;
    setCaption('Money still exists. But it flows through human value. Not material extraction. Not supply chain control.');
    speak('Money still exists. But it flows through human value. Not material extraction. Not supply chain control.');
  }, tick(e) {
    for (let i = 0; i < CPN; i++) {
      const hi = i % 3;
      const cx = humanPositions[hi][0] * 0.6;
      const cz = humanPositions[hi][2] * 0.6;
      const dx = cpArr[i*3] - cx, dz = cpArr[i*3+2] - cz;
      const a = Math.atan2(dz, dx) + 0.03;
      const r = Math.sqrt(dx*dx+dz*dz);
      const nr = r + (1.0 - r)*0.03;
      cpArr[i*3]   = cx + Math.cos(a)*nr;
      cpArr[i*3+2] = cz + Math.sin(a)*nr;
      cpArr[i*3+1] += (humanPositions[hi][1]*0.6 + 0.8 + Math.sin(e+i*0.4)*0.3 - cpArr[i*3+1])*0.05;
    }
    cpGeo.attributes.position.needsUpdate = true;
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera back, statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('CREATIVITY IS CAPITAL', 'Scarcity was architecture · When it collapses, so does the inequality it manufactured', true);
    speak('Creativity is capital. The only resource that grows when shared. This is not communism. It is not utopia. It is a different scarcity. One built from what humans actually are — curious, creative, relational beings — not from what they can hoard.');
  }, tick(e) {
    camera.position.z = 10 + e*0.28;
    camera.position.y = 4  + e*0.16;
    camera.lookAt(0, 1.5, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  industryBoxes.forEach(b => { b.label.style.display = 'none'; });
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'economy' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step+1);
  }

  updateLabels();
  floor.material.opacity = 0.3 + Math.sin(t*0.4)*0.07;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
