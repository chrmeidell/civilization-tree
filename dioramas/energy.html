<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#3aa888;
  z-index:45; pointer-events:none; line-height:1.8;
}

/* Number display overlay */
#num-display {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center; z-index:35;
  pointer-events:none; opacity:0;
  transition:opacity 0.5s;
}
#num-line1 { font-size:18px; letter-spacing:4px; color:#ffcc44; margin:8px 0; }
#num-line2 { font-size:18px; letter-spacing:4px; color:#00ffcc; margin:8px 0; }
#num-line3 { font-size:22px; letter-spacing:4px; color:#ffffff; margin:8px 0; font-weight:bold; }

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Energy of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  ENERGY BRANCH · NODE 04<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<div id="num-display">
  <div id="num-line1"></div>
  <div id="num-line2"></div>
  <div id="num-line3"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1320);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.9));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI/2; floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity, wireframe:false }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
}

// ─── WASTE PILE = discarded colored blocks ───
// Same visual language as the foundation diorama: every solid object is
// colored blocks. A "ton of waste" is a heap of objects we threw away.
const wastePileGroup = new THREE.Group();
wastePileGroup.position.set(-3, 0, 0);
wastePileGroup.visible = false;
scene.add(wastePileGroup);

const WASTE_COLORS = [0xff4455, 0x4488ff, 0xffcc33, 0x66cc55, 0xff8833, 0xcc66ff];
function legoBrick(color, w, h, d) {
  w = w || 0.5; h = h || 0.3; d = d || 0.5;
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.9 }));
  const edge = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)),
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.35 }));
  g.add(body); g.add(edge);
  [-w/4, w/4].forEach(sx => [-d/4, d/4].forEach(sz => {
    const stud = new THREE.Mesh(new THREE.CylinderGeometry(w/6.5, w/6.5, h*0.42, 10),
      new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.95 }));
    stud.position.set(sx, h/2 + h*0.21, sz);
    g.add(stud);
  }));
  return g;
}

const wasteBoxData = [
  { x:-0.7, y:0.25, z:0,    w:0.6, h:0.5, d:0.5 },
  { x: 0.4, y:0.2,  z:0.3,  w:0.5, h:0.4, d:0.6 },
  { x:-0.2, y:0.35, z:-0.3, w:0.7, h:0.7, d:0.5 },
  { x: 0.8, y:0.3,  z:-0.2, w:0.5, h:0.6, d:0.4 },
  { x:-0.5, y:0.15, z:0.5,  w:0.8, h:0.3, d:0.5 },
  { x: 0.2, y:0.25, z:0.6,  w:0.4, h:0.5, d:0.6 },
  { x:-0.9, y:0.2,  z:-0.5, w:0.5, h:0.4, d:0.4 },
  { x: 0.6, y:0.2,  z:0.0,  w:0.3, h:0.4, d:0.3 },
  { x: 0.0, y:0.4,  z:0.1,  w:0.5, h:0.8, d:0.5 },
  { x:-0.3, y:0.15, z:0.7,  w:0.6, h:0.3, d:0.4 },
];
const wasteBoxes = wasteBoxData.map((bd, i) => {
  const brick = legoBrick(WASTE_COLORS[i % WASTE_COLORS.length], bd.w, bd.h, bd.d);
  brick.position.set(bd.x, bd.y, bd.z);
  brick.rotation.set((Math.random()-0.5)*0.7, Math.random()*Math.PI, (Math.random()-0.5)*0.7);
  wastePileGroup.add(brick);
  return { brick };
});

// ─── DISINTEGRATOR ───────────────────────────
const disintGroup = new THREE.Group();
disintGroup.position.set(0, 0, 0);
disintGroup.visible = false;
scene.add(disintGroup);

const disintGeo = new THREE.CylinderGeometry(0.85, 0.85, 2.5, 12);
const disintFill = glowMesh(disintGeo, 0x002233, 0.2); disintFill.position.y = 1.25;
const disintEdge = glowEdge(disintGeo, 0x00ffcc, 0); disintEdge.position.y = 1.25;
disintGroup.add(disintFill); disintGroup.add(disintEdge);
const disintLight = new THREE.PointLight(0x00ffcc, 0, 8);
disintLight.position.set(0, 2, 0); scene.add(disintLight);

// ─── WASTE FLOW PARTICLES ────────────────────
const WN = 100;
const wasteFlowArr = new Float32Array(WN * 3);
for (let i = 0; i < WN; i++) {
  wasteFlowArr[i*3]   = -3 + (Math.random()-0.5)*2;
  wasteFlowArr[i*3+1] = Math.random()*1.5;
  wasteFlowArr[i*3+2] = (Math.random()-0.5)*2;
}
const wasteFlowGeo = new THREE.BufferGeometry();
wasteFlowGeo.setAttribute('position', new THREE.BufferAttribute(wasteFlowArr, 3));
const wasteFlowPts = new THREE.Points(wasteFlowGeo,
  new THREE.PointsMaterial({ color: 0xff8800, size: 0.1, transparent:true, opacity:0 }));
scene.add(wasteFlowPts);

// ─── HYDROGEN SPHERES ────────────────────────
const hydroGroup = new THREE.Group();
hydroGroup.position.set(2.5, 1.5, 0);
hydroGroup.visible = false;
scene.add(hydroGroup);

const hAngles = [0, Math.PI*2/3, Math.PI*4/3];
hAngles.forEach(a => {
  const m = glowMesh(new THREE.SphereGeometry(0.3, 8, 8), 0xffffff, 0.5);
  m.position.set(Math.cos(a)*0.55, 0, Math.sin(a)*0.55);
  const e = glowEdge(new THREE.SphereGeometry(0.3, 8, 8), 0xffffff, 0.7);
  e.position.set(Math.cos(a)*0.55, 0, Math.sin(a)*0.55);
  hydroGroup.add(m); hydroGroup.add(e);
});
const hydroLight = new THREE.PointLight(0xffffff, 0, 5);
hydroLight.position.set(2.5, 1.5, 0); scene.add(hydroLight);

// ─── FUEL CELL ───────────────────────────────
const fuelCellGroup = new THREE.Group();
fuelCellGroup.position.set(4, 0, 0);
fuelCellGroup.visible = false;
scene.add(fuelCellGroup);

const fcGeo = new THREE.BoxGeometry(2, 1.5, 1);
const fcFill = glowMesh(fcGeo, 0x221100, 0.2); fcFill.position.y = 0.75;
const fcEdge = glowEdge(fcGeo, 0xffcc44, 0.85); fcEdge.position.y = 0.75;
fuelCellGroup.add(fcFill); fuelCellGroup.add(fcEdge);
const fuelCellLight = new THREE.PointLight(0xffcc44, 0, 6);
fuelCellLight.position.set(4, 1, 0); scene.add(fuelCellLight);

// ─── POWER PARTICLES ─────────────────────────
const PN = 150;
const powerArr = new Float32Array(PN * 3);
for (let i = 0; i < PN; i++) {
  powerArr[i*3]   = 4 + Math.random()*0.5;
  powerArr[i*3+1] = 0.3 + Math.random()*1.2;
  powerArr[i*3+2] = (Math.random()-0.5)*0.8;
}
const powerGeo = new THREE.BufferGeometry();
powerGeo.setAttribute('position', new THREE.BufferAttribute(powerArr, 3));
const powerPts = new THREE.Points(powerGeo,
  new THREE.PointsMaterial({ color: 0xffee00, size: 0.1, transparent:true, opacity:0 }));
scene.add(powerPts);

// ─── CITY NODES ──────────────────────────────
const cityNodes = [];
for (let i = 0; i < 5; i++) {
  const g = new THREE.Group();
  g.position.set(7 + i*1.2, 0.5, (i-2)*0.6);
  g.visible = false;
  const geo = new THREE.SphereGeometry(0.22, 8, 8);
  g.add(glowMesh(geo, 0x221100, 0.2));
  g.add(glowEdge(geo, 0xffcc44, 0.8));
  scene.add(g);
  cityNodes.push(g);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'dot'+(i<n?' done':i===n?' on':'');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct+'%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('WASTE IDENTIFIED'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — waste pile appears one by one (7s)
  { dur:7, enter() {
    setDot(1); setHUD('WASTE IDENTIFIED'); setProgress(8);
    wastePileGroup.visible = true;
    wastePileGroup.scale.setScalar(1);
    wasteBoxes.forEach(b => { b.brick.scale.setScalar(0.01); });
    setCaption('We assume energy is scarce.  That we must drill for it, mine it, burn it — and that it is running out.  One ton of waste:  we pay fifty dollars to bury it.  Then it leaks methane for thirty years — seventy times the warming power of carbon dioxide.  We pay to store a slow catastrophe.');
    speak('We assume energy is scarce. That we must drill for it, mine it, burn it — and that it is running out. One ton of waste: we pay fifty dollars to bury it. Then it leaks methane for thirty years — seventy times the warming power of carbon dioxide. We pay to store a slow catastrophe.');
  }, tick(e) {
    wasteBoxes.forEach((b, i) => {
      const delay = i * 0.5;
      const t = Math.min(1, Math.max(0, (e - delay) * 1.2));
      b.brick.scale.setScalar(Math.max(0.01, t));
    });
    setProgress(8 + (e/7)*10);
  }},

  // 2 — boxes pulse orange (6s)
  { dur:6, enter() {
    setDot(2); setHUD('ENERGY POTENTIAL'); setProgress(18);
    setCaption('What you might not know:  the landfill is the richest mine on earth.  Copper content: 4 to 8 percent.  The ore we mine today: 0.6 percent.  Ten times richer.  And buried with it, the energy — hydrocarbons, pre-extracted, self-replenishing.  We were mining the wrong thing.');
    speak('What you might not know: the landfill is the richest mine on earth. Copper content: 4 to 8 percent. The ore we mine today: 0.6 percent. Ten times richer. And buried with it, the energy — hydrocarbons, pre-extracted, self-replenishing. We were mining the wrong thing.');
  }, tick(e) {
    const pulse = 1 + Math.sin(e*4)*0.08;
    wasteBoxes.forEach((b, i) => {
      b.brick.scale.setScalar(pulse);
      b.brick.rotation.y += 0.004 * (1 + (i % 3));
    });
    setProgress(18 + (e/6)*10);
  }},

  // 3 — disintegrator rises, waste flows (8s)
  { dur:8, enter() {
    setDot(3); setHUD('DISINTEGRATOR ACTIVE'); setProgress(28);
    disintGroup.visible = true;
    disintGroup.position.y = -2;
    wasteFlowPts.material.opacity = 0.7;
    for (let i = 0; i < WN; i++) {
      wasteFlowArr[i*3]   = -3 + (Math.random()-0.5)*2;
      wasteFlowArr[i*3+1] = Math.random()*1.5;
      wasteFlowArr[i*3+2] = (Math.random()-0.5)*2;
    }
    wasteFlowGeo.attributes.position.needsUpdate = true;
    setCaption('But what if waste was the fuel?  Feed it to the disintegrator.  Plasma at 3000 degrees.  Hydrocarbons release hydrogen.');
    speak('But what if waste was the fuel? Feed it to the disintegrator. Plasma at 3000 degrees. Hydrocarbons release hydrogen.');
  }, tick(e) {
    disintGroup.position.y += (0 - disintGroup.position.y)*0.06;
    const t = Math.min(1, e*0.35);
    disintEdge.material.opacity = t*0.9;
    disintFill.material.opacity = t*0.2;
    disintLight.intensity = t*1.2 + Math.sin(e*4)*0.4;
    // the heap of blocks is fed in and consumed — it shrinks toward the disintegrator
    const consume = Math.max(0, 1 - e*0.28);
    wastePileGroup.scale.setScalar(consume);
    wastePileGroup.position.x = -3 + (1 - consume) * 3;   // slides toward the core
    for (let i = 0; i < WN; i++) {
      wasteFlowArr[i*3]   += (0 - wasteFlowArr[i*3])  *0.03;
      wasteFlowArr[i*3+1] += (1.25-wasteFlowArr[i*3+1])*0.03;
      wasteFlowArr[i*3+2] += (0 - wasteFlowArr[i*3+2])*0.03;
    }
    wasteFlowGeo.attributes.position.needsUpdate = true;
    wasteFlowPts.material.opacity = Math.max(0, 0.7 - e*0.087);
    setProgress(28 + (e/8)*12);
  }},

  // 4 — hydrogen spheres appear (8s)
  { dur:8, enter() {
    setDot(4); setHUD('HYDROGEN EXTRACTED'); setProgress(40);
    hydroGroup.visible = true;
    hydroLight.intensity = 0;
    wasteFlowPts.material.opacity = 0;
    setCaption('Hydrogen. The most abundant element in the universe. Extracted clean. No combustion. No emissions.');
    speak('Hydrogen. The most abundant element in the universe. Extracted clean. No combustion. No emissions.');
  }, tick(e) {
    hydroGroup.rotation.y += 0.02;
    hydroLight.intensity = Math.min(2, e*0.35) + Math.sin(e*3)*0.3;
    setProgress(40 + (e/8)*10);
  }},

  // 5 — fuel cell appears, hydrogen flows in (7s)
  { dur:7, enter() {
    setDot(5); setHUD('FUEL CELL ACTIVE'); setProgress(50);
    fuelCellGroup.visible = true;
    fuelCellLight.intensity = 0;
    setCaption('Into a hydrogen fuel cell. Controlled electrochemical reaction. Electricity out. Water as byproduct.');
    speak('Into a hydrogen fuel cell. Controlled electrochemical reaction. Electricity out. Water as byproduct.');
  }, tick(e) {
    const t = Math.min(1, e*0.4);
    fcEdge.material.opacity = t*0.85;
    fcFill.material.opacity = t*0.2;
    fuelCellLight.intensity = t*2 + Math.sin(e*5)*0.5;
    // hydrogen drifts toward fuel cell
    hydroGroup.position.x += (4 - hydroGroup.position.x)*0.02;
    setProgress(50 + (e/7)*10);
  }},

  // 6 — number display (8s)
  { dur:8, enter() {
    setDot(6); setHUD('NET CALCULATION'); setProgress(60);
    const nd = document.getElementById('num-display');
    nd.style.opacity = '1';
    document.getElementById('num-line1').textContent = '';
    document.getElementById('num-line2').textContent = '';
    document.getElementById('num-line3').textContent = '';
    setTimeout(() => { document.getElementById('num-line1').textContent = 'INPUT: 100 – 500 kWh'; }, 600);
    setTimeout(() => { document.getElementById('num-line2').textContent = 'OUTPUT: 789 kWh'; }, 2200);
    setTimeout(() => { document.getElementById('num-line3').textContent = 'SURPLUS: 289 – 689 kWh'; }, 4000);
    setCaption('Input: 100 to 500 kilowatt hours.  Output: 789 kilowatt hours.  Per ton of waste.  A city of one million generates 1,000 tons of waste per day.  That is 289 megawatts of surplus power.  A free power plant.  Made of garbage.');
    speak('Input: 100 to 500 kilowatt hours. Output: 789 kilowatt hours. Per ton of waste. A city of one million generates 1,000 tons of waste per day. That is 289 megawatts of surplus power. A free power plant. Made of garbage.');
  }, tick(e) {
    fuelCellLight.intensity = 2 + Math.sin(e*6)*0.8;
    setProgress(60 + (e/8)*10);
  }},

  // 7 — power particles flow to city nodes (7s)
  { dur:7, enter() {
    setDot(7); setHUD('GRID ONLINE'); setProgress(70);
    document.getElementById('num-display').style.opacity = '0';
    powerPts.material.opacity = 0.8;
    for (let i = 0; i < PN; i++) {
      powerArr[i*3]   = 4 + Math.random()*0.5;
      powerArr[i*3+1] = 0.3 + Math.random()*1.2;
      powerArr[i*3+2] = (Math.random()-0.5)*0.8;
    }
    powerGeo.attributes.position.needsUpdate = true;
    setCaption('Every landfill. Every waste stream. Every city. Energy positive. Forever.');
    speak('Every landfill. Every waste stream. Every city. Energy positive. Forever.');
  }, tick(e) {
    // particles flow right
    for (let i = 0; i < PN; i++) {
      powerArr[i*3] += 0.06;
      if (powerArr[i*3] > 14) { powerArr[i*3] = 4; powerArr[i*3+1] = 0.3+Math.random()*1.2; }
    }
    powerGeo.attributes.position.needsUpdate = true;
    // light up city nodes sequentially
    cityNodes.forEach((cn, i) => {
      if (e > i*1.2) cn.visible = true;
    });
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera back, statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('NET SURPLUS', 'Waste is the fuel · Landfill is the mine · The energy crisis was a choice', true);
    speak('Net surplus. Waste is the fuel. The landfill is the mine. Methane stopped. Copper recovered. 289 megawatts per city per day, from what we were burying. The energy crisis was never a resource problem. It was a technology choice.');
  }, tick(e) {
    camera.position.z = 10 + e*0.28;
    camera.position.y = 4  + e*0.16;
    camera.lookAt(0, 1.5, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  document.getElementById('num-display').style.opacity = '0';
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'energy' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step+1);
  }

  if (hydroGroup.visible) hydroGroup.rotation.y += 0.015;
  floor.material.opacity = 0.3 + Math.sin(t*0.4)*0.07;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
