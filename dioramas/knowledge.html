<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Day All Knowledge Becomes Free</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#003322;
  z-index:45; pointer-events:none; line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>The Day All Knowledge Becomes Free</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  KNOWLEDGE BRANCH · NODE 07<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI/2; floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity, wireframe:false }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
}

// ─── VAULT ───────────────────────────────────
const vaultGroup = new THREE.Group();
vaultGroup.position.set(0, 0, 0);
scene.add(vaultGroup);

const vaultGeo = new THREE.BoxGeometry(3, 4, 2);
const vaultFill = glowMesh(vaultGeo, 0x220000, 0.2);
vaultFill.position.y = 2;
const vaultEdge = glowEdge(vaultGeo, 0xff2222, 0);
vaultEdge.position.y = 2;
vaultGroup.add(vaultFill); vaultGroup.add(vaultEdge);

// Lock — torus on front face
const lockGeo = new THREE.TorusGeometry(0.35, 0.07, 8, 24);
const lockMesh = new THREE.Mesh(lockGeo,
  new THREE.MeshBasicMaterial({ color: 0xff2222, transparent:true, opacity:0 }));
lockMesh.position.set(0, 2, 1.02);
vaultGroup.add(lockMesh);

const lockLight = new THREE.PointLight(0xff2222, 0, 4);
lockLight.position.set(0, 2, 2); scene.add(lockLight);

// ─── QUANTUM COMPUTER ────────────────────────
const qcGroup = new THREE.Group();
qcGroup.position.set(-4, 2, 0);
qcGroup.visible = false;
scene.add(qcGroup);

const qcGeo = new THREE.TorusKnotGeometry(1, 0.3, 80, 8);
const qcFill = glowMesh(qcGeo, 0x330044, 0.2);
const qcEdge = glowEdge(qcGeo, 0xff44ff, 0.8);
qcGroup.add(qcFill); qcGroup.add(qcEdge);

const qcLight = new THREE.PointLight(0xff44ff, 0, 6);
qcLight.position.set(-4, 2, 0); scene.add(qcLight);

// ─── LOCK PARTICLES (scatter on Q-Day) ───────
const LPN = 60;
const lockArr = new Float32Array(LPN * 3);
for (let i = 0; i < LPN; i++) {
  lockArr[i*3]   = (Math.random()-0.5)*0.5;
  lockArr[i*3+1] = 2 + (Math.random()-0.5)*0.5;
  lockArr[i*3+2] = 1;
}
const lockGeoP = new THREE.BufferGeometry();
lockGeoP.setAttribute('position', new THREE.BufferAttribute(lockArr, 3));
const lockPts = new THREE.Points(lockGeoP,
  new THREE.PointsMaterial({ color: 0xff2222, size: 0.1, transparent:true, opacity:0 }));
scene.add(lockPts);

// ─── INFO PARTICLES ───────────────────────────
const IPN = 200;
const infoArr = new Float32Array(IPN * 3);
for (let i = 0; i < IPN; i++) {
  infoArr[i*3]   = (Math.random()-0.5)*0.5;
  infoArr[i*3+1] = 1 + Math.random()*3;
  infoArr[i*3+2] = (Math.random()-0.5)*0.5;
}
const infoGeo = new THREE.BufferGeometry();
infoGeo.setAttribute('position', new THREE.BufferAttribute(infoArr, 3));
const infoPts = new THREE.Points(infoGeo,
  new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.09, transparent:true, opacity:0 }));
scene.add(infoPts);

// Velocities for info particles
const infoVel = new Float32Array(IPN * 3);
for (let i = 0; i < IPN; i++) {
  const a = Math.random()*Math.PI*2;
  const sp = 0.5 + Math.random()*1.5;
  infoVel[i*3]   = Math.cos(a)*sp;
  infoVel[i*3+1] = (Math.random()-0.3)*sp;
  infoVel[i*3+2] = Math.sin(a)*sp;
}

// ─── GLOBE ───────────────────────────────────
const globeGroup = new THREE.Group();
globeGroup.position.set(4, 2, 0);
globeGroup.visible = false;
scene.add(globeGroup);

const globeGeo = new THREE.IcosahedronGeometry(1.5, 2);
const globeFill = glowMesh(globeGeo, 0x001122, 0.15);
const globeEdge = glowEdge(globeGeo, 0x00ffcc, 0.7);
globeGroup.add(globeFill); globeGroup.add(globeEdge);

const globeLight = new THREE.PointLight(0x00ffcc, 0, 6);
globeLight.position.set(4, 2, 0); scene.add(globeLight);

// ─── CONNECTION LINES FROM GLOBE ─────────────
const globeLines = [];
for (let i = 0; i < 8; i++) {
  const a = (i/8)*Math.PI*2;
  const r = 6;
  const endPt = new THREE.Vector3(4 + Math.cos(a)*r, 2 + Math.sin(a*0.5)*2, Math.sin(a)*r*0.5);
  const startPt = new THREE.Vector3(4, 2, 0);
  const ln = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([startPt, endPt]),
    new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent:true, opacity:0 })
  );
  scene.add(ln);
  globeLines.push(ln);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'dot'+(i<n?' done':i===n?' on':'');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct+'%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;
let infoPhase = 'idle'; // 'burst', 'expand', 'orbit'

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('VAULT IDENTIFIED'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — vault visible, lock pulses red (8s)
  { dur:8, enter() {
    setDot(1); setHUD('VAULT IDENTIFIED'); setProgress(8);
    vaultEdge.material.opacity = 0;
    vaultFill.material.opacity = 0;
    lockMesh.material.opacity = 0;
    // fade vault in
    setCaption('Every pharmaceutical formula. Every manufacturing process. Every seed genome. Every suppressed trial result. Locked.');
    speak('Every pharmaceutical formula. Every manufacturing process. Every seed genome. Every suppressed trial result. Locked.');
  }, tick(e) {
    const t = Math.min(1, e*0.3);
    vaultEdge.material.opacity = t*0.75;
    vaultEdge.material.color.setHex(0xff2222);
    vaultFill.material.opacity = t*0.2;
    lockMesh.material.opacity = t*0.9;
    lockLight.intensity = t*1.5 + Math.sin(e*5)*0.5;
    setProgress(8 + (e/8)*10);
  }},

  // 2 — vault pulses (7s)
  { dur:7, enter() {
    setDot(2); setHUD('HUMAN COST'); setProgress(18);
    setCaption('The locks generate trillions in profit for thousands. The cost: millions of lives that couldn\'t afford what the vault held.');
    speak('The locks generate trillions in profit for thousands. The cost: millions of lives that couldn\'t afford what the vault held.');
  }, tick(e) {
    const pulse = 1 + Math.sin(e*4)*0.04;
    vaultGroup.scale.setScalar(pulse);
    lockLight.intensity = 1.5 + Math.sin(e*5)*0.8;
    vaultEdge.material.color.setHSL(0, 1, 0.45 + Math.sin(e*4)*0.1);
    setProgress(18 + (e/7)*10);
  }},

  // 3 — quantum computer appears (8s)
  { dur:8, enter() {
    setDot(3); setHUD('QUANTUM ACTIVE'); setProgress(28);
    qcGroup.visible = true;
    qcLight.intensity = 0;
    setCaption('Shor\'s algorithm. A quantum computer large enough. RSA encryption — the lock on every corporate vault — breaks in polynomial time.');
    speak('Shor\'s algorithm. A quantum computer large enough. RSA encryption — the lock on every corporate vault — breaks in polynomial time.');
  }, tick(e) {
    qcGroup.rotation.x += 0.015;
    qcGroup.rotation.y += 0.02;
    const t = Math.min(1, e*0.3);
    qcEdge.material.opacity = t*0.8;
    qcFill.material.opacity = t*0.2;
    qcLight.intensity = t*2.5 + Math.sin(e*4)*0.5;
    setProgress(28 + (e/8)*12);
  }},

  // 4 — QC moves toward vault, lock scatter (8s)
  { dur:8, enter() {
    setDot(4); setHUD('ENCRYPTION BROKEN'); setProgress(40);
    // init lock particles
    for (let i = 0; i < LPN; i++) {
      lockArr[i*3]   = (Math.random()-0.5)*0.5;
      lockArr[i*3+1] = 2 + (Math.random()-0.5)*0.5;
      lockArr[i*3+2] = 1;
    }
    lockGeoP.attributes.position.needsUpdate = true;
    setCaption('Q-Day. The technical barrier falls. Every encrypted database becomes readable. The locks are gone.');
    speak('Q-Day. The technical barrier falls. Every encrypted database becomes readable. The locks are gone.');
  }, tick(e) {
    // QC moves toward vault
    qcGroup.position.x += (0 - qcGroup.position.x)*0.04;
    qcGroup.rotation.x += 0.02;
    qcGroup.rotation.y += 0.03;

    if (e > 2.5) {
      // lock scatter
      lockPts.material.opacity = Math.max(0, 0.8 - (e-2.5)*0.16);
      lockMesh.material.opacity = Math.max(0, 0.9 - (e-2.5)*0.18);
      lockLight.intensity = Math.max(0, 1.5 - (e-2.5)*0.3);
      for (let i = 0; i < LPN; i++) {
        lockArr[i*3]   += (Math.random()-0.5)*0.15;
        lockArr[i*3+1] += (Math.random()-0.3)*0.1;
        lockArr[i*3+2] += Math.random()*0.1;
      }
      lockGeoP.attributes.position.needsUpdate = true;
      // vault shifts to cyan
      vaultEdge.material.color.set(0x00ffcc);
      lockPts.material.opacity = Math.max(0, 0.8 - (e-2.5)*0.16);
    }
    setProgress(40 + (e/8)*10);
  }},

  // 5 — info particles flood out (8s)
  { dur:8, enter() {
    setDot(5); setHUD('KNOWLEDGE RELEASED'); setProgress(50);
    infoPhase = 'burst';
    lockPts.material.opacity = 0;
    // init info particles at vault center
    for (let i = 0; i < IPN; i++) {
      infoArr[i*3]   = (Math.random()-0.5)*0.3;
      infoArr[i*3+1] = 1.5 + Math.random()*1.5;
      infoArr[i*3+2] = (Math.random()-0.5)*0.3;
    }
    infoGeo.attributes.position.needsUpdate = true;
    infoPts.material.opacity = 0.85;
    setCaption('Not stolen. Returned. It was always humanity\'s knowledge. The scientist\'s discovery. The engineer\'s insight. Paid for by civilization.');
    speak('Not stolen. Returned. It was always humanity\'s knowledge. The scientist\'s discovery. The engineer\'s insight. Paid for by civilization.');
  }, tick(e) {
    for (let i = 0; i < IPN; i++) {
      infoArr[i*3]   += infoVel[i*3]   * 0.03;
      infoArr[i*3+1] += infoVel[i*3+1] * 0.03;
      infoArr[i*3+2] += infoVel[i*3+2] * 0.03;
    }
    infoGeo.attributes.position.needsUpdate = true;
    setProgress(50 + (e/8)*10);
  }},

  // 6 — particles reform as globe (7s)
  { dur:7, enter() {
    setDot(6); setHUD('COMMONS FORMING'); setProgress(60);
    globeGroup.visible = true;
    globeLight.intensity = 0;
    setCaption('Drug formulas. Manufacturing processes. Agricultural genetics. Energy systems. All in the commons. All free.');
    speak('Drug formulas. Manufacturing processes. Agricultural genetics. Energy systems. All in the commons. All free.');
  }, tick(e) {
    const t = Math.min(1, e*0.3);
    globeEdge.material.opacity = t*0.7;
    globeFill.material.opacity = t*0.15;
    globeLight.intensity = t*2 + Math.sin(e*3)*0.4;
    globeGroup.rotation.y += 0.015;
    // particles drift toward globe
    for (let i = 0; i < IPN; i++) {
      infoArr[i*3]   += (4 - infoArr[i*3])   * 0.02;
      infoArr[i*3+1] += (2 - infoArr[i*3+1]) * 0.02;
      infoArr[i*3+2] += (0 - infoArr[i*3+2]) * 0.02;
    }
    infoGeo.attributes.position.needsUpdate = true;
    infoPts.material.opacity = Math.max(0.2, 0.85 - e*0.09);
    setProgress(60 + (e/7)*10);
  }},

  // 7 — connection lines radiate (7s)
  { dur:7, enter() {
    setDot(7); setHUD('OPEN WORLD'); setProgress(70);
    infoPts.material.opacity = 0;
    setCaption('Those who can implement it thrive. The knowledge is free. The expertise is the value. The trust is the business.');
    speak('Those who can implement it thrive. The knowledge is free. The expertise is the value. The trust is the business.');
  }, tick(e) {
    globeGroup.rotation.y += 0.012;
    globeLines.forEach((ln, i) => {
      const delay = i * 0.5;
      if (e > delay) {
        ln.material.opacity = Math.min(0.65, (e-delay)*0.2) + Math.sin(e*3+i)*0.12;
      }
    });
    globeLight.intensity = 2 + Math.sin(e*2)*0.5;
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera back, statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('ALL KNOWLEDGE FREE', 'The commons that was always ours.', true);
    speak('All knowledge free. The commons that was always ours.');
  }, tick(e) {
    camera.position.z = 10 + e*0.28;
    camera.position.y = 4  + e*0.16;
    camera.lookAt(0, 1.5, 0);
    globeGroup.rotation.y += 0.008;
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'knowledge' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step+1);
  }

  // QC constant spin
  if (qcGroup.visible) {
    qcGroup.rotation.x += 0.008;
    qcGroup.rotation.y += 0.012;
  }

  floor.material.opacity = 0.3 + Math.sin(t*0.4)*0.07;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
