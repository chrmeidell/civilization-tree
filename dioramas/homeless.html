<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homelessness of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

/* ── PROGRESS BAR ─────────────────────────── */
#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

/* ── CAPTION ──────────────────────────────── */
#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

/* ── BIG STATEMENT ────────────────────────── */
#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

/* ── TITLE CARD ───────────────────────────── */
#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

/* ── STEP DOTS ────────────────────────────── */
#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

/* ── SKIP ─────────────────────────────────── */
#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

/* ── COMPLETE ─────────────────────────────── */
#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

/* ── DATA READOUT (HUD) ───────────────────── */
#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#003322;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

/* scanlines */
body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Homelessness of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  SHELTER BRANCH · NODE 01<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.02;
scene.add(floor);

// ─── BUILDINGS (holographic wireframes) ─────

function holo_building(x, z, w, h, d) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0x003322, transparent: true, opacity: 0.6 })
  );
  edge.position.set(x, h/2, z);
  scene.add(edge);
  // Faint fill
  const fill = new THREE.Mesh(
    geo,
    new THREE.MeshBasicMaterial({ color: 0x001208, transparent: true, opacity: 0.4 })
  );
  fill.position.set(x, h/2, z);
  scene.add(fill);
}

holo_building(-9, -5, 2.8, 14, 2);
holo_building(-6, -6, 2.2, 9, 2);
holo_building( 7, -5, 3.2, 16, 2);
holo_building(10, -6, 2.4, 11, 2);
holo_building(-12,-5, 3.8, 8, 2);

// ─── PERSON (glowing wireframe silhouette) ──

const personGroup = new THREE.Group();
personGroup.position.set(-1.2, 0, 2);
personGroup.visible = false;
scene.add(personGroup);

function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, transparent: true, opacity, wireframe: false
  }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// Body
const bodyGeo = new THREE.CylinderGeometry(0.28, 0.28, 1.1, 8);
const bodyMesh = glowMesh(bodyGeo, 0x00ffcc, 0.15);
bodyMesh.position.y = 0.9;
const bodyEdge = glowEdge(bodyGeo, 0x00ffcc, 0.9);
bodyEdge.position.y = 0.9;
personGroup.add(bodyMesh); personGroup.add(bodyEdge);

// Head
const headGeo = new THREE.IcosahedronGeometry(0.24, 1);
const headMesh = glowMesh(headGeo, 0x00ffcc, 0.15);
headMesh.position.y = 1.72;
const headEdge = glowEdge(headGeo, 0x00ffcc, 0.9);
headEdge.position.y = 1.72;
personGroup.add(headMesh); personGroup.add(headEdge);

// Legs
[-0.16, 0.16].forEach(x => {
  const lGeo = new THREE.CylinderGeometry(0.1, 0.09, 0.72, 6);
  const lm = glowMesh(lGeo, 0x00ffcc, 0.1);
  lm.position.set(x, 0.36, 0);
  const le = glowEdge(lGeo, 0x00ffcc, 0.7);
  le.position.set(x, 0.36, 0);
  personGroup.add(lm); personGroup.add(le);
});

// Person glow light
const personLight = new THREE.PointLight(0x00ffcc, 0, 5);
personLight.position.set(-1.2, 1.5, 2);
scene.add(personLight);

// ─── CONTAINER ──────────────────────────────

const contGroup = new THREE.Group();
contGroup.position.set(2.5, 0, 0.5);
contGroup.visible = false;
scene.add(contGroup);

const contGeo = new THREE.BoxGeometry(2.5, 3.2, 2.0);
const contFill = new THREE.Mesh(
  contGeo,
  new THREE.MeshBasicMaterial({ color: 0x003322, transparent: true, opacity: 0 })
);
contFill.position.y = 1.6; contGroup.add(contFill);

const contEdge = new THREE.LineSegments(
  new THREE.EdgesGeometry(contGeo),
  new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 })
);
contEdge.position.y = 1.6; contGroup.add(contEdge);

const contGlow = new THREE.PointLight(0x00ffcc, 0, 8);
contGlow.position.set(2.5, 2, 0.5);
scene.add(contGlow);

// ─── ROBOT ──────────────────────────────────

const robotGroup = new THREE.Group();
robotGroup.position.set(7, 0, 1);
robotGroup.visible = false;
scene.add(robotGroup);

const rbGeo = new THREE.CylinderGeometry(0.38, 0.42, 0.22, 10);
const rbFill = glowMesh(rbGeo, 0x00ccff, 0.12); rbFill.position.y = 0.11;
const rbEdge = glowEdge(rbGeo, 0x00ccff, 0.8); rbEdge.position.y = 0.11;
robotGroup.add(rbFill); robotGroup.add(rbEdge);

const rtGeo = new THREE.CylinderGeometry(0.28, 0.38, 1.1, 10);
const rtFill = glowMesh(rtGeo, 0x00ccff, 0.12); rtFill.position.y = 0.77;
const rtEdge = glowEdge(rtGeo, 0x00ccff, 0.8); rtEdge.position.y = 0.77;
robotGroup.add(rtFill); robotGroup.add(rtEdge);

// Sensor eye — always bright
const sensor = new THREE.Mesh(
  new THREE.SphereGeometry(0.14, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x00ffcc })
);
sensor.position.y = 1.42;
robotGroup.add(sensor);

const robotLight = new THREE.PointLight(0x00ccff, 0.8, 5);
robotLight.position.set(0, 1.5, 0);
robotGroup.add(robotLight);

// ─── SCAN RING ──────────────────────────────

const ringGeo = new THREE.TorusGeometry(0.42, 0.022, 6, 32);
const scanRing = new THREE.Mesh(
  ringGeo,
  new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 })
);
scanRing.visible = false;
scene.add(scanRing);

// Scan data lines — vertical lines around person
const scanLines = new THREE.Group(); scene.add(scanLines); scanLines.visible = false;
for (let i = 0; i < 6; i++) {
  const a = (i / 6) * Math.PI * 2;
  const pts = [
    new THREE.Vector3(Math.cos(a)*0.55, 0, Math.sin(a)*0.55),
    new THREE.Vector3(Math.cos(a)*0.55, 2, Math.sin(a)*0.55),
  ];
  const ln = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.25 })
  );
  scanLines.add(ln);
}

// ─── PARTICLES ──────────────────────────────

const N = 220;
const pArr = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  const a = Math.random() * Math.PI * 2, r = 6 + Math.random() * 8;
  pArr[i*3]   = Math.cos(a) * r;
  pArr[i*3+1] = Math.random() * 3;
  pArr[i*3+2] = Math.sin(a) * r;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
const particles = new THREE.Points(
  pGeo,
  new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.09, transparent: true, opacity: 0 })
);
scene.add(particles);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

const TOTAL_DUR = 64;
let elapsed_total = 0;

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}

function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}

function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}

function setHUD(txt) {
  document.getElementById('hud-state').textContent = txt;
}

function setProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0;
let isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO');
    setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => {
      tc.style.opacity = '0';
      setTimeout(() => { tc.style.display = 'none'; }, 1000);
    }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — person appears (7s)
  { dur:7, enter() {
    setDot(1); setHUD('SUBJECT IDENTIFIED');
    setProgress(8);
    personGroup.visible = true;
    personGroup.scale.setScalar(0.01);
    personLight.intensity = 0;
    setCaption('A person.  On a street.  One of millions.');
    speak('A person. On a street. One of millions.');
  }, tick(e) {
    const t = Math.min(1, e * 0.55);
    personGroup.scale.setScalar(t);
    personLight.intensity = t * 1.5;
    setProgress(8 + (e/7)*10);
  }},

  // 2 — container appears (8s)
  { dur:8, enter() {
    setDot(2); setHUD('CONTAINER DEPLOYED');
    setProgress(18);
    contGroup.visible = true;
    setCaption('A container arrives.  Not a shelter.  A manufacturing unit.');
    speak('A container arrives. Not a shelter. A manufacturing unit.');
    // scatter particles toward container
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2, r = 6 + Math.random() * 8;
      pArr[i*3]   = Math.cos(a) * r;
      pArr[i*3+1] = Math.random() * 3;
      pArr[i*3+2] = Math.sin(a) * r;
    }
    pGeo.attributes.position.needsUpdate = true;
    particles.material.opacity = 0.6;
    particles.material.color.set(0xffaa44);
  }, tick(e) {
    const t = Math.min(1, e * 0.45);
    contFill.material.opacity = t * 0.25;
    contEdge.material.opacity = t;
    contGlow.intensity = t * 1.2;
    // particles flow to container
    for (let i = 0; i < N; i++) {
      pArr[i*3]   += (2.5 - pArr[i*3])   * 0.02;
      pArr[i*3+1] += (1.6 - pArr[i*3+1]) * 0.02;
      pArr[i*3+2] += (0.5 - pArr[i*3+2]) * 0.02;
    }
    pGeo.attributes.position.needsUpdate = true;
    setProgress(18 + (e/8)*12);
  }},

  // 3 — robot approaches (7s)
  { dur:7, enter() {
    setDot(3); setHUD('UNIT RESPONDING');
    setProgress(30);
    robotGroup.visible = true;
    robotGroup.position.set(6, 0, 1.5);
    setCaption('A robot approaches.  Its only directive:  meet needs.');
    speak('A robot approaches. Its only directive: meet needs.');
    particles.material.opacity = 0;
  }, tick(e) {
    robotGroup.position.x += (-0.3 - robotGroup.position.x) * 0.04;
    robotGroup.position.z += (1.7 - robotGroup.position.z) * 0.04;
    robotLight.intensity = 0.6 + Math.sin(e * 3) * 0.2;
    setProgress(30 + (e/7)*10);
  }},

  // 4 — scan (7s)
  { dur:7, enter() {
    setDot(4); setHUD('BIOMETRIC SCAN');
    setProgress(40);
    scanRing.visible = true;
    scanLines.visible = true;
    scanLines.position.copy(personGroup.position);
    scanRing.position.set(personGroup.position.x, 0, personGroup.position.z);
    scanRing.material.opacity = 1;
    setCaption('A body scan.  Three seconds.  Every measurement recorded.');
    speak('A body scan. Three seconds. Every measurement recorded.');
  }, tick(e) {
    scanRing.position.y = 0.05 + (e % 1.8) * 1.05;
    scanRing.material.opacity = 0.6 + Math.sin(e * 8) * 0.4;
    scanLines.children.forEach((l, i) => {
      l.material.opacity = 0.15 + Math.sin(e * 5 + i) * 0.12;
    });
    setProgress(40 + (e/7)*10);
  }},

  // 5 — processing (7s)
  { dur:7, enter() {
    setDot(5); setHUD('DISINTEGRATOR ACTIVE');
    setProgress(50);
    scanRing.visible = false; scanLines.visible = false;
    // new particles from container area
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2, r = 0.3 + Math.random() * 1.2;
      pArr[i*3]   = 2.5 + Math.cos(a) * r;
      pArr[i*3+1] = Math.random() * 3.2;
      pArr[i*3+2] = 0.5 + Math.sin(a) * r;
    }
    pGeo.attributes.position.needsUpdate = true;
    particles.material.color.set(0x00ffcc);
    particles.material.opacity = 0.8;
    setCaption('Waste collected.  Elements recovered.  Clean.');
    speak('Waste collected. Elements recovered. Clean.');
  }, tick(e) {
    contGlow.intensity = 1.5 + Math.sin(e * 6) * 0.7;
    contFill.material.opacity = 0.15 + Math.sin(e * 5) * 0.1;
    // orbiting particles
    for (let i = 0; i < N; i++) {
      const a = Math.atan2(pArr[i*3+2] - 0.5, pArr[i*3] - 2.5) + 0.025;
      const r = Math.sqrt((pArr[i*3]-2.5)**2 + (pArr[i*3+2]-0.5)**2);
      const nr = Math.max(0.2, r - 0.015);
      pArr[i*3]   = 2.5 + Math.cos(a) * nr;
      pArr[i*3+2] = 0.5 + Math.sin(a) * nr;
      pArr[i*3+1] += (1.6 - pArr[i*3+1]) * 0.01;
    }
    pGeo.attributes.position.needsUpdate = true;
    setProgress(50 + (e/7)*10);
  }},

  // 6 — synthesis (6s)
  { dur:6, enter() {
    setDot(6); setHUD('SYNTHESIZING');
    setProgress(60);
    setCaption('Manufacturing to exact specification.  Every measurement used.');
    speak('Manufacturing to exact specification. Every measurement used.');
  }, tick(e) {
    contGlow.intensity = 2 + Math.sin(e * 8) * 1;
    particles.material.opacity = 0.8 - (e/6) * 0.7;
    setProgress(60 + (e/6)*10);
  }},

  // 7 — delivery (7s)
  { dur:7, enter() {
    setDot(7); setHUD('DELIVERY COMPLETE');
    setProgress(70);
    particles.material.opacity = 0;
    contGlow.intensity = 0.5;
    setCaption('Twelve minutes.  Fitted clothing from waste.  Warm.  Dignified.');
    speak('Twelve minutes. Fitted clothing from waste. Warm. Dignified.');
  }, tick(e) {
    // Robot moves to person
    robotGroup.position.x += (0.3 - robotGroup.position.x) * 0.03;
    robotGroup.position.z += (1.85 - robotGroup.position.z) * 0.03;
    robotLight.intensity = 0.5 + Math.sin(e * 2) * 0.2;
    setProgress(70 + (e/7)*10);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE');
    setProgress(80);
    setCaption('');
    showStatement('NOT CHARITY', 'Infrastructure · Like water · Like electricity', true);
    speak('This is not charity. This is infrastructure. Like water. Like electricity. The future of homelessness: a solved problem.');
  }, tick(e) {
    // Camera pull back
    camera.position.z = 10 + e * 0.28;
    camera.position.y = 4  + e * 0.16;
    camera.lookAt(0, 1.5, 0);
    // fade statement near end
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'homeless' }, '*'); } catch(e) {}
  setTimeout(() => {
    try {
      const btn = window.parent.document.getElementById('btn-close');
      if (btn) btn.click();
    } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n;
  stepT = 0;
  if (n < STEPS.length) {
    STEPS[n].enter();
  } else {
    complete();
  }
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  // Breathing — person
  if (personGroup.visible) {
    personGroup.position.y = Math.sin(t * 1.1) * 0.025;
  }

  // Robot sensor pulse
  if (robotGroup.visible) {
    sensor.material.color.setHSL(0.5, 1, 0.5 + Math.sin(t * 5) * 0.1);
  }

  // Floor breathe
  floor.material.opacity = 0.3 + Math.sin(t * 0.4) * 0.07;

  // Camera gentle sway (only when not in step 8)
  if (step < 8 || step < 0) {
    camera.position.x = Math.sin(t * 0.07) * 0.5;
  }

  renderer.render(scene, camera);
}

// Preload voices (Chrome async)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
