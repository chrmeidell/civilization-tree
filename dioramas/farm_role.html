<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Farm Is Everywhere</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#0a0d00; z-index:50;
}
#progress-fill {
  height:2px; background:#88ff44;
  box-shadow:0 0 8px #88ff44;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#88ff44; text-shadow:0 0 40px rgba(136,255,68,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#224400;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#88ff44; text-shadow:0 0 50px rgba(136,255,68,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#1a2200; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#0d1100; transition:all 0.4s; }
.dot.on   { background:#88ff44; box-shadow:0 0 6px #88ff44; }
.dot.done { background:#1a2200; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #1a2200; color:#224400;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#447700; color:#88ff44; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#8ec23a;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(136,255,68,0.003) 2px,rgba(136,255,68,0.003) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>The Farm Is Everywhere</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  FOOD BRANCH · NODE 09<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
function makeSky(topHex, horizonHex) {
  const c = document.createElement('canvas');
  c.width = 16; c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0.00, topHex);
  grad.addColorStop(0.52, topHex);
  grad.addColorStop(0.70, horizonHex);
  grad.addColorStop(0.78, horizonHex);
  grad.addColorStop(1.00, topHex);
  g.fillStyle = grad; g.fillRect(0, 0, 16, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
  return tex;
}
scene.background = makeSky('#0e1408', '#2a3c18');

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 6, 14);
camera.lookAt(0, 2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const keyL = new THREE.DirectionalLight(0xaaff44, 1.6);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── GROUND GRID ─────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(100,150,0,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x334400, transparent: true, opacity: 0.3 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ─────────────────────────────────

function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, transparent: true, opacity
  }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// ─── TRADITIONAL FARM (one big flat rectangle) ─

const farmGroup = new THREE.Group();
scene.add(farmGroup);
const farmGeo = new THREE.BoxGeometry(12, 0.08, 8);
const farmFill = glowMesh(farmGeo, 0x442200, 0.4);
farmFill.position.set(0, 0.04, -2);
const farmEdge = glowEdge(farmGeo, 0x886633, 0.5);
farmEdge.position.set(0, 0.04, -2);
farmGroup.add(farmFill); farmGroup.add(farmEdge);

// Rows of crops — small boxes
const cropRows = [];
for (let row = 0; row < 5; row++) {
  for (let col = 0; col < 8; col++) {
    const h = 0.15 + Math.random() * 0.25;
    const geo = new THREE.BoxGeometry(0.2, h, 0.2);
    const m = glowMesh(geo, 0x44aa11, 0.6);
    m.position.set(-4.5 + col * 1.3, h/2, -4.5 + row * 1.5);
    farmGroup.add(m);
    cropRows.push(m);
  }
}

// ─── CITY BUILDINGS with growing panels ──────

const cityGroup = new THREE.Group();
cityGroup.visible = false;
scene.add(cityGroup);

const buildingData = [
  {x:-7, z:-3, w:2.2, h:10, d:2.2},
  {x:-4, z:-4, w:1.8, h:7,  d:1.8},
  {x: 4, z:-3, w:2.8, h:12, d:2.2},
  {x: 7, z:-4, w:2.0, h:8,  d:2.0},
  {x: 0, z:-5, w:3.0, h:9,  d:2.5},
];
const growPanels = [];

buildingData.forEach(b => {
  const bg = new THREE.BoxGeometry(b.w, b.h, b.d);
  const bFill = glowMesh(bg, 0x111800, 0.5);
  bFill.position.set(b.x, b.h/2, b.z);
  const bEdge = glowEdge(bg, 0x334400, 0.4);
  bEdge.position.set(b.x, b.h/2, b.z);
  cityGroup.add(bFill); cityGroup.add(bEdge);

  // Growing panels on facade — small green tiles
  const panels = Math.floor(b.h / 1.4);
  for (let p = 0; p < panels; p++) {
    const pg = new THREE.BoxGeometry(b.w - 0.1, 0.3, 0.1);
    const pm = glowMesh(pg, 0x44cc11, 0.0);
    pm.position.set(b.x, 0.8 + p * 1.3, b.z + b.d/2 + 0.06);
    cityGroup.add(pm);
    growPanels.push(pm);
  }
});

// ─── VERTICAL TOWERS (stacked trays) ─────────

const towerGroup = new THREE.Group();
towerGroup.visible = false;
scene.add(towerGroup);

const towerPositions = [[-3, 1], [3, 1], [0, -2]];
towerPositions.forEach(([tx, tz]) => {
  const tg = new THREE.CylinderGeometry(0.1, 0.1, 8, 6);
  const tm = glowMesh(tg, 0x224400, 0.6);
  tm.position.set(tx, 4, tz);
  const te = glowEdge(tg, 0x88cc44, 0.5);
  te.position.set(tx, 4, tz);
  towerGroup.add(tm); towerGroup.add(te);

  for (let level = 0; level < 7; level++) {
    const tray = new THREE.BoxGeometry(1.2, 0.06, 1.2);
    const tm2 = glowMesh(tray, 0x336600, 0.5);
    tm2.position.set(tx, 0.8 + level * 1.05, tz);
    const te2 = glowEdge(tray, 0x88ff44, 0.7);
    te2.position.set(tx, 0.8 + level * 1.05, tz);
    towerGroup.add(tm2); towerGroup.add(te2);
  }
});

// ─── DESIGNER PERSON (farmer as systems thinker) ─

const personGroup = new THREE.Group();
personGroup.position.set(0, 0, 4);
personGroup.visible = false;
scene.add(personGroup);

const bodyGeo = new THREE.CylinderGeometry(0.28, 0.28, 1.1, 8);
const bm = glowMesh(bodyGeo, 0x88ff44, 0.15); bm.position.y = 0.9;
const be = glowEdge(bodyGeo, 0x88ff44, 0.9); be.position.y = 0.9;
const headGeo = new THREE.IcosahedronGeometry(0.24, 1);
const hm = glowMesh(headGeo, 0x88ff44, 0.15); hm.position.y = 1.72;
const he = glowEdge(headGeo, 0x88ff44, 0.9); he.position.y = 1.72;
personGroup.add(bm); personGroup.add(be);
personGroup.add(hm); personGroup.add(he);
[-0.16, 0.16].forEach(x => {
  const lg = new THREE.CylinderGeometry(0.1, 0.09, 0.72, 6);
  const lm = glowMesh(lg, 0x88ff44, 0.1); lm.position.set(x, 0.36, 0);
  const le = glowEdge(lg, 0x88ff44, 0.7); le.position.set(x, 0.36, 0);
  personGroup.add(lm); personGroup.add(le);
});

// Data arc above person
const arcRings = [];
for (let i = 0; i < 3; i++) {
  const ag = new THREE.TorusGeometry(0.5 + i * 0.3, 0.015, 6, 32);
  const am = new THREE.Mesh(ag, new THREE.MeshBasicMaterial({ color: 0xaaff44, transparent: true, opacity: 0 }));
  am.position.set(0, 2.3 + i * 0.2, 0);
  am.rotation.x = Math.PI / 2;
  personGroup.add(am);
  arcRings.push(am);
}

// ─── FOOD PARTICLES ──────────────────────────

const fN = 200;
const fArr = new Float32Array(fN * 3);
for (let i = 0; i < fN; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 8;
  fArr[i*3]   = Math.cos(a) * r;
  fArr[i*3+1] = Math.random() * 8;
  fArr[i*3+2] = Math.sin(a) * r - 2;
}
const fGeo = new THREE.BufferGeometry();
fGeo.setAttribute('position', new THREE.BufferAttribute(fArr, 3));
const foodDots = new THREE.Points(
  fGeo,
  new THREE.PointsMaterial({ color: 0x88ff44, size: 0.08, transparent: true, opacity: 0 })
);
scene.add(foodDots);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  document.getElementById('statement').style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => {
      tc.style.opacity = '0';
      setTimeout(() => { tc.style.display = 'none'; }, 1000);
    }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — traditional farm (7s)
  { dur:7, enter() {
    setDot(1); setHUD('TRADITIONAL MODEL'); setProgress(8);
    setCaption('We assume food comes from farms.  Distant fields.  Monoculture.  Two harvests a year.  The food on your plate traveled an average of 2,000 kilometres to reach you.  Half its nutrition lost on the way.');
    speak('We assume food comes from farms. Distant fields. Monoculture. Two harvests a year. The food on your plate traveled an average of 2,000 kilometres to reach you. Half its nutrition lost on the way.');
  }, tick(e) {
    cropRows.forEach((c, i) => {
      c.position.y = c.geometry.parameters.height/2 + Math.sin(e * 1.2 + i * 0.3) * 0.03;
    });
    setProgress(8 + (e/7)*10);
  }},

  // 2 — the problem (6s)
  { dur:6, enter() {
    setDot(2); setHUD('SYSTEM FRAGILITY'); setProgress(18);
    farmFill.material.color.set(0x331100);
    farmEdge.material.color.set(0xaa4400);
    setCaption('What you might not know:  that distance is not strength.  It is fragility.  One drought.  One pest.  One broken supply chain — and a billion people go hungry.');
    speak('What you might not know: that distance is not strength. It is fragility. One drought. One pest. One broken supply chain — and a billion people go hungry.');
  }, tick(e) {
    cropRows.forEach((c, i) => {
      c.material.color.setHSL(0.08 - e * 0.01, 0.8, 0.2);
    });
    setProgress(18 + (e/6)*10);
  }},

  // 3 — city buildings appear with panels (7s)
  { dur:7, enter() {
    setDot(3); setHUD('DISTRIBUTED GROWTH'); setProgress(28);
    farmGroup.visible = false;
    cityGroup.visible = true;
    setCaption('But what if every surface grew food?  Every wall.  Every roof.  Every corridor.');
    speak('But what if every surface grew food? Every wall. Every roof. Every corridor.');
  }, tick(e) {
    const t = Math.min(1, e * 0.25);
    growPanels.forEach((p, i) => {
      const ts = Math.min(0.7, Math.max(0, e * 0.18 - i * 0.015));
      p.material.opacity = ts;
      p.material.color.setHSL(0.28 + Math.sin(e + i) * 0.03, 0.9, 0.4);
    });
    setProgress(28 + (e/7)*10);
  }},

  // 4 — vertical towers rise (7s)
  { dur:7, enter() {
    setDot(4); setHUD('VERTICAL SYSTEMS'); setProgress(38);
    towerGroup.visible = true;
    setCaption('Vertical farms.  LED-lit.  Zero pesticide.  Harvests every three weeks instead of every six months.  Ninety-five percent less water than field farming — recirculating hydroponics, nothing lost.  Zero transport.  Full nutritional density.  The food exists in the same building as the person eating it.');
    speak('Vertical farms. LED-lit. Zero pesticide. Harvests every three weeks instead of every six months. Ninety-five percent less water than field farming — recirculating hydroponics, nothing lost. Zero transport. Full nutritional density. The food exists in the same building as the person eating it.');
    for (let i = 0; i < fN; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = 0.5 + Math.random() * 4;
      fArr[i*3]   = Math.cos(a) * r;
      fArr[i*3+1] = Math.random() * 8;
      fArr[i*3+2] = Math.sin(a) * r - 2;
    }
    fGeo.attributes.position.needsUpdate = true;
    foodDots.material.opacity = 0.5;
  }, tick(e) {
    for (let i = 0; i < fN; i++) {
      fArr[i*3+1] += 0.02;
      if (fArr[i*3+1] > 8) fArr[i*3+1] = 0;
    }
    fGeo.attributes.position.needsUpdate = true;
    foodDots.material.opacity = 0.4 + Math.sin(e * 3) * 0.1;
    setProgress(38 + (e/7)*10);
  }},

  // 5 — farmer as designer (7s)
  { dur:7, enter() {
    setDot(5); setHUD('ROLE TRANSFORMATION'); setProgress(48);
    personGroup.visible = true;
    setCaption('The farmer is no longer bound to a field.  She designs light spectra.  She designs nutrient cycles.  She selects the microbial community in the substrate.  She reads sensor networks.  She is not a farmer.  She is an ecosystem architect — and she can operate from anywhere on Earth.');
    speak('The farmer is no longer bound to a field. She designs light spectra. She designs nutrient cycles. She selects the microbial community in the substrate. She reads sensor networks. She is not a farmer. She is an ecosystem architect — and she can operate from anywhere on Earth.');
  }, tick(e) {
    personGroup.position.y = Math.sin(e * 1.1) * 0.03;
    arcRings.forEach((r, i) => {
      r.material.opacity = Math.min(0.7, e * 0.15);
      r.rotation.z += 0.02 * (1 + i * 0.3);
    });
    foodDots.material.opacity = 0.4 + Math.sin(e * 2) * 0.1;
    setProgress(48 + (e/7)*10);
  }},

  // 6 — food flows outward (6s)
  { dur:6, enter() {
    setDot(6); setHUD('FOOD FLOW ACTIVE'); setProgress(58);
    setCaption('Food flows from every node.  No trucks.  No cold chain.  No spoilage.');
    speak('Food flows from every node. No trucks. No cold chain. No spoilage.');
  }, tick(e) {
    for (let i = 0; i < fN; i++) {
      const cx = (i % 3 - 1) * 4;
      const cz = -3;
      fArr[i*3]   += (cx - fArr[i*3]) * 0.008;
      fArr[i*3+2] += (cz - fArr[i*3+2]) * 0.008;
      fArr[i*3+1] = 3 + Math.sin(e * 2 + i * 0.4) * 1.5;
    }
    fGeo.attributes.position.needsUpdate = true;
    setProgress(58 + (e/6)*12);
  }},

  // 7 — city lights up green (6s)
  { dur:6, enter() {
    setDot(7); setHUD('CITY IS A GARDEN'); setProgress(70);
    setCaption('The city is the farm.  The rooftop.  The window.  The stairwell.  All of it, growing.');
    speak('The city is the farm. The rooftop. The window. The stairwell. All of it, growing.');
    camera.position.set(2, 9, 16);
    camera.lookAt(0, 3, -2);
  }, tick(e) {
    growPanels.forEach((p, i) => {
      p.material.color.setHSL(0.28 + Math.sin(e * 2 + i * 0.1) * 0.04, 1, 0.45);
    });
    foodDots.material.opacity = 0.6 + Math.sin(e * 4) * 0.1;
    setProgress(70 + (e/6)*10);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('THE FARM IS EVERYWHERE', '95% less water · Zero transport · Every surface · The ecosystem architect replaces the farmer', true);
    speak('The farm is not a place. It is a role. An ecosystem architect grows food wherever light falls, wherever water flows, wherever a surface exists. The agricultural land freed from this could rewild — an entire continent returned to forest. The denominator restored. The farm is everywhere.');
  }, tick(e) {
    camera.position.z = 16 + e * 0.3;
    camera.position.y = 9 + e * 0.18;
    camera.lookAt(0, 3, -2);
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'farm_role' }, '*'); } catch(e) {}
  setTimeout(() => {
    try {
      const btn = window.parent.document.getElementById('btn-close');
      if (btn) btn.click();
    } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  floor.material.opacity = 0.25 + Math.sin(t * 0.4) * 0.06;
  camera.position.x = Math.sin(t * 0.07) * 0.5;
  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
