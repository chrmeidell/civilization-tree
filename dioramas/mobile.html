<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manufacturing Comes to You</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#0a0600; z-index:50;
}
#progress-fill {
  height:2px; background:#ff8800;
  box-shadow:0 0 8px #ff8800;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#ff8800; text-shadow:0 0 40px rgba(255,136,0,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#442200;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#ff8800; text-shadow:0 0 50px rgba(255,136,0,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#331100; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#110800; transition:all 0.4s; }
.dot.on   { background:#ff8800; box-shadow:0 0 6px #ff8800; }
.dot.done { background:#331100; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #331100; color:#442200;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#885500; color:#ff8800; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#331100;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(255,136,0,0.003) 2px,rgba(255,136,0,0.003) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Manufacturing Comes to You</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  DEPLOYMENT BRANCH · NODE 12<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050200);
scene.fog = new THREE.FogExp2(0x050200, 0.035);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5, 14);
camera.lookAt(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const keyL = new THREE.DirectionalLight(0xff8833, 1.8);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── HELPERS ─────────────────────────────────

function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// ─── GROUND ───────────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(80,40,0,0.1)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x331100, transparent: true, opacity: 0.3 })
);
floor.rotation.x = -Math.PI / 2; floor.position.y = -0.02;
scene.add(floor);

// ─── DISASTER ZONE (broken structures) ────────

const ruinGroup = new THREE.Group();
scene.add(ruinGroup);

const ruinData = [
  {x:-6, z:-2, w:2, h:2, d:1.5, angle: 0.4},
  {x:-3, z:-3, w:1.5, h:3, d:1.5, angle: -0.3},
  {x: 4, z:-2, w:2.5, h:1.5, d:2, angle: 0.6},
  {x: 7, z:-3, w:1.8, h:2.5, d:1.5, angle: -0.5},
  {x: 0, z:-4, w:3, h:2, d:2, angle: 0.2},
];

ruinData.forEach(r => {
  const geo = new THREE.BoxGeometry(r.w, r.h, r.d);
  const fill = glowMesh(geo, 0x220800, 0.5);
  fill.position.set(r.x, r.h/2, r.z);
  fill.rotation.z = r.angle;
  const edge = glowEdge(geo, 0x884400, 0.4);
  edge.position.set(r.x, r.h/2, r.z);
  edge.rotation.z = r.angle;
  ruinGroup.add(fill); ruinGroup.add(edge);
});

// ─── CONTAINER TRUCK ─────────────────────────

const truckGroup = new THREE.Group();
truckGroup.position.set(-14, 0, 2);  // starts off screen left
scene.add(truckGroup);

// Cab
const cabGeo = new THREE.BoxGeometry(1.8, 1.8, 3);
const cabFill = glowMesh(cabGeo, 0x001a22, 0.6);
cabFill.position.set(0, 0.9, 1);
const cabEdge = glowEdge(cabGeo, 0x00ccff, 0.7);
cabEdge.position.set(0, 0.9, 1);
truckGroup.add(cabFill); truckGroup.add(cabEdge);

// Container body
const contGeo = new THREE.BoxGeometry(2, 2.4, 6);
const contFill = glowMesh(contGeo, 0x003322, 0.5);
contFill.position.set(0, 1.2, -2.5);
const contEdge = glowEdge(contGeo, 0x00ffcc, 0.8);
contEdge.position.set(0, 1.2, -2.5);
truckGroup.add(contFill); truckGroup.add(contEdge);

// Wheels
[-0.9, 0.9].forEach(x => {
  [-1.5, 1.5, -3.5].forEach(z => {
    const wGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.18, 8);
    const wm = glowMesh(wGeo, 0x111111, 0.8);
    wm.rotation.z = Math.PI / 2;
    wm.position.set(x, 0.28, z);
    const we = glowEdge(wGeo, 0x555555, 0.5);
    we.rotation.z = Math.PI / 2;
    we.position.set(x, 0.28, z);
    truckGroup.add(wm); truckGroup.add(we);
  });
});

const truckLight = new THREE.PointLight(0x00ffcc, 0.8, 8);
truckLight.position.set(0, 2, 0);
truckGroup.add(truckLight);

// ─── DEPLOYED CONTAINER (stays put after truck stops) ─

const deployGroup = new THREE.Group();
deployGroup.visible = false;
scene.add(deployGroup);

const dcGeo = new THREE.BoxGeometry(2.5, 3.2, 6);
const dcFill = glowMesh(dcGeo, 0x003322, 0.0);
dcFill.position.y = 1.6;
const dcEdge = glowEdge(dcGeo, 0x00ffcc, 0.0);
dcEdge.position.y = 1.6;
deployGroup.add(dcFill); deployGroup.add(dcEdge);

const deployGlow = new THREE.PointLight(0x00ffcc, 0, 8);
deployGlow.position.set(0, 3, 0);
deployGroup.add(deployGlow);

// ─── SCAN RING ────────────────────────────────

const scanRing = new THREE.Mesh(
  new THREE.TorusGeometry(4, 0.025, 6, 64),
  new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0 })
);
scanRing.rotation.x = Math.PI / 2;
scanRing.position.y = 0;
scene.add(scanRing);

// ─── PEOPLE (disaster survivors) ─────────────

const peopleGroup = new THREE.Group();
peopleGroup.visible = false;
scene.add(peopleGroup);

const personPositions = [[-3, 1], [2, 0.5], [-1, -1], [4, 1.5], [1, 2]];
personPositions.forEach(([px, pz]) => {
  const bg = new THREE.CylinderGeometry(0.2, 0.2, 0.9, 6);
  const bm = glowMesh(bg, 0x00ccff, 0.15); bm.position.set(px, 0.45, pz);
  const be = glowEdge(bg, 0x00ccff, 0.8); be.position.set(px, 0.45, pz);
  const hg = new THREE.IcosahedronGeometry(0.18, 1);
  const hm = glowMesh(hg, 0x00ccff, 0.15); hm.position.set(px, 1.04, pz);
  const he = glowEdge(hg, 0x00ccff, 0.8); he.position.set(px, 1.04, pz);
  peopleGroup.add(bm); peopleGroup.add(be);
  peopleGroup.add(hm); peopleGroup.add(he);
});

// ─── OUTPUT PARTICLES ─────────────────────────

const outN = 180;
const outArr = new Float32Array(outN * 3);
for (let i = 0; i < outN; i++) {
  outArr[i*3]   = (Math.random() - 0.5) * 1;
  outArr[i*3+1] = Math.random() * 3;
  outArr[i*3+2] = (Math.random() - 0.5) * 3 - 2.5;
}
const outGeo = new THREE.BufferGeometry();
outGeo.setAttribute('position', new THREE.BufferAttribute(outArr, 3));
const outDots = new THREE.Points(
  outGeo,
  new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.1, transparent: true, opacity: 0 })
);
scene.add(outDots);

// ─── ROAD LINES (trail behind truck) ─────────

const roadPts = [
  new THREE.Vector3(-16, 0.02, 2),
  new THREE.Vector3(16, 0.02, 2)
];
const roadLine = new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(roadPts),
  new THREE.LineBasicMaterial({ color: 0x442200, transparent: true, opacity: 0.3 })
);
scene.add(roadLine);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  document.getElementById('statement').style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;
let truckTargetX = -14;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => {
      tc.style.opacity = '0';
      setTimeout(() => { tc.style.display = 'none'; }, 1000);
    }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — disaster zone (7s)
  { dur:7, enter() {
    setDot(1); setHUD('DISASTER ZONE'); setProgress(8);
    setCaption('An earthquake.  A flood.  Infrastructure gone.  Supply chain: severed.  Aid: weeks away.');
    speak('An earthquake. A flood. Infrastructure gone. Supply chain: severed. Aid: weeks away.');
  }, tick(e) {
    ruinData.forEach((r, i) => {
      const m = ruinGroup.children[i * 2];
      if (m) m.material.opacity = 0.4 + Math.sin(e * 1.5 + i) * 0.1;
    });
    setProgress(8 + (e/7)*10);
  }},

  // 2 — the waiting problem (6s)
  { dur:6, enter() {
    setDot(2); setHUD('AID GAP'); setProgress(18);
    setCaption('You cannot manufacture aid fast enough.  You cannot ship it far enough.  People wait.');
    speak('You cannot manufacture aid fast enough. You cannot ship it far enough. People wait.');
  }, tick(e) {
    floor.material.color.set(0x440800);
    floor.material.opacity = 0.2 + Math.sin(e * 2) * 0.05;
    setProgress(18 + (e/6)*10);
  }},

  // 3 — truck approaches (8s)
  { dur:8, enter() {
    setDot(3); setHUD('CONTAINER INBOUND'); setProgress(28);
    truckTargetX = -1;
    floor.material.color.set(0x331100);
    setCaption('A container truck.  Moving.  The factory is not waiting for you.  It is coming to you.');
    speak('A container truck. Moving. The factory is not waiting for you. It is coming to you.');
    truckLight.intensity = 1.2;
  }, tick(e) {
    truckGroup.position.x += (truckTargetX - truckGroup.position.x) * 0.06;
    truckGroup.children.forEach(c => {
      if (c.isPoints || c.isLine) return;
    });
    setProgress(28 + (e/8)*10);
  }},

  // 4 — truck stops, deploys (7s)
  { dur:7, enter() {
    setDot(4); setHUD('DEPLOYMENT'); setProgress(38);
    truckTargetX = -1;
    deployGroup.visible = true;
    deployGroup.position.set(-1, 0, 0);
    truckGroup.visible = false;
    setCaption('It deploys on site.  No foundation required.  Power from its own energy harvest.  Operational in minutes.');
    speak('It deploys on site. No foundation required. Power from its own energy harvest. Operational in minutes.');
  }, tick(e) {
    const t = Math.min(1, e * 0.25);
    dcFill.material.opacity = t * 0.25;
    dcEdge.material.opacity = t;
    deployGlow.intensity = t * 1.5;
    setProgress(38 + (e/7)*10);
  }},

  // 5 — scan the zone (6s)
  { dur:6, enter() {
    setDot(5); setHUD('NEEDS ASSESSMENT'); setProgress(48);
    peopleGroup.visible = true;
    setCaption('Drones scan.  Population density.  Medical needs.  Missing resources.  The system listens first.');
    speak('Drones scan. Population density. Medical needs. Missing resources. The system listens first.');
  }, tick(e) {
    scanRing.material.opacity = 0.5 + Math.sin(e * 8) * 0.3;
    scanRing.position.y = (e % 3) * 1.2;
    scanRing.position.x = -1;
    peopleGroup.children.forEach((p, i) => {
      p.position.y = p.position.y + Math.sin(e * 1.5 + i * 0.4) * 0.01;
    });
    deployGlow.intensity = 1 + Math.sin(e * 4) * 0.3;
    setProgress(48 + (e/6)*10);
  }},

  // 6 — manufacturing begins (7s)
  { dur:7, enter() {
    setDot(6); setHUD('MANUFACTURING ACTIVE'); setProgress(58);
    scanRing.material.opacity = 0;
    outDots.material.opacity = 0.8;
    setCaption('Waste collected from the rubble.  Elements recovered.  Medicine, shelter, tools.  Made here.  Now.');
    speak('Waste collected from the rubble. Elements recovered. Medicine, shelter, tools. Made here. Now.');
  }, tick(e) {
    for (let i = 0; i < outN; i++) {
      const target = personPositions[i % personPositions.length];
      outArr[i*3]   += (target[0] - outArr[i*3])   * 0.02;
      outArr[i*3+2] += (target[1] - outArr[i*3+2]) * 0.02;
      outArr[i*3+1] += 0.025;
      if (outArr[i*3+1] > 3.5) {
        outArr[i*3]   = -1 + (Math.random() - 0.5);
        outArr[i*3+1] = 0.5;
        outArr[i*3+2] = -2.5 + (Math.random() - 0.5);
      }
    }
    outGeo.attributes.position.needsUpdate = true;
    deployGlow.intensity = 1.5 + Math.sin(e * 8) * 0.5;
    dcFill.material.opacity = 0.2 + Math.sin(e * 6) * 0.08;
    setProgress(58 + (e/7)*10);
  }},

  // 7 — people receive (6s)
  { dur:6, enter() {
    setDot(7); setHUD('DELIVERY COMPLETE'); setProgress(68);
    setCaption('Clothing to fit.  Medicine for this person\'s exact condition.  Shelter assembled.  Not generic.  Personal.');
    speak('Clothing to fit. Medicine for this person\'s exact condition. Shelter assembled. Not generic. Personal.');
    camera.position.set(2, 6, 14);
    camera.lookAt(0, 1, 0);
  }, tick(e) {
    peopleGroup.children.forEach((p, i) => {
      if (p.material) p.material.opacity = 0.7 + Math.sin(e * 2 + i * 0.5) * 0.2;
    });
    outDots.material.color.setHSL(0.16, 1, 0.6 + Math.sin(e * 3) * 0.05);
    deployGlow.intensity = 0.8 + Math.sin(e * 3) * 0.2;
    setProgress(68 + (e/6)*12);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('MANUFACTURING COMES TO YOU', 'Mobile · Autonomous · Zero Supply Chain · Need Is the Address', true);
    speak('Manufacturing comes to you. The factory is not a building. It is a vehicle. It travels to the need. Disaster zones, refugee camps, isolated villages. The address is the need itself.');
  }, tick(e) {
    camera.position.z = 14 + e * 0.3;
    camera.position.y = 6 + e * 0.2;
    camera.lookAt(0, 1, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'mobile' }, '*'); } catch(e) {}
  setTimeout(() => {
    try {
      const btn = window.parent.document.getElementById('btn-close');
      if (btn) btn.click();
    } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  floor.material.opacity = 0.25 + Math.sin(t * 0.3) * 0.05;
  camera.position.x = Math.sin(t * 0.06) * 0.4;
  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
