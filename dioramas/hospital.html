<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#003322;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Hospital of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  HEALTHCARE BRANCH · NODE 02<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 10);
camera.lookAt(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── FLOOR GRID ─────────────────────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,255,204,0.12)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x00ffcc, transparent: true, opacity: 0.35 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.02;
scene.add(floor);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, transparent: true, opacity, wireframe: false
  }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// ─── HOSPITAL BUILDING ───────────────────────
const hospitalGroup = new THREE.Group();
hospitalGroup.position.set(-3, 0, -2);
hospitalGroup.visible = false;
hospitalGroup.scale.setScalar(0.01);
scene.add(hospitalGroup);

const hospGeo = new THREE.BoxGeometry(3, 8, 2);
const hospFill = glowMesh(hospGeo, 0x001a33, 0.25);
hospFill.position.y = 4;
const hospEdge = glowEdge(hospGeo, 0x00ffcc, 0.85);
hospEdge.position.y = 4;
hospitalGroup.add(hospFill);
hospitalGroup.add(hospEdge);

// Cross symbol on front face
const crossH = new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.7, 0, 0), new THREE.Vector3(0.7, 0, 0)
  ]),
  new THREE.LineBasicMaterial({ color: 0x00ffcc })
);
crossH.position.set(0, 4, 1.02);
hospitalGroup.add(crossH);

const crossV = new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -0.7, 0), new THREE.Vector3(0, 0.7, 0)
  ]),
  new THREE.LineBasicMaterial({ color: 0x00ffcc })
);
crossV.position.set(0, 4, 1.02);
hospitalGroup.add(crossV);

// ─── DISINTEGRATOR ───────────────────────────
const disintGroup = new THREE.Group();
disintGroup.position.set(3, 0, 0);
disintGroup.visible = false;
scene.add(disintGroup);

const disintCylGeo = new THREE.CylinderGeometry(0.8, 0.8, 2.5, 12);
const disintFill = glowMesh(disintCylGeo, 0x002233, 0.2);
disintFill.position.y = 1.25;
const disintEdge = glowEdge(disintCylGeo, 0x00ffcc, 0.9);
disintEdge.position.y = 1.25;
disintGroup.add(disintFill);
disintGroup.add(disintEdge);

const disintLight = new THREE.PointLight(0x00ffcc, 0, 8);
disintLight.position.set(3, 2, 0);
scene.add(disintLight);

// ─── SYNTHESIS CONTAINER ─────────────────────
const synthGroup = new THREE.Group();
synthGroup.position.set(3, 0, 2.5);
synthGroup.visible = false;
scene.add(synthGroup);

const synthGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
const synthFill = glowMesh(synthGeo, 0x002244, 0.15);
synthFill.position.y = 0.75;
const synthEdge = glowEdge(synthGeo, 0x44ffcc, 0.9);
synthEdge.position.y = 0.75;
synthGroup.add(synthFill);
synthGroup.add(synthEdge);

const synthLight = new THREE.PointLight(0x44ffcc, 0, 5);
synthLight.position.set(3, 1.5, 2.5);
scene.add(synthLight);

// ─── WASTE PARTICLES ─────────────────────────
const WN = 80;
const wasteArr = new Float32Array(WN * 3);
for (let i = 0; i < WN; i++) {
  wasteArr[i*3]   = -3 + (Math.random()-0.5)*3;
  wasteArr[i*3+1] = Math.random()*4;
  wasteArr[i*3+2] = -2 + (Math.random()-0.5)*2;
}
const wasteGeo = new THREE.BufferGeometry();
wasteGeo.setAttribute('position', new THREE.BufferAttribute(wasteArr, 3));
const wasteParticles = new THREE.Points(
  wasteGeo,
  new THREE.PointsMaterial({ color: 0xff8800, size: 0.12, transparent: true, opacity: 0 })
);
scene.add(wasteParticles);

// ─── ELEMENT PARTICLES (4 colors) ────────────
const EN = 30;
function makeElem(color, ox, oy, oz) {
  const arr = new Float32Array(EN * 3);
  for (let i = 0; i < EN; i++) {
    arr[i*3]   = ox + (Math.random()-0.5)*0.4;
    arr[i*3+1] = oy + (Math.random()-0.5)*0.4;
    arr[i*3+2] = oz + (Math.random()-0.5)*0.4;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const pts = new THREE.Points(g, new THREE.PointsMaterial({ color, size: 0.1, transparent: true, opacity: 0 }));
  scene.add(pts);
  return { pts, arr };
}
const elemO = makeElem(0xff4444, 3, 1.25, 0);
const elemH = makeElem(0xffff44, 3, 1.25, 0);
const elemN = makeElem(0x4488ff, 3, 1.25, 0);
const elemC = makeElem(0x44ff44, 3, 1.25, 0);
const elemAll = [elemO, elemH, elemN, elemC];

// ─── ROBOT ────────────────────────────────────
const robotGroup = new THREE.Group();
robotGroup.position.set(7, 0, 1);
robotGroup.visible = false;
scene.add(robotGroup);

const rbGeo = new THREE.CylinderGeometry(0.38, 0.42, 0.22, 10);
const rbFill = glowMesh(rbGeo, 0x00ccff, 0.12); rbFill.position.y = 0.11;
const rbEdge = glowEdge(rbGeo, 0x00ccff, 0.8); rbEdge.position.y = 0.11;
robotGroup.add(rbFill); robotGroup.add(rbEdge);

const rtGeo = new THREE.CylinderGeometry(0.28, 0.38, 1.1, 10);
const rtFill = glowMesh(rtGeo, 0x00ccff, 0.12); rtFill.position.y = 0.77;
const rtEdge = glowEdge(rtGeo, 0x00ccff, 0.8); rtEdge.position.y = 0.77;
robotGroup.add(rtFill); robotGroup.add(rtEdge);

const sensor = new THREE.Mesh(
  new THREE.SphereGeometry(0.14, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x00ffcc })
);
sensor.position.y = 1.42;
robotGroup.add(sensor);

const robotLight = new THREE.PointLight(0x00ccff, 0.8, 5);
robotLight.position.set(0, 1.5, 0);
robotGroup.add(robotLight);

// ─── PATIENT ──────────────────────────────────
const patientGroup = new THREE.Group();
patientGroup.position.set(-3, 0, 1);
patientGroup.visible = false;
scene.add(patientGroup);

const pBodyGeo = new THREE.CylinderGeometry(0.28, 0.28, 1.1, 8);
const pBodyM = glowMesh(pBodyGeo, 0x00ffcc, 0.15); pBodyM.position.y = 0.9;
const pBodyE = glowEdge(pBodyGeo, 0x00ffcc, 0.9); pBodyE.position.y = 0.9;
patientGroup.add(pBodyM); patientGroup.add(pBodyE);

const pHeadGeo = new THREE.IcosahedronGeometry(0.24, 1);
const pHeadM = glowMesh(pHeadGeo, 0x00ffcc, 0.15); pHeadM.position.y = 1.72;
const pHeadE = glowEdge(pHeadGeo, 0x00ffcc, 0.9); pHeadE.position.y = 1.72;
patientGroup.add(pHeadM); patientGroup.add(pHeadE);

[-0.16, 0.16].forEach(x => {
  const lGeo = new THREE.CylinderGeometry(0.1, 0.09, 0.72, 6);
  const lm = glowMesh(lGeo, 0x00ffcc, 0.1); lm.position.set(x, 0.36, 0);
  const le = glowEdge(lGeo, 0x00ffcc, 0.7); le.position.set(x, 0.36, 0);
  patientGroup.add(lm); patientGroup.add(le);
});

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0;
let isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('SCENARIO LOADING'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — hospital building appears (7s)
  { dur:7, enter() {
    setDot(1); setHUD('FACILITY ONLINE'); setProgress(8);
    hospitalGroup.visible = true;
    hospitalGroup.scale.setScalar(0.01);
    setCaption('The modern hospital.  A miracle of logistics.  2020: personal protective equipment ran out in six weeks.  Not because there wasn\'t enough — because the supply chain was designed for efficiency, not survival.');
    speak('The modern hospital. A miracle of logistics. 2020: personal protective equipment ran out in six weeks. Not because there was not enough — because the supply chain was designed for efficiency, not survival.');
  }, tick(e) {
    const t = Math.min(1, e * 0.5);
    hospitalGroup.scale.setScalar(0.01 + t * 0.99);
    setProgress(8 + (e/7)*10);
  }},

  // 2 — waste particles scatter (7s)
  { dur:7, enter() {
    setDot(2); setHUD('WASTE STREAM ACTIVE'); setProgress(18);
    for (let i = 0; i < WN; i++) {
      wasteArr[i*3]   = -3 + (Math.random()-0.5)*3;
      wasteArr[i*3+1] = Math.random()*4;
      wasteArr[i*3+2] = -2 + (Math.random()-0.5)*2;
    }
    wasteGeo.attributes.position.needsUpdate = true;
    wasteParticles.material.opacity = 0.7;
    setCaption('Every day: tonnes of medical waste. Infectious. Costly. Dangerous to dispose.');
    speak('Every day: tonnes of medical waste. Infectious. Costly. Dangerous to dispose.');
  }, tick(e) {
    for (let i = 0; i < WN; i++) {
      wasteArr[i*3]   += (3 - wasteArr[i*3])   * 0.022;
      wasteArr[i*3+1] += (1.25 - wasteArr[i*3+1]) * 0.022;
      wasteArr[i*3+2] += (0 - wasteArr[i*3+2]) * 0.022;
    }
    wasteGeo.attributes.position.needsUpdate = true;
    setProgress(18 + (e/7)*12);
  }},

  // 3 — disintegrator appears, particles flow in (8s)
  { dur:8, enter() {
    setDot(3); setHUD('DISINTEGRATOR ACTIVE'); setProgress(30);
    disintGroup.visible = true;
    setCaption('A disintegrator processes it all. Plasma at 3000 degrees Celsius. Everything breaks to atoms.');
    speak('A disintegrator processes it all. Plasma at 3000 degrees Celsius. Everything breaks to atoms.');
  }, tick(e) {
    const t = Math.min(1, e * 0.35);
    disintEdge.material.opacity = t * 0.9;
    disintFill.material.opacity = t * 0.2;
    disintLight.intensity = 1 + Math.sin(e * 4) * 0.6;
    for (let i = 0; i < WN; i++) {
      wasteArr[i*3]   += (3 - wasteArr[i*3])   * 0.04;
      wasteArr[i*3+1] += (1.25 - wasteArr[i*3+1]) * 0.04;
      wasteArr[i*3+2] += (0 - wasteArr[i*3+2]) * 0.04;
    }
    wasteGeo.attributes.position.needsUpdate = true;
    wasteParticles.material.opacity = Math.max(0, 0.7 - e * 0.09);
    setProgress(30 + (e/8)*10);
  }},

  // 4 — element particles burst and orbit (8s)
  { dur:8, enter() {
    setDot(4); setHUD('ELEMENTAL SEPARATION'); setProgress(40);
    wasteParticles.material.opacity = 0;
    // scatter element particles outward from disintegrator
    elemAll.forEach(({ arr }, ci) => {
      for (let i = 0; i < EN; i++) {
        const a = Math.random()*Math.PI*2;
        const r = 0.3 + Math.random()*0.5;
        arr[i*3]   = 3 + Math.cos(a)*r;
        arr[i*3+1] = 1.25 + (Math.random()-0.5)*0.5;
        arr[i*3+2] = Math.sin(a)*r;
      }
    });
    elemAll.forEach(({ pts }) => { pts.material.opacity = 0.85; });
    setCaption('Pure elements. Separated by atomic number. Carbon. Hydrogen. Oxygen. Nitrogen. Clean.');
    speak('Pure elements. Separated by atomic number. Carbon. Hydrogen. Oxygen. Nitrogen. Clean.');
  }, tick(e) {
    elemAll.forEach(({ arr, pts }, ci) => {
      const targetR = 1.5 + ci * 0.6;
      for (let i = 0; i < EN; i++) {
        const dx = arr[i*3] - 3, dz = arr[i*3+2] - 0;
        const a = Math.atan2(dz, dx) + 0.028;
        const r = Math.sqrt(dx*dx + dz*dz);
        const nr = r + (targetR - r) * 0.03;
        arr[i*3]   = 3 + Math.cos(a)*nr;
        arr[i*3+2] = Math.sin(a)*nr;
        arr[i*3+1] += (1.25 + Math.sin(e + i*0.3)*0.4 - arr[i*3+1]) * 0.04;
      }
      pts.geometry.attributes.position.needsUpdate = true;
    });
    disintLight.intensity = 1.5 + Math.sin(e*5)*0.5;
    setProgress(40 + (e/8)*10);
  }},

  // 5 — synthesis container appears (7s)
  { dur:7, enter() {
    setDot(5); setHUD('SYNTHESIS ACTIVE'); setProgress(50);
    synthGroup.visible = true;
    setCaption('A synthesis container receives the order.  Not a generic formula — this patient\'s weight, kidney function, other medications, genetic markers.  Synthesized to the exact molecular structure this body needs.  On demand.');
    speak('A synthesis container receives the order. Not a generic formula — this patient\'s weight, kidney function, other medications, genetic markers. Synthesized to the exact molecular structure this body needs. On demand.');
  }, tick(e) {
    const t = Math.min(1, e * 0.4);
    synthEdge.material.opacity = t * 0.9;
    synthFill.material.opacity = t * 0.15;
    synthLight.intensity = t * 1.5 + Math.sin(e*3)*0.3;
    // particles flow toward synth container
    elemAll.forEach(({ arr, pts }) => {
      for (let i = 0; i < EN; i++) {
        arr[i*3]   += (3 - arr[i*3])   * 0.025;
        arr[i*3+1] += (0.75 - arr[i*3+1]) * 0.025;
        arr[i*3+2] += (2.5 - arr[i*3+2]) * 0.025;
      }
      pts.geometry.attributes.position.needsUpdate = true;
    });
    setProgress(50 + (e/7)*10);
  }},

  // 6 — container pulses (6s)
  { dur:6, enter() {
    setDot(6); setHUD('QUALITY GATE'); setProgress(60);
    elemAll.forEach(({ pts }) => { pts.material.opacity = 0; });
    setCaption('Every molecule verified. Zero contamination possible. No expiry. No waste.');
    speak('Every molecule verified. Zero contamination possible. No expiry. No waste.');
  }, tick(e) {
    synthLight.intensity = 2 + Math.sin(e*7)*1.2;
    synthEdge.material.color.setHSL(0.5 + Math.sin(e*3)*0.05, 1, 0.6 + Math.sin(e*7)*0.15);
    setProgress(60 + (e/6)*10);
  }},

  // 7 — robot + patient (7s)
  { dur:7, enter() {
    setDot(7); setHUD('DELIVERY COMPLETE'); setProgress(70);
    patientGroup.visible = true;
    robotGroup.visible = true;
    robotGroup.position.set(7, 0, 1);
    synthLight.intensity = 0.5;
    setCaption('Delivered to the patient.  On demand.  From waste that entered this morning.  The entire pharmacy is now an energy bill.  Nothing ordered.  Nothing stored.  Nothing expired.  Nothing out of stock.');
    speak('Delivered to the patient. On demand. From waste that entered this morning. The entire pharmacy is now an energy bill. Nothing ordered. Nothing stored. Nothing expired. Nothing out of stock.');
  }, tick(e) {
    robotGroup.position.x += (-2 - robotGroup.position.x) * 0.03;
    robotGroup.position.z += (1 - robotGroup.position.z) * 0.03;
    robotLight.intensity = 0.6 + Math.sin(e*3)*0.2;
    patientGroup.position.y = Math.sin(e*1.2)*0.02;
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera pullback + statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('THE HOSPITAL CANNOT RUN OUT', 'No supply chain · No stock · No expiry · Synthesized on demand from this morning\'s waste', true);
    speak('The hospital cannot run out. Of anything. Ever again. No supply chain. No purchase order. No expiry date. No shortage. The constraint was never knowledge — it was logistics. Logistics is gone.');
  }, tick(e) {
    camera.position.z = 10 + e * 0.28;
    camera.position.y = 4  + e * 0.16;
    camera.lookAt(0, 1.5, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'hospital' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  if (patientGroup.visible) patientGroup.position.y = Math.sin(t*1.1)*0.025;
  if (robotGroup.visible) sensor.material.color.setHSL(0.5, 1, 0.5+Math.sin(t*5)*0.1);
  floor.material.opacity = 0.3 + Math.sin(t*0.4)*0.07;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
