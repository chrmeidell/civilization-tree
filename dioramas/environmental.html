<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restoring the Denominator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#000d1a; z-index:50;
}
#progress-fill {
  height:2px; background:#00ccff;
  box-shadow:0 0 8px #00ccff;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ccff; text-shadow:0 0 40px rgba(0,204,255,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#003344;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ccff; text-shadow:0 0 50px rgba(0,204,255,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#002233; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001122; transition:all 0.4s; }
.dot.on   { background:#00ccff; box-shadow:0 0 6px #00ccff; }
.dot.done { background:#002233; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002233; color:#003344;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#005566; color:#00ccff; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#002233;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,204,255,0.004) 2px,rgba(0,204,255,0.004) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Restoring the Denominator</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  BIOSPHERE BRANCH · NODE 08<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000508);
scene.fog = new THREE.FogExp2(0x000508, 0.04);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const keyL = new THREE.DirectionalLight(0x00aaff, 1.8);
keyL.position.set(-4, 10, 6); scene.add(keyL);

// ─── OCEAN FLOOR ────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(0,80,140,0.15)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(12,12);

const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x003355, transparent: true, opacity: 0.4 })
);
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = -0.02;
scene.add(ocean);

// ─── HELPERS ────────────────────────────────

function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, transparent: true, opacity, wireframe: false
  }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// ─── DEAD ZONE (grey void spheres) ─────────

const deadGroup = new THREE.Group();
scene.add(deadGroup);
const deadSpheres = [];
for (let i = 0; i < 18; i++) {
  const r = 0.15 + Math.random() * 0.35;
  const geo = new THREE.IcosahedronGeometry(r, 1);
  const m = glowMesh(geo, 0x111111, 0.5);
  const x = (Math.random() - 0.5) * 20;
  const z = (Math.random() - 0.5) * 20;
  m.position.set(x, Math.random() * 0.5, z);
  deadGroup.add(m);
  deadSpheres.push({ mesh: m, ox: x, oz: z, r });
}

// ─── PHYTOPLANKTON PARTICLES ─────────────────

const N = 320;
const pArr = new Float32Array(N * 3);
const pColors = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 12;
  pArr[i*3]   = Math.cos(a) * r;
  pArr[i*3+1] = Math.random() * 0.5;
  pArr[i*3+2] = Math.sin(a) * r;
  pColors[i*3]   = 0.0;
  pColors[i*3+1] = 0.3 + Math.random() * 0.4;
  pColors[i*3+2] = 0.2 + Math.random() * 0.3;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
const phyto = new THREE.Points(
  pGeo,
  new THREE.PointsMaterial({ size: 0.12, transparent: true, opacity: 0, vertexColors: true })
);
scene.add(phyto);

// ─── GLOBE (Earth) ───────────────────────────

const globeGroup = new THREE.Group();
globeGroup.position.set(0, 2, -4);
globeGroup.visible = false;
scene.add(globeGroup);

const globeGeo = new THREE.IcosahedronGeometry(2.2, 3);
const globeFill = glowMesh(globeGeo, 0x003366, 0.15);
const globeEdge = glowEdge(globeGeo, 0x0055aa, 0.4);
globeGroup.add(globeFill); globeGroup.add(globeEdge);
const globeGlow = new THREE.PointLight(0x0066cc, 0, 8);
globeGlow.position.set(0, 0, 0);
globeGroup.add(globeGlow);

// ─── OXYGEN RINGS ────────────────────────────

const oxyRings = [];
for (let i = 0; i < 4; i++) {
  const r = 1.5 + i * 1.2;
  const geo = new THREE.TorusGeometry(r, 0.018, 6, 48);
  const ring = new THREE.Mesh(
    geo,
    new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0 })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.set(0, 0.5 + i * 0.4, 0);
  scene.add(ring);
  oxyRings.push(ring);
}

// ─── FOREST PILLARS (trees as cylinders) ────

const forestGroup = new THREE.Group();
scene.add(forestGroup);
forestGroup.visible = false;
const trees = [];
const treePositions = [];
for (let i = 0; i < 22; i++) {
  const h = 1.5 + Math.random() * 3;
  const trunk = new THREE.CylinderGeometry(0.08, 0.12, h, 6);
  const canopy = new THREE.IcosahedronGeometry(0.4 + Math.random() * 0.5, 1);
  const tm = glowMesh(trunk, 0x002200, 0.6);
  const te = glowEdge(trunk, 0x004400, 0.5);
  const cm = glowMesh(canopy, 0x004400, 0.2);
  const ce = glowEdge(canopy, 0x00cc44, 0.6);
  const x = (Math.random() - 0.5) * 18;
  const z = -2 + (Math.random() - 0.5) * 14;
  tm.position.set(x, h/2, z);
  te.position.set(x, h/2, z);
  cm.position.set(x, h + 0.3, z);
  ce.position.set(x, h + 0.3, z);
  forestGroup.add(tm); forestGroup.add(te);
  forestGroup.add(cm); forestGroup.add(ce);
  trees.push({ tm, te, cm, ce, h });
  treePositions.push({ x, z, h });
}

// ─── SOIL MICROBIOME (tiny orbiting dots) ────

const soilGroup = new THREE.Group();
scene.add(soilGroup);
soilGroup.visible = false;
const microN = 80;
const microArr = new Float32Array(microN * 3);
for (let i = 0; i < microN; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 6;
  microArr[i*3]   = Math.cos(a) * r;
  microArr[i*3+1] = -0.05 + Math.random() * 0.15;
  microArr[i*3+2] = Math.sin(a) * r;
}
const microGeo = new THREE.BufferGeometry();
microGeo.setAttribute('position', new THREE.BufferAttribute(microArr, 3));
const microDots = new THREE.Points(
  microGeo,
  new THREE.PointsMaterial({ color: 0x88ff44, size: 0.08, transparent: true, opacity: 0 })
);
soilGroup.add(microDots);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => {
      tc.style.opacity = '0';
      setTimeout(() => { tc.style.display = 'none'; }, 1000);
    }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — the dead zone (7s)
  { dur:7, enter() {
    setDot(1); setHUD('DEAD ZONE DETECTED'); setProgress(8);
    ocean.material.color.set(0x110022);
    setCaption('The Gulf of Mexico.  22,000 square kilometres.  No oxygen.  No fish.  No life.  The Baltic Sea: 70,000 square kilometres, the same.  Two hundred dead zones worldwide — and growing.  Created by us.  With fertilizer.');
    speak('The Gulf of Mexico. 22,000 square kilometres. No oxygen. No fish. No life. The Baltic Sea: 70,000 square kilometres, the same. Two hundred dead zones worldwide — and growing. Created by us. With fertilizer.');
  }, tick(e) {
    deadSpheres.forEach((d, i) => {
      d.mesh.position.y = Math.sin(e * 0.8 + i) * 0.08;
      d.mesh.material.opacity = 0.4 + Math.sin(e + i * 0.5) * 0.15;
    });
    ocean.material.opacity = 0.2 + Math.sin(e * 0.3) * 0.05;
    setProgress(8 + (e/7)*10);
  }},

  // 2 — the cause (6s)
  { dur:6, enter() {
    setDot(2); setHUD('CAUSE ANALYSIS'); setProgress(18);
    setCaption('Nitrogen runoff.  Algae blooms.  Oxygen collapse.  We broke the regulator.');
    speak('Nitrogen runoff. Algae blooms. Oxygen collapse. We broke the regulator.');
    // Red warning particles
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 10;
      pArr[i*3]   = Math.cos(a) * r;
      pArr[i*3+1] = Math.random() * 0.3;
      pArr[i*3+2] = Math.sin(a) * r;
      pColors[i*3]   = 0.8 + Math.random() * 0.2;
      pColors[i*3+1] = 0.1;
      pColors[i*3+2] = 0.1;
    }
    pGeo.attributes.position.needsUpdate = true;
    pGeo.attributes.color.needsUpdate = true;
    phyto.material.opacity = 0.5;
  }, tick(e) {
    for (let i = 0; i < N; i++) {
      pArr[i*3+1] += Math.sin(e * 3 + i) * 0.005;
    }
    pGeo.attributes.position.needsUpdate = true;
    phyto.material.opacity = 0.5 + Math.sin(e * 4) * 0.1;
    setProgress(18 + (e/6)*10);
  }},

  // 3 — introducing phytoplankton (7s)
  { dur:7, enter() {
    setDot(3); setHUD('RESTORATION SEEDING'); setProgress(28);
    setCaption('Phytoplankton.  Two micrometres.  Produces half of Earth\'s oxygen.  The base of the entire marine food chain.  Absorbs 30 percent of all human carbon emissions.  The most important organism on this planet, and it is invisible to the naked eye.  Close the nitrogen loop — from the farming diorama — and the runoff stops.  The bloom returns on its own.');
    speak('Phytoplankton. Two micrometres. Produces half of Earth\'s oxygen. The base of the entire marine food chain. Absorbs 30 percent of all human carbon emissions. The most important organism on this planet, and it is invisible to the naked eye. Close the nitrogen loop — and the runoff stops. The bloom returns on its own.');
    // Shift to green
    for (let i = 0; i < N; i++) {
      pColors[i*3]   = 0.0;
      pColors[i*3+1] = 0.5 + Math.random() * 0.5;
      pColors[i*3+2] = 0.3 + Math.random() * 0.4;
    }
    pGeo.attributes.color.needsUpdate = true;
    // Fade dead zone
    deadSpheres.forEach(d => { d.mesh.material.opacity = 0.1; });
    ocean.material.color.set(0x003355);
  }, tick(e) {
    // Phyto bloom outward
    for (let i = 0; i < N; i++) {
      const dx = pArr[i*3];
      const dz = pArr[i*3+2];
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < 11) {
        const a = Math.atan2(dz, dx);
        pArr[i*3]   += Math.cos(a) * 0.04;
        pArr[i*3+2] += Math.sin(a) * 0.04;
      }
      pArr[i*3+1] = Math.sin(e * 2 + i * 0.3) * 0.15;
    }
    pGeo.attributes.position.needsUpdate = true;
    phyto.material.opacity = Math.min(0.9, 0.5 + e * 0.06);
    setProgress(28 + (e/7)*10);
  }},

  // 4 — oxygen rings (7s)
  { dur:7, enter() {
    setDot(4); setHUD('OXYGEN PRODUCTION'); setProgress(38);
    setCaption('The bloom breathes.  Oxygen radiates outward.  The dead zone shrinks.');
    speak('The bloom breathes. Oxygen radiates outward. The dead zone shrinks.');
    deadSpheres.forEach(d => { d.mesh.visible = false; });
  }, tick(e) {
    oxyRings.forEach((r, i) => {
      const phase = (e * 0.6 + i * 0.4) % 1;
      r.material.opacity = Math.max(0, 0.6 - phase * 0.6) * Math.min(1, e * 0.5);
      r.scale.setScalar(0.5 + phase * 0.8);
    });
    ocean.material.opacity = 0.35 + Math.sin(e * 0.5) * 0.06;
    phyto.material.opacity = 0.85 + Math.sin(e * 3) * 0.05;
    setProgress(38 + (e/7)*10);
  }},

  // 5 — soil microbiome appears (7s)
  { dur:7, enter() {
    setDot(5); setHUD('SOIL RESTORATION'); setProgress(48);
    soilGroup.visible = true;
    setCaption('Below ground, a trillion organisms per teaspoon.  We restore the microbiome.');
    speak('Below ground, a trillion organisms per teaspoon. We restore the microbiome.');
  }, tick(e) {
    for (let i = 0; i < microN; i++) {
      const a = Math.atan2(microArr[i*3+2], microArr[i*3]) + 0.018;
      const r = Math.sqrt(microArr[i*3]**2 + microArr[i*3+2]**2);
      microArr[i*3]   = Math.cos(a) * r;
      microArr[i*3+2] = Math.sin(a) * r;
    }
    microGeo.attributes.position.needsUpdate = true;
    microDots.material.opacity = Math.min(0.7, e * 0.12);
    setProgress(48 + (e/7)*10);
  }},

  // 6 — forest returns (7s)
  { dur:7, enter() {
    setDot(6); setHUD('CANOPY RESTORATION'); setProgress(58);
    forestGroup.visible = true;
    trees.forEach(t => {
      t.tm.scale.setScalar(0.01);
      t.te.scale.setScalar(0.01);
      t.cm.scale.setScalar(0.01);
      t.ce.scale.setScalar(0.01);
    });
    camera.position.set(0, 5, 12);
    setCaption('The canopy returns.  Forests are not just carbon stores — they are water pumps.  A single tree transpires 400 litres of water per day.  A forest pulls moisture from the coast and carries it thousands of kilometres inland.  Without forest, the continent dries.  The mycelium beneath: 2.5 miles of fungal threads per teaspoon of soil.  The internet of the forest.  Restored.');
    speak('The canopy returns. Forests are not just carbon stores — they are water pumps. A single tree transpires 400 litres of water per day. A forest pulls moisture from the coast and carries it thousands of kilometres inland. Without forest, the continent dries. The mycelium beneath: 2.5 miles of fungal threads per teaspoon of soil. The internet of the forest. Restored.');
  }, tick(e) {
    const t = Math.min(1, e * 0.22);
    trees.forEach((tr, i) => {
      const ts = Math.min(1, Math.max(0, e * 0.22 - i * 0.04));
      tr.tm.scale.setScalar(ts);
      tr.te.scale.setScalar(ts);
      tr.cm.scale.setScalar(ts);
      tr.ce.scale.setScalar(ts);
    });
    phyto.material.opacity = 0.85 + Math.sin(e * 2) * 0.05;
    setProgress(58 + (e/7)*10);
  }},

  // 7 — globe appears (6s)
  { dur:6, enter() {
    setDot(7); setHUD('PLANETARY SCALE'); setProgress(68);
    globeGroup.visible = true;
    setCaption('These systems don\'t degrade gradually.  They flip.  Like a glass of water tilting — nothing changes, nothing changes, nothing changes — then everything changes at once.  We do not know exactly where the edge is.  We know we are approaching it.  Restore the regulators before the flip.  There is no recovery from the other side.');
    speak('These systems don\'t degrade gradually. They flip. Like a glass of water tilting — nothing changes, nothing changes, nothing changes — then everything changes at once. We do not know exactly where the edge is. We know we are approaching it. Restore the regulators before the flip. There is no recovery from the other side.');
    camera.position.set(0, 8, 16);
    camera.lookAt(0, 2, -4);
  }, tick(e) {
    globeGroup.rotation.y += 0.008;
    globeGlow.intensity = Math.min(1.5, e * 0.3);
    globeEdge.material.opacity = 0.3 + Math.sin(e * 2) * 0.1;
    setProgress(68 + (e/6)*12);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('RESTORE THE DENOMINATOR', 'Before the flip · Phytoplankton · Forests · Soil · The Three Regulators · There is no recovery from the other side', true);
    speak('We did not reduce the numerator. We restored the denominator. Not carbon capture — the living systems that absorb carbon for free, that have been doing it for 3 billion years, that we broke in 200. Phytoplankton. Forests. Soil. The three regulators. Restored before the flip.');
  }, tick(e) {
    camera.position.z = 16 + e * 0.3;
    camera.position.y = 8  + e * 0.2;
    camera.lookAt(0, 2, -4);
    globeGroup.rotation.y += 0.006;
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'environmental' }, '*'); } catch(e) {}
  setTimeout(() => {
    try {
      const btn = window.parent.document.getElementById('btn-close');
      if (btn) btn.click();
    } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  ocean.material.opacity = 0.3 + Math.sin(t * 0.3) * 0.06;
  if (globeGroup.visible) globeGroup.rotation.y += 0.003;
  camera.position.x = Math.sin(t * 0.06) * 0.6;
  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
