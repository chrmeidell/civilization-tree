<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Body Tells Us Everything</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#1a0000; z-index:50;
}
#progress-fill {
  height:2px; background:#ff4466;
  box-shadow:0 0 8px #ff4466;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#ff4466; text-shadow:0 0 40px rgba(255,68,102,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#440011;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#ff4466; text-shadow:0 0 50px rgba(255,68,102,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#330011; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#1a0000; transition:all 0.4s; }
.dot.on   { background:#ff4466; box-shadow:0 0 6px #ff4466; }
.dot.done { background:#330011; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #330011; color:#440011;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#880033; color:#ff4466; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#330011;
  z-index:45; pointer-events:none;
  line-height:1.8;
}

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(255,44,66,0.004) 2px,rgba(255,44,66,0.004) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>The Body Tells Us Everything</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  HEALTH BRANCH · NODE 10<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040002);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 12);
camera.lookAt(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const keyL = new THREE.DirectionalLight(0xff2244, 1.6);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── HELPERS ─────────────────────────────────

function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity })
  );
}

// ─── VESSEL (blood vessel tube) ─────────────

const vesselPoints = [];
for (let i = 0; i < 24; i++) {
  const t = (i / 23) * Math.PI * 2;
  vesselPoints.push(new THREE.Vector3(
    Math.sin(t * 1.5) * 5,
    Math.cos(t * 0.8) * 1.5 + 1,
    Math.sin(t * 0.6) * 3 - 2
  ));
}
const vesselGeo = new THREE.BufferGeometry().setFromPoints(vesselPoints);
const vessel = new THREE.Line(
  vesselGeo,
  new THREE.LineBasicMaterial({ color: 0x880022, transparent: true, opacity: 0.5 })
);
scene.add(vessel);

// ─── BLOOD CELLS (red spheres flowing) ───────

const cellN = 60;
const cellArr = new Float32Array(cellN * 3);
const cellPhase = new Float32Array(cellN);
for (let i = 0; i < cellN; i++) {
  cellPhase[i] = Math.random() * Math.PI * 2;
  const t = (i / cellN) * Math.PI * 2 + cellPhase[i];
  cellArr[i*3]   = Math.sin(t * 1.5) * 5;
  cellArr[i*3+1] = Math.cos(t * 0.8) * 1.5 + 1;
  cellArr[i*3+2] = Math.sin(t * 0.6) * 3 - 2;
}
const cellGeo = new THREE.BufferGeometry();
cellGeo.setAttribute('position', new THREE.BufferAttribute(cellArr, 3));
const bloodCells = new THREE.Points(
  cellGeo,
  new THREE.PointsMaterial({ color: 0xff1133, size: 0.22, transparent: true, opacity: 0 })
);
scene.add(bloodCells);

// ─── MOLECULAR DATA CLOUD ─────────────────────

const molN = 180;
const molArr = new Float32Array(molN * 3);
const molColors = new Float32Array(molN * 3);
for (let i = 0; i < molN; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 4;
  molArr[i*3]   = Math.cos(a) * r;
  molArr[i*3+1] = Math.random() * 4;
  molArr[i*3+2] = Math.sin(a) * r - 1;
  // Start red, shift to cyan as analysis proceeds
  molColors[i*3]   = 1.0;
  molColors[i*3+1] = 0.1;
  molColors[i*3+2] = 0.2;
}
const molGeo = new THREE.BufferGeometry();
molGeo.setAttribute('position', new THREE.BufferAttribute(molArr, 3));
molGeo.setAttribute('color', new THREE.BufferAttribute(molColors, 3));
const molCloud = new THREE.Points(
  molGeo,
  new THREE.PointsMaterial({ size: 0.07, transparent: true, opacity: 0, vertexColors: true })
);
scene.add(molCloud);

// ─── SCANNER (flat torus ring sweeping up) ───

const scanGeo = new THREE.TorusGeometry(3.5, 0.025, 6, 64);
const scanner = new THREE.Mesh(
  scanGeo,
  new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0 })
);
scanner.rotation.x = Math.PI / 2;
scanner.position.y = 0;
scene.add(scanner);

// ─── SYNTHESIS CHAMBER ────────────────────────

const synthGroup = new THREE.Group();
synthGroup.visible = false;
scene.add(synthGroup);

const synthGeo = new THREE.BoxGeometry(2, 3, 2);
const synthFill = glowMesh(synthGeo, 0x001122, 0.3);
synthFill.position.set(3, 1.5, -1);
const synthEdge = glowEdge(synthGeo, 0x00ccff, 0.6);
synthEdge.position.set(3, 1.5, -1);
synthGroup.add(synthFill); synthGroup.add(synthEdge);

const synthGlow = new THREE.PointLight(0x00ccff, 0, 6);
synthGlow.position.set(3, 2, -1);
synthGroup.add(synthGlow);

// ─── RESPONSE PARTICLES ───────────────────────

const respN = 120;
const respArr = new Float32Array(respN * 3);
for (let i = 0; i < respN; i++) {
  respArr[i*3]   = 3 + (Math.random() - 0.5) * 0.5;
  respArr[i*3+1] = 1 + Math.random() * 2;
  respArr[i*3+2] = -1 + (Math.random() - 0.5) * 0.5;
}
const respGeo = new THREE.BufferGeometry();
respGeo.setAttribute('position', new THREE.BufferAttribute(respArr, 3));
const respDots = new THREE.Points(
  respGeo,
  new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.09, transparent: true, opacity: 0 })
);
scene.add(respDots);

// ─── HEARTBEAT LINE ───────────────────────────

const hbPoints = [];
for (let i = 0; i < 80; i++) {
  hbPoints.push(new THREE.Vector3(-6 + i * 0.15, 0, 0));
}
const hbGeo = new THREE.BufferGeometry().setFromPoints(hbPoints);
const hbLine = new THREE.Line(
  hbGeo,
  new THREE.LineBasicMaterial({ color: 0xff2244, transparent: true, opacity: 0 })
);
hbLine.position.set(0, 3.5, 2);
scene.add(hbLine);

let hbPhase = 0;

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  document.getElementById('statement').style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;
let cellFlow = 0;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => {
      tc.style.opacity = '0';
      setTimeout(() => { tc.style.display = 'none'; }, 1000);
    }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — blood flows (7s)
  { dur:7, enter() {
    setDot(1); setHUD('BLOOD ANALYSIS'); setProgress(8);
    bloodCells.material.opacity = 0.8;
    hbLine.material.opacity = 0.6;
    setCaption('Blood.  Five billion red blood cells per millilitre.  Two thousand distinct proteins.  Hundreds of hormones, metabolites, enzymes.  Your blood is transmitting the complete molecular story of your body — right now.  We just haven\'t been listening.');
    speak('Blood. Five billion red blood cells per millilitre. Two thousand distinct proteins. Hundreds of hormones, metabolites, enzymes. Your blood is transmitting the complete molecular story of your body — right now. We just have not been listening.');
  }, tick(e) {
    cellFlow += 0.012;
    for (let i = 0; i < cellN; i++) {
      const t = (i / cellN) * Math.PI * 2 + cellPhase[i] + cellFlow;
      cellArr[i*3]   = Math.sin(t * 1.5) * 5;
      cellArr[i*3+1] = Math.cos(t * 0.8) * 1.5 + 1;
      cellArr[i*3+2] = Math.sin(t * 0.6) * 3 - 2;
    }
    cellGeo.attributes.position.needsUpdate = true;
    hbPhase += 0.08;
    hbPoints.forEach((p, i) => {
      const x = -6 + i * 0.15;
      const pulse = Math.exp(-Math.pow((x - (hbPhase % 6) - 0.5) * 2.5, 2));
      p.y = pulse * 0.6 + Math.sin(hbPhase * 0.3 + i * 0.2) * 0.05;
    });
    hbGeo.setFromPoints(hbPoints);
    setProgress(8 + (e/7)*10);
  }},

  // 2 — the snapshot problem (6s)
  { dur:6, enter() {
    setDot(2); setHUD('SNAPSHOT LIMITATION'); setProgress(18);
    setCaption('Today: blood test.  One snapshot.  Sent to a lab.  Three days.  A single data point.');
    speak('Today: blood test. One snapshot. Sent to a lab. Three days. A single data point.');
    bloodCells.material.color.set(0x660022);
  }, tick(e) {
    bloodCells.material.opacity = 0.4 + Math.sin(e * 2) * 0.2;
    cellFlow += 0.005;
    for (let i = 0; i < cellN; i++) {
      const t = (i / cellN) * Math.PI * 2 + cellPhase[i] + cellFlow;
      cellArr[i*3]   = Math.sin(t * 1.5) * 5;
      cellArr[i*3+1] = Math.cos(t * 0.8) * 1.5 + 1;
      cellArr[i*3+2] = Math.sin(t * 0.6) * 3 - 2;
    }
    cellGeo.attributes.position.needsUpdate = true;
    setProgress(18 + (e/6)*10);
  }},

  // 3 — molecular scanner activates (7s)
  { dur:7, enter() {
    setDot(3); setHUD('CONTINUOUS SCAN'); setProgress(28);
    bloodCells.material.color.set(0xff1133);
    molCloud.material.opacity = 0.7;
    setCaption('Now: continuous molecular monitoring.  Every protein.  Every hormone.  Every marker.  In real time.');
    speak('Now: continuous molecular monitoring. Every protein. Every hormone. Every marker. In real time.');
  }, tick(e) {
    scanner.material.opacity = 0.6 + Math.sin(e * 8) * 0.3;
    scanner.position.y = (e % 3) * 1.5;
    for (let i = 0; i < molN; i++) {
      const a = Math.atan2(molArr[i*3+2] + 1, molArr[i*3]) + 0.02;
      const r = Math.sqrt(molArr[i*3]**2 + (molArr[i*3+2]+1)**2);
      molArr[i*3]   = Math.cos(a) * r;
      molArr[i*3+2] = Math.sin(a) * r - 1;
      molArr[i*3+1] += Math.sin(e * 3 + i * 0.2) * 0.008;
    }
    molGeo.attributes.position.needsUpdate = true;
    cellFlow += 0.012;
    for (let i = 0; i < cellN; i++) {
      const t = (i / cellN) * Math.PI * 2 + cellPhase[i] + cellFlow;
      cellArr[i*3]   = Math.sin(t * 1.5) * 5;
      cellArr[i*3+1] = Math.cos(t * 0.8) * 1.5 + 1;
      cellArr[i*3+2] = Math.sin(t * 0.6) * 3 - 2;
    }
    cellGeo.attributes.position.needsUpdate = true;
    setProgress(28 + (e/7)*10);
  }},

  // 4 — data turns to understanding (6s)
  { dur:6, enter() {
    setDot(4); setHUD('MOLECULAR DECODE'); setProgress(38);
    setCaption('The molecules speak.  Cortisol elevated.  Insulin dropping.  Iron depleted.  And — three years before the tumor is visible on any scan — a cascade of proteins no healthy cell produces.  Two years before the heart attack, an inflammatory pattern.  The body announces what is coming.  We just need to read it.');
    speak('The molecules speak. Cortisol elevated. Insulin dropping. Iron depleted. And — three years before the tumor is visible on any scan — a cascade of proteins no healthy cell produces. Two years before the heart attack, an inflammatory pattern. The body announces what is coming. We just need to read it.');
    // Shift mol colors from red to cyan
    for (let i = 0; i < molN; i++) {
      molColors[i*3]   = 0.0;
      molColors[i*3+1] = 0.8;
      molColors[i*3+2] = 1.0;
    }
    molGeo.attributes.color.needsUpdate = true;
    hbLine.material.color.set(0x00ccff);
  }, tick(e) {
    scanner.material.opacity = 0.8 + Math.sin(e * 12) * 0.2;
    scanner.position.y = (e % 2.5) * 1.8;
    molCloud.material.opacity = 0.7 + Math.sin(e * 4) * 0.1;
    setProgress(38 + (e/6)*10);
  }},

  // 5 — synthesis chamber activates (7s)
  { dur:5, enter() {
    setDot(5); setHUD('SYNTHESIS RESPONSE'); setProgress(48);
    synthGroup.visible = true;
    setCaption('The system responds.  Exact molecules synthesized.  The precise deficit addressed.');
    speak('The system responds. Exact molecules synthesized. The precise deficit addressed.');
    scanner.material.opacity = 0;
  }, tick(e) {
    synthGlow.intensity = 1 + Math.sin(e * 8) * 0.5;
    synthFill.material.opacity = 0.2 + Math.sin(e * 5) * 0.1;
    synthEdge.material.opacity = 0.5 + Math.sin(e * 6) * 0.2;
    setProgress(48 + (e/5)*10);
  }},

  // 6 — response flows back (7s)
  { dur:7, enter() {
    setDot(6); setHUD('RESPONSE DELIVERED'); setProgress(58);
    respDots.material.opacity = 0.8;
    setCaption('Delivered directly into the bloodstream.  The loop closes.  The body corrects itself.');
    speak('Delivered directly into the bloodstream. The loop closes. The body corrects itself.');
  }, tick(e) {
    for (let i = 0; i < respN; i++) {
      const a = Math.atan2(respArr[i*3+2] + 1, respArr[i*3] - 3) + 0.035;
      const r = Math.sqrt((respArr[i*3]-3)**2 + (respArr[i*3+2]+1)**2);
      const nr = Math.max(0.1, r - 0.04);
      respArr[i*3]   = 3 + Math.cos(a) * nr;
      respArr[i*3+2] = -1 + Math.sin(a) * nr;
      respArr[i*3+1] = 1.5 + Math.sin(e * 3 + i * 0.3) * 1.0;
    }
    respGeo.attributes.position.needsUpdate = true;
    synthGlow.intensity = 0.8 + Math.sin(e * 5) * 0.3;
    cellFlow += 0.015;
    for (let i = 0; i < cellN; i++) {
      const t = (i / cellN) * Math.PI * 2 + cellPhase[i] + cellFlow;
      cellArr[i*3]   = Math.sin(t * 1.5) * 5;
      cellArr[i*3+1] = Math.cos(t * 0.8) * 1.5 + 1;
      cellArr[i*3+2] = Math.sin(t * 0.6) * 3 - 2;
    }
    cellGeo.attributes.position.needsUpdate = true;
    setProgress(58 + (e/7)*10);
  }},

  // 7 — the closed loop (6s)
  { dur:6, enter() {
    setDot(7); setHUD('LOOP CLOSED'); setProgress(68);
    setCaption('You don\'t treat the disease.  It never forms.  Medicine stops being reactive — an ambulance at the bottom of the cliff.  It becomes continuous.  A conversation between the body and the system.  The disease is interrupted before it has a name.');
    speak('You don\'t treat the disease. It never forms. Medicine stops being reactive — an ambulance at the bottom of the cliff. It becomes continuous. A conversation between the body and the system. The disease is interrupted before it has a name.');
    camera.position.set(0, 7, 14);
    camera.lookAt(0, 1.5, -1);
  }, tick(e) {
    bloodCells.material.color.setHSL(0.0, 1, 0.5 + Math.sin(e * 3) * 0.05);
    hbLine.material.opacity = 0.5 + Math.sin(e * 4) * 0.2;
    hbPhase += 0.1;
    hbPoints.forEach((p, i) => {
      const x = -6 + i * 0.15;
      const pulse = Math.exp(-Math.pow((x - (hbPhase % 6) - 0.5) * 2.5, 2));
      p.y = pulse * 0.8 + Math.sin(hbPhase * 0.3 + i * 0.2) * 0.06;
    });
    hbGeo.setFromPoints(hbPoints);
    setProgress(68 + (e/6)*12);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('THE BODY TELLS US EVERYTHING', 'Including what is coming · Continuous · Molecular · The disease is interrupted before it has a name', true);
    speak('The body tells us everything. Including what is coming. The closed loop does not wait for symptoms — it reads the forecast. Every molecule a message. Every signal a diagnosis. Medicine becomes a continuous conversation between the body and a system that listens without judgment, without delay, without error.');
  }, tick(e) {
    camera.position.z = 14 + e * 0.3;
    camera.position.y = 7 + e * 0.2;
    camera.lookAt(0, 1.5, -1);
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'blood' }, '*'); } catch(e) {}
  setTimeout(() => {
    try {
      const btn = window.parent.document.getElementById('btn-close');
      if (btn) btn.click();
    } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  vessel.material.opacity = 0.3 + Math.sin(t * 1.2) * 0.1;
  camera.position.x = Math.sin(t * 0.06) * 0.5;
  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
