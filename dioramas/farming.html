<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farming of the Future</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track {
  position:fixed; top:0; left:0; right:0;
  height:2px; background:#001a14; z-index:50;
}
#progress-fill {
  height:2px; background:#00ffcc;
  box-shadow:0 0 8px #00ffcc;
  width:0%; transition:width 0.4s linear;
}

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0;
  padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption {
  font-size:15px; letter-spacing:1.5px; line-height:1.7;
  color:rgba(255,255,255,0.85); min-height:50px;
  transition:opacity 0.5s;
}

#statement {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:35; pointer-events:none;
  opacity:0; transition:opacity 0.7s;
}
#stmt-main {
  font-size:42px; letter-spacing:10px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 40px rgba(0,255,204,0.5);
  text-align:center;
}
#stmt-sub {
  font-size:12px; letter-spacing:5px; color:#006644;
  margin-top:18px; text-align:center; text-transform:uppercase;
}

#title-card {
  position:fixed; inset:0; z-index:80;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#title-card h1 {
  font-size:22px; letter-spacing:8px; text-transform:uppercase;
  color:#00ffcc; text-shadow:0 0 50px rgba(0,255,204,0.5);
}
#title-card p { font-size:10px; letter-spacing:4px; color:#003322; margin-top:16px; }

#dots {
  position:fixed; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px; z-index:50;
}
.dot { width:28px; height:2px; background:#001a14; transition:all 0.4s; }
.dot.on   { background:#00ffcc; box-shadow:0 0 6px #00ffcc; }
.dot.done { background:#003322; }

#skip {
  position:fixed; top:14px; right:20px; z-index:70;
  background:none; border:1px solid #002a1f; color:#004433;
  font-family:monospace; font-size:9px; letter-spacing:2px;
  padding:6px 14px; cursor:pointer; text-transform:uppercase;
  transition:all 0.2s;
}
#skip:hover { border-color:#006644; color:#00ffcc; }

#complete {
  position:fixed; inset:0; background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:90; gap:18px;
}
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2  { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p   { font-size:10px; letter-spacing:3px; color:#664400; }

#hud {
  position:fixed; top:20px; left:20px;
  font-size:9px; letter-spacing:2px; color:#003322;
  z-index:45; pointer-events:none; line-height:1.8;
}

#morocco-overlay {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center; z-index:35;
  pointer-events:none; opacity:0;
  transition:opacity 0.6s;
}
#morocco-line1 { font-size:24px; letter-spacing:6px; color:#ffcc44; margin:10px 0; }
#morocco-line2 { font-size:12px; letter-spacing:4px; color:#886622; margin:6px 0; }

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,255,204,0.005) 2px,rgba(0,255,204,0.005) 4px);
  pointer-events:none; z-index:9999;
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Farming of the Future</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  AGRICULTURE BRANCH · NODE 05<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<div id="morocco-overlay">
  <div id="morocco-line1">MOROCCO: 70% OF GLOBAL RESERVES</div>
  <div id="morocco-line2">Every nation's food supply depends on it</div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0';
s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5, 11);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const keyL = new THREE.DirectionalLight(0x00ffcc, 2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── HELPERS ────────────────────────────────
function glowMesh(geo, color, opacity) {
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity, wireframe:false }));
}
function glowEdge(geo, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity }));
}

// ─── FIELD (green-tinted grid) ───────────────
const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(68,255,68,0.15)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(6,6);

const field = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x44ff44, transparent: true, opacity: 0.3 })
);
field.rotation.x = -Math.PI/2;
field.position.y = -0.01;
scene.add(field);

// Background floor
const bfc = document.createElement('canvas');
bfc.width = bfc.height = 512;
const bfx = bfc.getContext('2d');
bfx.strokeStyle = 'rgba(0,255,204,0.08)'; bfx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  bfx.beginPath(); bfx.moveTo(i,0); bfx.lineTo(i,512); bfx.stroke();
  bfx.beginPath(); bfx.moveTo(0,i); bfx.lineTo(512,i); bfx.stroke();
}
const bgt = new THREE.CanvasTexture(bfc);
bgt.wrapS = bgt.wrapT = THREE.RepeatWrapping; bgt.repeat.set(10,10);
const bgFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ map: bgt, color: 0x00ffcc, transparent: true, opacity: 0.2 })
);
bgFloor.rotation.x = -Math.PI/2;
bgFloor.position.y = -0.02;
scene.add(bgFloor);

// ─── PHOSPHORUS PIPE ─────────────────────────
const pipeGroup = new THREE.Group();
pipeGroup.position.set(-5, 1, 0);
pipeGroup.rotation.z = 0.4;
pipeGroup.visible = false;
scene.add(pipeGroup);

const pipeGeo = new THREE.CylinderGeometry(0.2, 0.2, 4, 8);
const pipeFill = glowMesh(pipeGeo, 0x221100, 0.2);
const pipeEdge = glowEdge(pipeGeo, 0xffcc44, 0.8);
pipeGroup.add(pipeFill); pipeGroup.add(pipeEdge);

// ─── PHOSPHORUS PARTICLES ────────────────────
const PHN = 150;
const phArr = new Float32Array(PHN * 3);
for (let i = 0; i < PHN; i++) {
  phArr[i*3]   = -5 + (Math.random()-0.5)*1;
  phArr[i*3+1] = 1 + Math.random()*1;
  phArr[i*3+2] = (Math.random()-0.5)*1;
}
const phGeo = new THREE.BufferGeometry();
phGeo.setAttribute('position', new THREE.BufferAttribute(phArr, 3));
const phParticles = new THREE.Points(phGeo,
  new THREE.PointsMaterial({ color: 0xffcc44, size: 0.1, transparent:true, opacity:0 }));
scene.add(phParticles);

// ─── SOIL RINGS ──────────────────────────────
const soilRings = [];
for (let i = 0; i < 4; i++) {
  const rg = new THREE.TorusGeometry(0.8 + i*0.9, 0.03, 4, 32);
  const rm = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({ color: 0x88ff44, transparent:true, opacity:0 }));
  rm.rotation.x = -Math.PI/2;
  rm.position.y = 0.05;
  scene.add(rm);
  soilRings.push(rm);
}

// ─── CROPS ───────────────────────────────────
const cropGroup = new THREE.Group();
scene.add(cropGroup);
const crops = [];
for (let row = 0; row < 3; row++) {
  for (let col = 0; col < 3; col++) {
    const x = (col - 1) * 2.5;
    const z = (row - 1) * 2.5;
    const geo = new THREE.CylinderGeometry(0.12, 0.15, 1.5, 6);
    const fill = glowMesh(geo, 0x004400, 0.25);
    const edge = glowEdge(geo, 0x44ff44, 0.8);
    fill.position.set(x, 0, z);
    edge.position.set(x, 0, z);
    fill.scale.y = 0.01;
    edge.scale.y = 0.01;
    cropGroup.add(fill); cropGroup.add(edge);
    crops.push({ fill, edge, delay: (row*3+col)*0.4 });
  }
}

// ─── WATER DROPS ─────────────────────────────
const WDN = 80;
const wdArr = new Float32Array(WDN * 3);
const cropPositions = [];
for (let row = 0; row < 3; row++) for (let col = 0; col < 3; col++) {
  cropPositions.push({ x:(col-1)*2.5, z:(row-1)*2.5 });
}
for (let i = 0; i < WDN; i++) {
  const cp = cropPositions[i % cropPositions.length];
  wdArr[i*3]   = cp.x + (Math.random()-0.5)*0.6;
  wdArr[i*3+1] = 3 + Math.random()*2;
  wdArr[i*3+2] = cp.z + (Math.random()-0.5)*0.6;
}
const wdGeo = new THREE.BufferGeometry();
wdGeo.setAttribute('position', new THREE.BufferAttribute(wdArr, 3));
const wdParticles = new THREE.Points(wdGeo,
  new THREE.PointsMaterial({ color: 0x4488ff, size: 0.08, transparent:true, opacity:0 }));
scene.add(wdParticles);

// ─── HARVEST ROBOT ───────────────────────────
const robotGroup = new THREE.Group();
robotGroup.position.set(8, 0, -2);
robotGroup.visible = false;
scene.add(robotGroup);

const rbGeo = new THREE.CylinderGeometry(0.3, 0.34, 0.18, 10);
const rbFill = glowMesh(rbGeo, 0x00ccff, 0.12); rbFill.position.y = 0.09;
const rbEdge = glowEdge(rbGeo, 0x00ccff, 0.8); rbEdge.position.y = 0.09;
robotGroup.add(rbFill); robotGroup.add(rbEdge);

const rtGeo = new THREE.CylinderGeometry(0.22, 0.3, 0.88, 10);
const rtFill = glowMesh(rtGeo, 0x00ccff, 0.12); rtFill.position.y = 0.62;
const rtEdge = glowEdge(rtGeo, 0x00ccff, 0.8); rtEdge.position.y = 0.62;
robotGroup.add(rtFill); robotGroup.add(rtEdge);

const sensor = new THREE.Mesh(
  new THREE.SphereGeometry(0.11, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x00ffcc })
);
sensor.position.y = 1.14;
robotGroup.add(sensor);

const robotLight = new THREE.PointLight(0x00ccff, 0.8, 4);
robotLight.position.set(0, 1, 0);
robotGroup.add(robotLight);

let robotPath = 0;

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  const el = document.getElementById('statement');
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  el.style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'dot'+(i<n?' done':i===n?' on':'');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct+'%'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title fades (3s)
  { dur:3, enter() {
    setDot(0); setHUD('PHOSPHORUS DEFICIT'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity='0'; setTimeout(()=>{ tc.style.display='none'; },1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — field visible, phosphorus deficit (8s)
  { dur:8, enter() {
    setDot(1); setHUD('PHOSPHORUS DEFICIT'); setProgress(8);
    setCaption('Every crop takes phosphorus from the soil. It does not return. Each harvest depletes what took millions of years to form.');
    speak('Every crop takes phosphorus from the soil. It does not return. Each harvest depletes what took millions of years to form.');
  }, tick(e) {
    field.material.opacity = 0.25 + Math.sin(e*0.8)*0.05;
    setProgress(8 + (e/8)*10);
  }},

  // 2 — Morocco overlay (7s)
  { dur:7, enter() {
    setDot(2); setHUD('GEOPOLITICAL RISK'); setProgress(18);
    document.getElementById('morocco-overlay').style.opacity = '1';
    setCaption('Morocco controls 70 percent of the world\'s known phosphate reserves.  At current consumption rates: 300 to 400 years of supply remain.  Then: nothing.  No phosphorus, no synthetic fertilizer.  No synthetic fertilizer, no food for 8 billion people.  This is the most important geopolitical fact almost no one knows.');
    speak('Morocco controls 70 percent of the world\'s known phosphate reserves. At current consumption rates: 300 to 400 years of supply remain. Then: nothing. No phosphorus, no synthetic fertilizer. No synthetic fertilizer, no food for 8 billion people. This is the most important geopolitical fact almost no one knows.');
  }, tick(e) {
    setProgress(18 + (e/7)*10);
  }},

  // 3 — Morocco fades, nutrient loss (7s)
  { dur:7, enter() {
    setDot(3); setHUD('NUTRIENT LOSS'); setProgress(28);
    document.getElementById('morocco-overlay').style.opacity = '0';
    setCaption('Every kilogram of phosphorus humanity consumes passes through sewage. Lost to rivers. To the sea.');
    speak('Every kilogram of phosphorus humanity consumes passes through sewage. Lost to rivers. To the sea.');
  }, tick(e) {
    setProgress(28 + (e/7)*10);
  }},

  // 4 — pipe appears, particles flow onto field (8s)
  { dur:8, enter() {
    setDot(4); setHUD('PHOSPHORUS RECOVERED'); setProgress(38);
    pipeGroup.visible = true;
    phParticles.material.opacity = 0.8;
    for (let i = 0; i < PHN; i++) {
      phArr[i*3]   = -5 + (Math.random()-0.5)*1;
      phArr[i*3+1] = 1 + Math.random()*1;
      phArr[i*3+2] = (Math.random()-0.5)*1;
    }
    phGeo.attributes.position.needsUpdate = true;
    setCaption('The disintegrator recovers it complete. From feces. From waste. Returned to where it came from.');
    speak('The disintegrator recovers it complete. From feces. From waste. Returned to where it came from.');
  }, tick(e) {
    for (let i = 0; i < PHN; i++) {
      const tx = (Math.random()-0.5)*8, tz = (Math.random()-0.5)*8;
      phArr[i*3]   += ((Math.random()-0.5)*4 - phArr[i*3])  *0.025;
      phArr[i*3+1] += (0.05 - phArr[i*3+1]) * 0.025;
      phArr[i*3+2] += ((Math.random()-0.5)*4 - phArr[i*3+2])*0.025;
    }
    phGeo.attributes.position.needsUpdate = true;
    setProgress(38 + (e/8)*12);
  }},

  // 5 — soil absorption rings (7s)
  { dur:7, enter() {
    setDot(5); setHUD('SOIL ENRICHED'); setProgress(50);
    phParticles.material.opacity = 0;
    setCaption('The soil absorbs what belongs to it.  And the nitrogen cycle closes too.  Synthetic nitrogen fertilizer creates nitrous oxide — three hundred times the warming potential of carbon dioxide, ten percent of all human greenhouse emissions.  The closed NPK loop eliminates it.  Entirely.  At source.  No mining.  No dependency.  No Morocco.  No climate cost.');
    speak('The soil absorbs what belongs to it. And the nitrogen cycle closes too. Synthetic nitrogen fertilizer creates nitrous oxide — three hundred times the warming potential of carbon dioxide, ten percent of all human greenhouse emissions. The closed NPK loop eliminates it. Entirely. At source. No mining. No dependency. No Morocco. No climate cost.');
  }, tick(e) {
    soilRings.forEach((ring, i) => {
      const phase = e * 0.8 - i * 0.3;
      const cyc = (phase % 2 + 2) % 2;
      ring.material.opacity = Math.max(0, 0.7 - cyc * 0.35);
      const s = 0.5 + cyc * 0.8;
      ring.scale.setScalar(s);
    });
    field.material.opacity = 0.3 + Math.sin(e*2)*0.08;
    setProgress(50 + (e/7)*10);
  }},

  // 6 — crops grow, water falls (8s)
  { dur:8, enter() {
    setDot(6); setHUD('CROPS GROWING'); setProgress(60);
    wdParticles.material.opacity = 0.7;
    setCaption('Crops grow. Yield up. Cost down. Precision irrigation: the right water, the right place, the right time.');
    speak('Crops grow. Yield up. Cost down. Precision irrigation: the right water, the right place, the right time.');
  }, tick(e) {
    crops.forEach(({ fill, edge, delay }) => {
      const t = Math.min(1, Math.max(0, (e - delay)*0.5));
      fill.scale.y = Math.max(0.01, t);
      edge.scale.y = Math.max(0.01, t);
    });
    // water falls
    for (let i = 0; i < WDN; i++) {
      wdArr[i*3+1] -= 0.04;
      if (wdArr[i*3+1] < 0) {
        const cp = cropPositions[i % cropPositions.length];
        wdArr[i*3]   = cp.x + (Math.random()-0.5)*0.6;
        wdArr[i*3+1] = 3 + Math.random()*2;
        wdArr[i*3+2] = cp.z + (Math.random()-0.5)*0.6;
      }
    }
    wdGeo.attributes.position.needsUpdate = true;
    setProgress(60 + (e/8)*10);
  }},

  // 7 — harvest robot (7s)
  { dur:7, enter() {
    setDot(7); setHUD('HARVEST ACTIVE'); setProgress(70);
    robotGroup.visible = true;
    robotGroup.position.set(6, 0, -2.5);
    robotPath = 0;
    wdParticles.material.opacity = 0;
    setCaption('A third of all food produced is wasted before it is eaten.  A third of all the phosphorus.  A third of all the water.  A third of all the nitrogen — and its climate cost.  The disintegrator recovers it all.  From what was lost, the next harvest is fed.  The loop is complete.');
    speak('A third of all food produced is wasted before it is eaten. A third of all the phosphorus. A third of all the water. A third of all the nitrogen — and its climate cost. The disintegrator recovers it all. From what was lost, the next harvest is fed. The loop is complete.');
  }, tick(e) {
    robotPath += 0.012;
    robotGroup.position.x = Math.cos(robotPath*0.6)*4;
    robotGroup.position.z = Math.sin(robotPath*0.4)*2 - 0.5;
    robotLight.intensity = 0.6 + Math.sin(e*3)*0.2;
    sensor.material.color.setHSL(0.5, 1, 0.5+Math.sin(e*5)*0.1);
    setProgress(70 + (e/7)*10);
  }},

  // 8 — camera back, statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('MISSION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('EVERYONE EATS', 'Closed NPK loop · N₂O eliminated · Geopolitical weapon disarmed · The oldest scarcity ends', true);
    speak('Everyone eats. The phosphorus returns to the soil. The nitrogen cycle closes. The climate cost of agriculture disappears. Morocco\'s leverage dissolves. The oldest scarcity — who gets to eat — ends. Not because we discovered more. Because we stopped wasting what we had.');
  }, tick(e) {
    camera.position.z = 11 + e*0.28;
    camera.position.y = 5  + e*0.16;
    camera.lookAt(0, 0, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1-(e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption(''); showStatement('','',false); setProgress(100);
  document.getElementById('morocco-overlay').style.opacity = '0';
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'farming' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

// ═══════════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════════

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step+1);
  }

  if (robotGroup.visible) sensor.material.color.setHSL(0.5, 1, 0.5+Math.sin(t*5)*0.1);
  bgFloor.material.opacity = 0.15 + Math.sin(t*0.4)*0.05;
  if (step < 8) camera.position.x = Math.sin(t*0.07)*0.5;

  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
