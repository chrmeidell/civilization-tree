<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atoms Are the Bricks of Reality</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

#progress-track { position:fixed; top:0; left:0; right:0; height:2px; background:#0c1320; z-index:50; }
#progress-fill { height:2px; background:#ffdd66; box-shadow:0 0 8px #ffdd66; width:0%; transition:width 0.4s linear; }

#caption-wrap {
  position:fixed; bottom:0; left:0; right:0; padding:20px 60px 28px;
  background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  text-align:center; z-index:40; pointer-events:none;
}
#caption { font-size:15px; letter-spacing:1.5px; line-height:1.7; color:rgba(255,255,255,0.9); min-height:50px; transition:opacity 0.5s; }

#statement { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:35; pointer-events:none; opacity:0; transition:opacity 0.7s; }
#stmt-main { font-size:40px; letter-spacing:9px; text-transform:uppercase; color:#ffdd66; text-shadow:0 0 40px rgba(255,221,102,0.5); text-align:center; }
#stmt-sub { font-size:12px; letter-spacing:5px; color:#665522; margin-top:18px; text-align:center; text-transform:uppercase; }

#title-card { position:fixed; inset:0; z-index:80; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; transition:opacity 1s; }
#title-card h1 { font-size:22px; letter-spacing:8px; text-transform:uppercase; color:#ffdd66; text-shadow:0 0 50px rgba(255,221,102,0.5); text-align:center; }
#title-card p { font-size:10px; letter-spacing:4px; color:#443311; margin-top:16px; }

#dots { position:fixed; top:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:50; }
.dot { width:28px; height:2px; background:#1a1505; transition:all 0.4s; }
.dot.on { background:#ffdd66; box-shadow:0 0 6px #ffdd66; }
.dot.done { background:#443311; }

#skip { position:fixed; top:14px; right:20px; z-index:70; background:none; border:1px solid #332a11; color:#665522; font-family:monospace; font-size:9px; letter-spacing:2px; padding:6px 14px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
#skip:hover { border-color:#998833; color:#ffdd66; }

#complete { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:90; gap:18px; }
#complete.show { display:flex; }
#complete .ck { font-size:60px; color:#ffcc44; text-shadow:0 0 40px rgba(255,204,68,0.4); }
#complete h2 { font-size:13px; letter-spacing:6px; color:#ffcc44; text-transform:uppercase; }
#complete p { font-size:10px; letter-spacing:3px; color:#664400; }

#hud { position:fixed; top:20px; left:20px; font-size:9px; letter-spacing:2px; color:#998844; z-index:45; pointer-events:none; line-height:1.8; }

body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,221,102,0.004) 2px,rgba(255,221,102,0.004) 4px); pointer-events:none; z-index:9999; }
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="dots">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div><div class="dot" id="d7"></div>
  <div class="dot" id="d8"></div>
</div>

<div id="title-card">
  <h1>Atoms Are the Bricks of Reality</h1>
  <p>A Civilization Technology Tree Episode &nbsp;·&nbsp; Created by AI</p>
</div>

<div id="hud">
  INNOVANEXUS SYSTEMS<br>
  FOUNDATION BRANCH · NODE 00<br>
  <span id="hud-state">INITIALIZING...</span>
</div>

<div id="statement">
  <div id="stmt-main"></div>
  <div id="stmt-sub"></div>
</div>

<button id="skip">Skip ▶</button>
<div id="caption-wrap"><div id="caption"></div></div>

<div id="complete">
  <div class="ck">✓</div>
  <h2>Episode Complete</h2>
  <p>Returning to the tree...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const s = renderer.domElement.style;
s.position = 'fixed'; s.top = s.left = '0'; s.width = s.height = '100%'; s.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1320);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 3.5, 9);
camera.lookAt(0, 1.2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.9));
const keyL = new THREE.DirectionalLight(0xffffff, 1.2);
keyL.position.set(-3, 8, 5); scene.add(keyL);

// ─── GROUND ──────────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
gx.strokeStyle = 'rgba(120,140,180,0.18)'; gx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping; gt.repeat.set(10,10);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshBasicMaterial({ map: gt, color: 0x2a3450, transparent: true, opacity: 0.5 })
);
floor.rotation.x = -Math.PI / 2; floor.position.y = -0.02;
scene.add(floor);

// ─── LEGO BRICK FACTORY ──────────────────────

const BRICK_COLORS = [0xff4455, 0x4488ff, 0xffcc33, 0x66cc55, 0xff8833, 0xcc66ff];

function legoBrick(color, w, h, d) {
  w = w || 0.62; h = h || 0.38; d = d || 0.62;
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
  );
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d)),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 })
  );
  g.add(body); g.add(edge);
  // 2x2 studs on top
  [-w/4, w/4].forEach(sx => [-d/4, d/4].forEach(sz => {
    const stud = new THREE.Mesh(
      new THREE.CylinderGeometry(w/6.5, w/6.5, h*0.42, 12),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 })
    );
    stud.position.set(sx, h/2 + h*0.21, sz);
    g.add(stud);
  }));
  g.userData.body = body; g.userData.edge = edge;
  return g;
}

function setBrickOpacity(brick, o) {
  brick.traverse(m => { if (m.material) m.material.opacity = (m.type === 'LineSegments') ? o*0.35 : o*0.9; });
}

// ─── BUILT OBJECT (a little house of bricks) ──

const built = new THREE.Group();
scene.add(built);

// layout: rows of bricks forming a small house
const housePlan = [
  // [x, y, z, colorIndex]
  [-0.62, 0.19, 0, 0], [0, 0.19, 0, 1], [0.62, 0.19, 0, 2],          // base row
  [-0.62, 0.57, 0, 3], [0, 0.57, 0, 4], [0.62, 0.57, 0, 5],          // wall row
  [-0.31, 0.95, 0, 1], [0.31, 0.95, 0, 0],                            // upper
  [0, 1.33, 0, 2],                                                    // roof peak
];
const bricks = [];
housePlan.forEach(([x, y, z, ci]) => {
  const b = legoBrick(BRICK_COLORS[ci]);
  b.position.set(x, y, z);
  b.userData.home = new THREE.Vector3(x, y, z);
  b.userData.color = BRICK_COLORS[ci];
  built.add(b);
  bricks.push(b);
});

// ─── LANDFILL PILE (grey discarded bricks) ───

const landfill = new THREE.Group();
landfill.position.set(5.5, 0, -1);
landfill.visible = false;
scene.add(landfill);
for (let i = 0; i < 14; i++) {
  const b = legoBrick(0x445566);
  b.position.set((Math.random()-0.5)*2.4, 0.2 + Math.random()*0.9, (Math.random()-0.5)*2.0);
  b.rotation.set(Math.random(), Math.random(), Math.random());
  landfill.add(b);
}

// ─── ATOM CLOUD (the bricks of reality) ──────
// element-colored spheres: C grey, H white, O red, N blue

const ATOM_COLORS = [0x88ddff, 0xffffff, 0xff5555, 0x66ff99, 0xffdd44];
const atomGroup = new THREE.Group();
atomGroup.visible = false;
scene.add(atomGroup);
const ATOMS = 90;
const atoms = [];
for (let i = 0; i < ATOMS; i++) {
  const col = ATOM_COLORS[i % ATOM_COLORS.length];
  const a = new THREE.Mesh(
    new THREE.SphereGeometry(0.10, 12, 12),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.95 })
  );
  a.userData.home = new THREE.Vector3(
    (Math.random()-0.5)*1.0, 1.0 + (Math.random()-0.5)*1.0, (Math.random()-0.5)*1.0
  );
  a.position.copy(a.userData.home);
  atomGroup.add(a);
  atoms.push(a);
}
const atomLight = new THREE.PointLight(0xffffff, 0, 8);
atomLight.position.set(0, 1.2, 0);
atomGroup.add(atomLight);

// ─── DISINTEGRATOR BEAM ──────────────────────

const beamGeo = new THREE.CylinderGeometry(1.3, 0.1, 3.2, 20, 1, true);
const beam = new THREE.Mesh(beamGeo, new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0, side: THREE.DoubleSide }));
beam.position.set(0, 2.6, 0);
scene.add(beam);

// ─── ENERGY BOLTS (cost of fresh material) ───

const boltGroup = new THREE.Group();
boltGroup.visible = false;
scene.add(boltGroup);
for (let i = 0; i < 8; i++) {
  const pts = [];
  let x = -4 + Math.random()*0.5, y = 3.5;
  for (let j = 0; j < 6; j++) { pts.push(new THREE.Vector3(x, y, -1)); x += (Math.random()-0.5)*0.6; y -= 0.5; }
  const bolt = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.6 })
  );
  boltGroup.add(bolt);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════

function setCaption(txt) {
  const el = document.getElementById('caption');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = txt; el.style.opacity = '1'; }, 320);
}
function showStatement(main, sub, show) {
  document.getElementById('stmt-main').textContent = main;
  document.getElementById('stmt-sub').textContent = sub || '';
  document.getElementById('statement').style.opacity = show ? '1' : '0';
}
function setDot(n) {
  for (let i = 0; i < 9; i++) {
    const d = document.getElementById('d' + i);
    if (d) d.className = 'dot' + (i < n ? ' done' : i === n ? ' on' : '');
  }
}
function setHUD(txt) { document.getElementById('hud-state').textContent = txt; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 0.88; u.volume = 1;
  const vv = speechSynthesis.getVoices();
  const pick = vv.find(v => /Samantha|Daniel|Karen|Moira|Alex|Victoria/.test(v.name));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// STEPS
// ═══════════════════════════════════════════════

let step = -1, stepT = 0, isComplete = false;

const STEPS = [

  // 0 — title (3s)
  { dur:3, enter() {
    setDot(0); setHUD('LOADING SCENARIO'); setProgress(0);
    const tc = document.getElementById('title-card');
    setTimeout(() => { tc.style.opacity = '0'; setTimeout(() => { tc.style.display = 'none'; }, 1000); }, 500);
  }, tick(e) { setProgress((e/3)*8); }},

  // 1 — we assume: the built object (7s)
  { dur:7, enter() {
    setDot(1); setHUD('A BUILT OBJECT'); setProgress(8);
    built.position.set(0, 0, 0);
    bricks.forEach(b => { b.position.copy(b.userData.home); setBrickOpacity(b, 1); });
    setCaption('We assume the things we build are permanent objects.  A toy.  A phone.  A chair.  We build it once.  We use it.  And then we are done with it.');
    speak('We assume the things we build are permanent objects. A toy. A phone. A chair. We build it once. We use it. And then we are done with it.');
  }, tick(e) {
    built.rotation.y = Math.sin(e * 0.4) * 0.2;
    setProgress(8 + (e/7)*10);
  }},

  // 2 — thrown into the landfill (7s)
  { dur:7, enter() {
    setDot(2); setHUD('DISCARDED'); setProgress(18);
    landfill.visible = true;
    setCaption('So we throw what we built into the landfill.  And we say:  I need to buy more.  More bricks.  More objects.  More stuff.');
    speak('So we throw what we built into the landfill. And we say: I need to buy more. More bricks. More objects. More stuff.');
  }, tick(e) {
    // the house tumbles toward the landfill
    const t = Math.min(1, e * 0.22);
    built.position.x = t * 5.0;
    built.position.y = Math.sin(t * Math.PI) * 1.6;   // arc
    built.rotation.z = t * 3.0;
    built.rotation.x = t * 2.0;
    if (e > 4.5) { built.visible = false; }
    setProgress(18 + (e/7)*10);
  }},

  // 3 — what you might not know: the cost of fresh material (8s)
  { dur:8, enter() {
    setDot(3); setHUD('FRESH MATERIAL COST'); setProgress(28);
    boltGroup.visible = true;
    setCaption('What you might not know:  to make new bricks, we drill for oil.  We mine fresh material from the earth.  We spend enormous energy manufacturing what we already had.  Wasteful.  And honestly — silly.');
    speak('What you might not know: to make new bricks, we drill for oil. We mine fresh material from the earth. We spend enormous energy manufacturing what we already had. Wasteful. And honestly, silly.');
  }, tick(e) {
    boltGroup.children.forEach((b, i) => {
      b.material.opacity = 0.3 + Math.abs(Math.sin(e * 6 + i)) * 0.6;
    });
    // rebuild a fresh (dim) house from scratch on the left to show "buying more"
    setProgress(28 + (e/8)*10);
  }},

  // 4 — but what if: disassemble back into bricks (8s)
  { dur:8, enter() {
    setDot(4); setHUD('DISASSEMBLY'); setProgress(38);
    boltGroup.visible = false;
    built.visible = true;
    built.position.set(0, 0, 0);
    built.rotation.set(0, 0, 0);
    bricks.forEach(b => { b.position.copy(b.userData.home); b.rotation.set(0,0,0); setBrickOpacity(b, 1); });
    setCaption('But what if you could take it apart?  LEGO makes this obvious.  Disassemble anything back into bricks — clean, whole, ready.  And build something entirely new.');
    speak('But what if you could take it apart? LEGO makes this obvious. Disassemble anything back into bricks — clean, whole, ready. And build something entirely new.');
  }, tick(e) {
    // bricks float apart into a tidy hovering grid
    const t = Math.min(1, e * 0.18);
    bricks.forEach((b, i) => {
      const col = i % 3, row = Math.floor(i / 3);
      const gx = (col - 1) * 1.0;
      const gy = 0.6 + row * 0.85;
      const gz = 1.2;
      b.position.x = b.userData.home.x + (gx - b.userData.home.x) * t;
      b.position.y = b.userData.home.y + (gy - b.userData.home.y) * t;
      b.position.z = b.userData.home.z + (gz - b.userData.home.z) * t;
      b.rotation.y = e * 0.8;
    });
    setProgress(38 + (e/8)*10);
  }},

  // 5 — zoom into a brick: it is atoms (7s)
  { dur:7, enter() {
    setDot(5); setHUD('LOOK CLOSER'); setProgress(48);
    setCaption('And look closer.  Closer than LEGO.  Every brick — every object you have ever held — is built from the same tiny set of bricks:  atoms.');
    speak('And look closer. Closer than LEGO. Every brick — every object you have ever held — is built from the same tiny set of bricks: atoms.');
  }, tick(e) {
    // bricks shrink/fade away, atoms emerge in their place
    const t = Math.min(1, e * 0.30);
    bricks.forEach(b => { setBrickOpacity(b, 1 - t); b.scale.setScalar(Math.max(0.01, 1 - t)); });
    atomGroup.visible = true;
    atoms.forEach(a => { a.material.opacity = t * 0.95; a.scale.setScalar(t); });
    atomLight.intensity = t * 1.4;
    atomGroup.rotation.y = e * 0.4;
    setProgress(48 + (e/7)*10);
  }},

  // 6 — the disintegrator beam: anything → atoms (8s)
  { dur:8, enter() {
    setDot(6); setHUD('DISINTEGRATOR'); setProgress(58);
    setCaption('What if a machine could disassemble anything you hold in your hand — back into its original atoms?  Sorted.  Pure.  Ready to use again.  That machine is the disintegrator.');
    speak('What if a machine could disassemble anything you hold in your hand — back into its original atoms? Sorted. Pure. Ready to use again. That machine is the disintegrator.');
  }, tick(e) {
    beam.material.opacity = Math.min(0.4, e * 0.15) * (0.7 + Math.sin(e * 8) * 0.3);
    beam.rotation.y = e * 1.5;
    // atoms swirl in a vortex under the beam
    atoms.forEach((a, i) => {
      const ang = e * 1.2 + i * 0.4;
      const rad = 0.4 + (i % 5) * 0.18;
      a.position.x = Math.cos(ang) * rad;
      a.position.z = Math.sin(ang) * rad;
      a.position.y = 1.0 + Math.sin(e * 2 + i) * 0.5;
    });
    setProgress(58 + (e/8)*10);
  }},

  // 7 — rebuild from the same atoms (7s)
  { dur:7, enter() {
    setDot(7); setHUD('REBUILD'); setProgress(68);
    beam.material.opacity = 0;
    setCaption('The same atoms.  Rebuilt into whatever you need.  Nothing mined.  Nothing burned.  Nothing thrown away.  The brick was never used up — only rearranged.');
    speak('The same atoms. Rebuilt into whatever you need. Nothing mined. Nothing burned. Nothing thrown away. The brick was never used up — only rearranged.');
  }, tick(e) {
    // atoms reassemble into the house silhouette, then bricks fade back in
    const t = Math.min(1, e * 0.22);
    atoms.forEach((a, i) => {
      const target = a.userData.home;
      a.position.x += (target.x - a.position.x) * 0.08;
      a.position.y += (target.y - a.position.y) * 0.08;
      a.position.z += (target.z - a.position.z) * 0.08;
      a.material.opacity = (1 - t) * 0.95;
    });
    bricks.forEach((b, i) => {
      b.scale.setScalar(t);
      b.position.copy(b.userData.home);
      b.rotation.set(0, 0, 0);
      setBrickOpacity(b, t);
    });
    atomLight.intensity = (1 - t) * 1.4;
    setProgress(68 + (e/7)*12);
  }},

  // 8 — statement (8s)
  { dur:8, enter() {
    setDot(8); setHUD('FOUNDATION COMPLETE'); setProgress(80);
    setCaption('');
    showStatement('ATOMS ARE THE BRICKS', 'Disassemble anything · Rebuild everything · Nothing is waste — only un-sorted bricks', true);
    speak('Atoms are the bricks of reality. Once you can disassemble anything back into them, the idea of waste disappears. There is no garbage — only bricks waiting to be sorted and used again. This is the foundation. Everything else in this tree is built on it.');
  }, tick(e) {
    built.rotation.y += 0.01;
    camera.position.z = 9 + e * 0.3;
    camera.position.y = 3.5 + e * 0.18;
    camera.lookAt(0, 1.2, 0);
    if (e > 6) document.getElementById('statement').style.opacity = String(1 - (e-6)/2);
    setProgress(80 + (e/8)*20);
  }},
];

// ═══════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════

function complete() {
  if (isComplete) return;
  isComplete = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
  setCaption('');
  showStatement('', '', false);
  setProgress(100);
  document.getElementById('complete').classList.add('show');
  try { window.parent.postMessage({ type:'diorama-complete', nodeId:'disassembly' }, '*'); } catch(e) {}
  setTimeout(() => {
    try { const btn = window.parent.document.getElementById('btn-close'); if (btn) btn.click(); } catch(e) {}
  }, 2800);
}

document.getElementById('skip').addEventListener('click', complete);

function startStep(n) {
  step = n; stepT = 0;
  if (n < STEPS.length) STEPS[n].enter();
  else complete();
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (!isComplete && step >= 0 && step < STEPS.length) {
    stepT += dt;
    STEPS[step].tick(stepT);
    if (stepT >= STEPS[step].dur) startStep(step + 1);
  }

  floor.material.opacity = 0.45 + Math.sin(t * 0.4) * 0.06;
  if (step < 8 || step < 0) camera.position.x = Math.sin(t * 0.07) * 0.5;
  renderer.render(scene, camera);
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  if (speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

animate();
setTimeout(() => startStep(0), 900);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
