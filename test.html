<!DOCTYPE html>
<html>
<head>
<style>
body { margin:0; background:#000; }
#log { position:fixed; top:10px; left:10px; color:#0f0; font-family:monospace; font-size:12px; z-index:99; }
</style>
</head>
<body>
<div id="log">Loading...</div>
<script>
const log = document.getElementById('log');
function say(s) { log.innerHTML += '<br>' + s; console.log(s); }

say('Page loaded');

// Test WebGL directly
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;';
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { say('NO WEBGL'); } else { say('WebGL OK'); }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
  onload="say('THREE loaded: ' + (typeof THREE))"
  onerror="say('THREE FAILED TO LOAD')">
</script>
<script>
window.addEventListener('load', function() {
  say('Window loaded');
  if (typeof THREE === 'undefined') { say('THREE not defined!'); return; }
  say('THREE version: ' + THREE.REVISION);

  try {
    const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('canvas') });
    renderer.setSize(window.innerWidth, window.innerHeight);
    say('Renderer OK');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);

    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0, 0, 8);

    const mesh = new THREE.Mesh(
      new THREE.IcosahedronGeometry(2),
      new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: false })
    );
    scene.add(mesh);
    say('Mesh added');

    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();
    say('Animating');
  } catch(e) {
    say('ERROR: ' + e.message);
  }
});
</script>
</body>
</html>
