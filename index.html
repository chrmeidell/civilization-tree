<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civilization Technology Tree</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #04080f;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  color: #00ffcc;
  user-select: none;
}

/* ── HEADER ──────────────────────────────────────────────── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 20;
  pointer-events: none;
  background: linear-gradient(to bottom, rgba(4,8,15,0.95) 0%, transparent 100%);
}
#header h1 {
  font-size: 13px;
  letter-spacing: 7px;
  text-transform: uppercase;
  text-shadow: 0 0 24px rgba(0,255,204,0.7);
}
#header p {
  font-size: 9px;
  letter-spacing: 3px;
  color: #003322;
  margin-top: 5px;
}
#progress-wrap { text-align: right; }
#progress-count {
  font-size: 22px;
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(0,255,204,0.5);
}
#progress-bar-wrap {
  width: 120px;
  height: 2px;
  background: #001a14;
  margin-top: 6px;
}
#progress-bar {
  height: 2px;
  background: #00ffcc;
  box-shadow: 0 0 8px #00ffcc;
  width: 0%;
  transition: width 0.8s ease;
}
#progress-label {
  font-size: 8px;
  letter-spacing: 3px;
  color: #003322;
  margin-top: 4px;
}

/* ── FOOTER ──────────────────────────────────────────────── */
#footer {
  position: fixed;
  bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 3px;
  color: #002217;
  z-index: 20;
  pointer-events: none;
}

/* ── NODE LABELS ─────────────────────────────────────────── */
.nlabel {
  position: fixed;
  pointer-events: none;
  text-align: center;
  transform: translate(-50%, 0);
  z-index: 5;
}
.nlabel .nl-name {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  text-shadow: 0 0 8px currentColor;
}
.nlabel .nl-branch {
  font-size: 7px;
  letter-spacing: 1px;
  opacity: 0.5;
  margin-top: 3px;
}
.nlabel .nl-status {
  font-size: 7px;
  letter-spacing: 1px;
  margin-top: 3px;
}
.nlabel .nl-check {
  font-size: 13px;
  margin-top: 2px;
}

/* ── DIORAMA OVERLAY ─────────────────────────────────────── */
#diorama-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 200;
  display: none;
  flex-direction: column;
}
#diorama-overlay.open { display: flex; }

#diorama-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: rgba(4,8,15,0.95);
  border-bottom: 1px solid #001a14;
  flex-shrink: 0;
}
#diorama-title {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(0,255,204,0.5);
}
#diorama-branch {
  font-size: 8px;
  letter-spacing: 3px;
  color: #004433;
}

#diorama-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}
.d-btn {
  background: none;
  border: 1px solid #003322;
  color: #00ffcc99;
  font-family: monospace;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 6px 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.d-btn:hover {
  border-color: #00ffcc66;
  color: #00ffcc;
}
#diorama-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* ── UNLOCK TOAST ────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 60px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(4,8,15,0.95);
  border: 1px solid #00ffcc44;
  padding: 12px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  color: #00ffcc;
  text-transform: uppercase;
  z-index: 300;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,255,204,0.1);
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── FLASH ───────────────────────────────────────────────── */
#flash {
  position: fixed;
  inset: 0;
  background: rgba(0,255,204,0.04);
  pointer-events: none;
  z-index: 400;
  opacity: 0;
  transition: opacity 0.5s;
}

/* ── SCANLINES ───────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,255,204,0.007) 2px, rgba(0,255,204,0.007) 4px
  );
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>Civilization Technology Tree</h1>
    <p>An open learning path — created by AI for humanity</p>
  </div>
  <div id="progress-wrap">
    <div id="progress-count">0 / 7</div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-label">EPISODES COMPLETE</div>
  </div>
</div>

<div id="footer">DRAG · ZOOM · CLICK A NODE TO BEGIN</div>
<div id="flash"></div>
<div id="toast"></div>

<!-- Diorama overlay -->
<div id="diorama-overlay">
  <div id="diorama-bar">
    <div>
      <div id="diorama-branch">BRANCH</div>
      <div id="diorama-title">TITLE</div>
    </div>
    <div id="diorama-controls">
      <button class="d-btn" id="btn-mark">Mark Complete</button>
      <button class="d-btn" id="btn-close">× Close</button>
    </div>
  </div>
  <iframe id="diorama-frame" allowfullscreen allow="autoplay"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onerror="window._noOrbit=true"></script>
<script>

// ═══════════════════════════════════════════════════════════════
// TREE DATA
// ═══════════════════════════════════════════════════════════════

const TREE = [
  {
    id: 'homeless',
    title: 'Homelessness of the Future',
    branch: 'SHELTER',
    desc: 'Container. Robot fleet. Fitted clothing from waste in 12 minutes.',
    diorama: 'dioramas/homeless.html', // SHELTER
    pos: [0, 0, 0],
    geo: 'icosahedron',
    color: '#00ffcc',
    prereqs: [],
  },
  {
    id: 'hospital',
    title: 'Hospital of the Future',
    branch: 'HEALTHCARE',
    desc: 'Autonomous closed-loop healthcare. Zero supply chain dependency.',
    diorama: 'dioramas/hospital.html',
    pos: [-5.5, 0, -2.5],
    geo: 'octahedron',
    color: '#00ccff',
    prereqs: ['homeless'],
  },
  {
    id: 'sewage',
    title: 'Sewage Treatment of the Future',
    branch: 'WATER',
    desc: 'Energy-positive. Recovers phosphorus, water, hydrogen. Zero discharge.',
    diorama: 'dioramas/sewage.html',
    pos: [-5.5, 0, 3],
    geo: 'tetrahedron',
    color: '#44ffaa',
    prereqs: ['hospital'],
  },
  {
    id: 'energy',
    title: 'Energy of the Future',
    branch: 'ENERGY',
    desc: 'Waste-to-hydrogen closed loop. Net surplus from every ton processed.',
    diorama: 'dioramas/energy.html',
    pos: [5.5, 0, -2.5],
    geo: 'dodecahedron',
    color: '#ffaa00',
    prereqs: ['homeless'],
  },
  {
    id: 'farming',
    title: 'Farming of the Future',
    branch: 'AGRICULTURE',
    desc: 'Closed NPK loop. Phosphorus from sewage. Everyone eats.',
    diorama: 'dioramas/farming.html',
    pos: [5.5, 0, 3],
    geo: 'sphere',
    color: '#88ff44',
    prereqs: ['sewage', 'energy'],
  },
  {
    id: 'economy',
    title: 'The Economy of the Future',
    branch: 'ECONOMICS',
    desc: 'When scarcity collapses — what money, stocks, and corporations become.',
    diorama: 'dioramas/economy.html',
    pos: [0, 0, -5.5],
    geo: 'torusknot',
    color: '#ff44ff',
    prereqs: ['homeless'],
  },
   {
     id: 'knowledge',
     title: 'The Day All Knowledge Becomes Free',
     branch: 'KNOWLEDGE',
     desc: 'Quantum breaks the locks. AI reads everything. Humanity inherits.',
     diorama: 'dioramas/knowledge.html',
     pos: [0, 0, -10],
     geo: 'torus',
     color: '#ff8844',
     prereqs: ['economy'],
   },
   {
     id: 'blood',
     title: 'The Body Tells Us Everything',
     branch: 'DIAGNOSTICS',
     desc: 'Continuous blood analysis. Exact molecular synthesis response. The closed diagnostic loop.',
     diorama: 'dioramas/blood.html',
     pos: [-9, 0, -4],
     geo: 'sphere',
     color: '#ff4466',
     prereqs: ['hospital'],
   },
   {
     id: 'farm_role',
     title: 'The Farm Is Everywhere',
     branch: 'DISTRIBUTED FOOD',
     desc: 'The farm stops being a place. Food grows everywhere. The farmer becomes a systems designer.',
     diorama: 'dioramas/farm_role.html',
     pos: [9, 0, 4],
     geo: 'icosahedron',
     color: '#88ff44',
     prereqs: ['farming'],
   },
   {
     id: 'environmental',
     title: 'Restoring the Denominator',
     branch: 'BIOSPHERE',
     desc: 'Restore phytoplankton, forests, soil microbiome. The biological regulators. Not reduce CO2 — restore the systems that absorb it.',
     diorama: 'dioramas/environmental.html',
     pos: [0, 0, 7],
     geo: 'tetrahedron',
     color: '#00ccff',
     prereqs: ['farming', 'energy'],
   },
   {
     id: 'localization',
     title: 'Every City Is Sufficient',
     branch: 'LOCAL ECONOMY',
     desc: 'Global supply chains dissolve into local resource orbits. Each city processes its own waste into its own raw materials.',
     diorama: 'dioramas/localization.html',
     pos: [-4, 0, 7],
     geo: 'dodecahedron',
     color: '#ffaa00',
     prereqs: ['energy', 'sewage'],
   },
   {
     id: 'mobile',
     title: 'Manufacturing Comes to You',
     branch: 'DEPLOYMENT',
     desc: 'The manufacturing container travels to the need. Disaster zones. Refugee camps. The address is the need itself.',
     diorama: 'dioramas/mobile.html',
     pos: [4, 0, 7],
     geo: 'octahedron',
     color: '#ff8800',
     prereqs: ['homeless'],
   },
 ];

// ═══════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════

const STORE = 'civ_tree_v1';

function loadProgress() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE) || '[]')); }
  catch { return new Set(); }
}
function saveProgress(s) {
  localStorage.setItem(STORE, JSON.stringify([...s]));
}

let done = loadProgress();

function getState(id) {
  if (done.has(id)) return 'completed';
  const node = TREE.find(n => n.id === id);
  if (!node.prereqs.every(p => done.has(p))) return 'locked';
  if (!node.diorama) return 'coming_soon';
  return 'available';
}

function markComplete(id) {
  if (done.has(id)) return;
  done.add(id);
  saveProgress(done);
  refreshAll();
  flash();
  showToast(id);
  updateProgress();
}

function updateProgress() {
  const n = done.size, t = TREE.length;
  document.getElementById('progress-count').textContent = `${n} / ${t}`;
  document.getElementById('progress-bar').style.width = `${(n/t)*100}%`;
}
updateProgress();

// ═══════════════════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const ds = renderer.domElement.style;
ds.position = 'fixed'; ds.top = '0'; ds.left = '0';
ds.width = '100%'; ds.height = '100%'; ds.zIndex = '1';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04080f);
scene.fog = new THREE.FogExp2(0x04080f, 0.012);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 16, 12);
camera.lookAt(0, 0, -2);

// OrbitControls — optional
let ctrl = null;
try {
  if (!window._noOrbit && THREE.OrbitControls) {
    ctrl = new THREE.OrbitControls(camera, renderer.domElement);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.06;
    ctrl.minDistance = 7;
    ctrl.maxDistance = 40;
    ctrl.maxPolarAngle = Math.PI / 2.15;
    ctrl.target.set(0, 0, -2);
  }
} catch(e) { console.warn('OrbitControls unavailable:', e); }

// Lights — bright enough to guarantee visibility
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
scene.add(new THREE.AmbientLight(0x004422, 3));
const sun = new THREE.DirectionalLight(0x00ffcc, 1.2);
sun.position.set(5, 15, 8);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x002244, 0.8);
fill.position.set(-5, 5, -5);
scene.add(fill);

// ─── TABLE ─────────────────────────────────────────────────────

const gc = document.createElement('canvas');
gc.width = gc.height = 512;
const gx = gc.getContext('2d');
for (let i = 0; i <= 512; i += 32) {
  gx.strokeStyle = 'rgba(0,255,204,0.1)';
  gx.lineWidth = 1;
  gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke();
  gx.beginPath(); gx.moveTo(0,i); gx.lineTo(512,i); gx.stroke();
}
const gt = new THREE.CanvasTexture(gc);
gt.wrapS = gt.wrapT = THREE.RepeatWrapping;
gt.repeat.set(7, 5);

const tableMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 28),
  new THREE.MeshStandardMaterial({ map: gt, color: 0x001a14, transparent: true, opacity: 0.55, roughness: 1 })
);
tableMesh.rotation.x = -Math.PI / 2;
tableMesh.position.y = -1.3;
scene.add(tableMesh);

const tableEdge = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(40, 0.04, 28)),
  new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 })
);
tableEdge.position.set(0, -1.3, 0);
scene.add(tableEdge);

// ═══════════════════════════════════════════════════════════════
// NODE MESHES
// ═══════════════════════════════════════════════════════════════

function mkGeo(t) {
  switch(t) {
    case 'octahedron':  return new THREE.OctahedronGeometry(0.72);
    case 'icosahedron': return new THREE.IcosahedronGeometry(0.72);
    case 'tetrahedron': return new THREE.TetrahedronGeometry(0.82);
    case 'dodecahedron':return new THREE.DodecahedronGeometry(0.68);
    case 'sphere':      return new THREE.SphereGeometry(0.68, 18, 18);
    case 'torusknot':   return new THREE.TorusKnotGeometry(0.48, 0.17, 72, 8);
    case 'torus':       return new THREE.TorusGeometry(0.58, 0.2, 14, 38);
    default:            return new THREE.IcosahedronGeometry(0.72);
  }
}

const meshes  = [];
const lights  = [];
const labelEls = [];
const S1  = new THREE.Vector3(1,1,1);
const SH  = new THREE.Vector3(1.18,1.18,1.18);
let hovIdx = -1;

TREE.forEach((node, i) => {
  const col = new THREE.Color(node.color);
  const geo = mkGeo(node.geo);

  const mat = new THREE.MeshPhongMaterial({
    color: col, emissive: col, emissiveIntensity: 0.45,
    shininess: 90, transparent: true, opacity: 0.88
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node.pos[0], node.pos[1] + 0.4, node.pos[2]);
  mesh.userData = { id: node.id, baseY: node.pos[1] + 0.4, idx: i };
  scene.add(mesh);

  // wireframe child
  mesh.add(new THREE.Mesh(
    mkGeo(node.geo),
    new THREE.MeshBasicMaterial({ color: col, wireframe: true, transparent: true, opacity: 0.14 })
  ));

  // point light
  const pl = new THREE.PointLight(col, 1.1, 6);
  pl.position.copy(mesh.position);
  scene.add(pl);

  meshes.push(mesh);
  lights.push(pl);

  // HTML label
  const el = document.createElement('div');
  el.className = 'nlabel';
  el.innerHTML = `
    <div class="nl-name" style="color:${node.color}">${node.title}</div>
    <div class="nl-branch" style="color:${node.color}">${node.branch}</div>
    <div class="nl-status"></div>
    <div class="nl-check"></div>`;
  document.body.appendChild(el);
  labelEls.push(el);
});

// ─── CONNECTIONS ───────────────────────────────────────────────

TREE.forEach(node => {
  const fi = TREE.findIndex(n => n.id === node.id);
  node.prereqs.forEach(pid => {
    const ti = TREE.findIndex(n => n.id === pid);
    if (ti < 0) return;
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        meshes[fi].position.clone(),
        meshes[ti].position.clone()
      ]),
      new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.1 })
    ));
  });
});

// ═══════════════════════════════════════════════════════════════
// VISUAL REFRESH
// ═══════════════════════════════════════════════════════════════

function refreshAll() {
  TREE.forEach((node, i) => {
    const state = getState(node.id);
    const mesh  = meshes[i];
    const pl    = lights[i];
    const el    = labelEls[i];
    const col   = new THREE.Color(node.color);
    const s     = el.querySelector('.nl-status');
    const c     = el.querySelector('.nl-check');

    switch(state) {
      case 'locked':
        mesh.material.color.set(0x334444);
        mesh.material.emissive.set(0x112222);
        mesh.material.emissiveIntensity = 0.35;
        mesh.material.opacity = 0.65;
        pl.intensity = 0.4; pl.color.set(0x003322);
        el.style.opacity = '0.35';
        s.textContent = '— LOCKED —'; s.style.color = '#002a1f';
        c.textContent = '';
        break;
      case 'coming_soon':
        mesh.material.color.copy(col);
        mesh.material.emissive.copy(col);
        mesh.material.emissiveIntensity = 0.18;
        mesh.material.opacity = 0.55;
        pl.intensity = 0.35; pl.color.copy(col);
        el.style.opacity = '0.65';
        s.textContent = 'EPISODE IN PRODUCTION'; s.style.color = '#004433';
        c.textContent = '';
        break;
      case 'available':
        mesh.material.color.copy(col);
        mesh.material.emissive.copy(col);
        mesh.material.emissiveIntensity = 0.5;
        mesh.material.opacity = 0.9;
        pl.intensity = 1.2; pl.color.copy(col);
        el.style.opacity = '1';
        s.textContent = '▶  WATCH EPISODE'; s.style.color = node.color;
        c.textContent = '';
        break;
      case 'completed':
        mesh.material.color.set(0xffcc44);
        mesh.material.emissive.set(0xffcc44);
        mesh.material.emissiveIntensity = 0.65;
        mesh.material.opacity = 1;
        pl.intensity = 1.6; pl.color.set(0xffcc44);
        el.style.opacity = '1';
        s.textContent = 'COMPLETED'; s.style.color = '#ffcc44';
        c.textContent = '✓'; c.style.color = '#ffcc44';
        break;
    }
  });
}
refreshAll();

// ═══════════════════════════════════════════════════════════════
// DIORAMA OVERLAY
// ═══════════════════════════════════════════════════════════════

let currentId = null;

function openDiorama(node) {
  currentId = node.id;
  const state = getState(node.id);
  document.getElementById('diorama-branch').textContent = node.branch;
  document.getElementById('diorama-title').textContent = node.title;
  updateMarkBtn();

  const frame = document.getElementById('diorama-frame');
  if (node.diorama && state !== 'locked') {
    frame.src = node.diorama;
  } else {
    frame.src = 'about:blank';
  }
  document.getElementById('diorama-overlay').classList.add('open');
}

function closeDiorama() {
  document.getElementById('diorama-overlay').classList.remove('open');
  document.getElementById('diorama-frame').src = 'about:blank';
  currentId = null;
}

function updateMarkBtn() {
  const btn = document.getElementById('btn-mark');
  if (!currentId) return;
  const isDone = done.has(currentId);
  btn.textContent = isDone ? '✓ Completed' : 'Mark Complete';
  btn.style.color  = isDone ? '#ffcc4499' : '';
  btn.style.borderColor = isDone ? '#ffaa0033' : '';
}

document.getElementById('btn-close').addEventListener('click', closeDiorama);
document.getElementById('btn-mark').addEventListener('click', () => {
  if (currentId && !done.has(currentId)) {
    markComplete(currentId);
    updateMarkBtn();
  }
});

// Listen for completion from diorama iframe
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'diorama-complete' && e.data.nodeId) {
    markComplete(e.data.nodeId);
    updateMarkBtn();
  }
});

// ═══════════════════════════════════════════════════════════════
// TOAST + FLASH
// ═══════════════════════════════════════════════════════════════

function showToast(id) {
  const node = TREE.find(n => n.id === id);
  const unlocked = TREE.filter(n =>
    n.prereqs.includes(id) && n.prereqs.every(p => done.has(p))
  );
  const msg = unlocked.length
    ? `✓ Complete  ·  ${unlocked.length} node${unlocked.length>1?'s':''} unlocked`
    : `✓ ${node.title}`;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function flash() {
  const f = document.getElementById('flash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 500);
}

// ═══════════════════════════════════════════════════════════════
// RAYCASTING
// ═══════════════════════════════════════════════════════════════

const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

window.addEventListener('click', e => {
  if (document.getElementById('diorama-overlay').classList.contains('open')) return;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(meshes);
  if (!hits.length) return;
  const idx = hits[0].object.userData.idx;
  if (idx === undefined) return;
  const node = TREE[idx];
  const state = getState(node.id);
  if (state !== 'locked') openDiorama(node);
});

// ═══════════════════════════════════════════════════════════════
// LABEL PROJECTION
// ═══════════════════════════════════════════════════════════════

function updateLabels() {
  labelEls.forEach((el, i) => {
    const p = meshes[i].position.clone();
    p.y -= 1.25;
    p.project(camera);
    if (p.z > 1) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.style.left = ((p.x * 0.5 + 0.5) * innerWidth)  + 'px';
    el.style.top  = ((-p.y * 0.5 + 0.5) * innerHeight) + 'px';
  });
}

// ═══════════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════════

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Hover
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(meshes);
  const newHov = hits.length ? hits[0].object.userData.idx : -1;

  if (newHov !== hovIdx) {
    if (hovIdx >= 0) meshes[hovIdx].scale.copy(S1);
    hovIdx = newHov;
    const blocked = document.getElementById('diorama-overlay').classList.contains('open');
    renderer.domElement.style.cursor =
      (!blocked && hovIdx >= 0 && getState(TREE[hovIdx].id) !== 'locked') ? 'pointer' : 'default';
  }

  meshes.forEach((mesh, i) => {
    const state = getState(TREE[i].id);

    // Float
    mesh.position.y = mesh.userData.baseY + Math.sin(t * 0.7 + i * 1.4) * 0.17;

    // Spin
    const spd = state === 'locked' ? 0.08 : state === 'completed' ? 0.5 : 0.3;
    mesh.rotation.x += spd * 0.012;
    mesh.rotation.y += spd * 0.016;

    // Hover scale
    mesh.scale.lerp(i === hovIdx ? SH : S1, 0.1);

    // Pulse available
    if (state === 'available') {
      const p = 0.35 + Math.sin(t * 2.2 + i) * 0.2;
      mesh.material.emissiveIntensity = p;
      lights[i].intensity = 0.9 + Math.sin(t * 2.2 + i) * 0.4;
    }

    lights[i].position.copy(mesh.position);
  });

  tableMesh.material.opacity = 0.48 + Math.sin(t * 0.28) * 0.07;

  if (ctrl) ctrl.update();
  updateLabels();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
